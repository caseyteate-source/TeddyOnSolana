<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Emoji Timeline</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #050510;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.045) 0,
        rgba(255,255,255,.045) 1px,
        transparent 2px,
        transparent 5px
      );
      mix-blend-mode: overlay;
    }

    .page {
      min-height: 100vh;
      background: #050510;
      display: flex;
      justify-content: center;
    }

    .frame {
      position: relative;
      width: min(100%, 1600px);
    }

    .bg {
      width: 100%;
      display: block;
    }

    .back-link {
      position: absolute;
      left: 2%;
      top: 2%;
      z-index: 40;
      color: #00f5ff;
      text-decoration: none;
      font-weight: 900;
      padding: 12px 18px;
      border-radius: 12px;
    }

    /*
      IMPORTANT:
      These buttons are intentionally transparent.
      No visible rectangular hover boxes.
      Only the emoji itself grows/glows.
    */

    .emoji-btn {
      position: absolute;
      z-index: 35;
      width: 5.2%;
      height: 9.2%;
      border: 0;
      background: transparent;
      padding: 0;
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: clamp(24px, 3.1vw, 50px);
      line-height: 1;
      transition: transform .16s ease, filter .16s ease;
      transform: translate(-50%, -50%);
    }

    .emoji-btn:hover {
      transform: translate(-50%, -50%) scale(1.22);
      filter:
        drop-shadow(0 0 12px #00f5ff)
        drop-shadow(0 0 18px #ff2aa3);
    }

    .emoji-btn:focus {
      outline: none;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.84);
      z-index: 1000;
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    .modal-box {
      position: relative;
      width: min(680px, 95vw);
      border: 3px solid #ff2aa3;
      border-radius: 24px;
      background: linear-gradient(180deg, #12001f, #050510);
      padding: 30px;
      box-shadow:
        0 0 35px #ff2aa3,
        0 0 65px rgba(0,245,255,.7);
    }

    .close {
      position: absolute;
      top: 10px;
      right: 16px;
      background: transparent;
      border: 0;
      color: white;
      font-size: 34px;
      cursor: pointer;
    }

    .modal-emoji {
      font-size: 5rem;
      text-align: center;
    }

    .modal-box h2 {
      color: #00f5ff;
      text-align: center;
      margin: 6px 0 14px;
    }

    .modal-box p {
      color: #eee;
      line-height: 1.6;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      background: #070711;
      color: white;
      border: 2px solid #00f5ff;
      border-radius: 14px;
      padding: 14px;
      resize: vertical;
      font-size: 1rem;
    }

    .save-btn {
      margin-top: 12px;
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 14px;
      background: #ff2aa3;
      color: white;
      font-weight: 900;
      cursor: pointer;
    }

    .saved-theories {
      margin-top: 18px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,.2);
    }

    .theory {
      background: rgba(0,245,255,.08);
      border-left: 3px solid #00f5ff;
      margin-top: 10px;
      padding: 10px;
      color: #dffcff;
    }

    @media (max-width: 800px) {
      .frame {
        width: 1400px;
        max-width: none;
      }

      .page {
        overflow-x: auto;
        justify-content: flex-start;
      }

      .emoji-btn {
        font-size: 42px;
      }
    }
  </style>
</head>

<body>
  <div class="scanlines"></div>

  <main class="page">
    <section class="frame">
      <img src="emoji-timeline-bg.png" class="bg" alt="The Emoji Timeline" />

      <a href="hub.html" class="back-link">← BACK TO HUB</a>

      <div id="emojiButtons"></div>
    </section>
  </main>

  <div id="modal" class="modal">
    <div class="modal-box">
      <button id="closeModal" class="close">×</button>

      <div id="modalEmoji" class="modal-emoji"></div>
      <h2 id="modalTitle"></h2>

      <p id="modalText"></p>

      <h3>Community Theory</h3>
      <textarea id="theoryInput" placeholder="Add your interpretation of this emoji..."></textarea>
      <button id="saveTheory" class="save-btn">SAVE THEORY</button>

      <div class="saved-theories">
        <h3>Saved Theories</h3>
        <div id="theoryList"></div>
      </div>
    </div>
  </div>

  <script>
    /*
      Exact 35 emoji sequence from your reference image.
      Positions are center-points over the visible emoji cards.
      If one is still a few pixels off, we only adjust that emoji's x/y.
    */

    const emojis = [
      { e:"😳", name:"Shock", x:13.2, y:31.0, text:"The opening signal. Surprise, confusion, and attention." },
      { e:"💩", name:"Mess", x:19.3, y:31.0, text:"Chaos, noise, or the market looking ugly before the next move." },
      { e:"😿", name:"Sad Cat", x:25.3, y:31.0, text:"The cat looks wounded, but the story is not over." },
      { e:"🥜", name:"Peanuts", x:31.2, y:31.0, text:"Small pieces that may matter more than they seem." },
      { e:"🐸", name:"Frog", x:37.2, y:31.0, text:"A leap, a jump, a meme signal, or transformation clue." },
      { e:"🍦", name:"Ice Cream", x:43.2, y:31.0, text:"Sweet Cohen-coded community lore." },
      { e:"🤢", name:"Sick", x:49.3, y:31.0, text:"Nausea, discomfort, or a rough market moment before the turn." },
      { e:"👍", name:"Thumbs Up", x:55.3, y:31.0, text:"Confirmation. Something checks out." },
      { e:"👊", name:"Fist", x:61.3, y:31.0, text:"Locked in. Community resolve." },
      { e:"💀", name:"Skull", x:67.2, y:31.0, text:"Danger, FUD, shorts, or something getting buried." },
      { e:"🤓", name:"Nerd", x:73.2, y:31.0, text:"Research mode. Look closer." },
      { e:"👀", name:"Eyes", x:79.3, y:31.0, text:"Watch closely. Something is hidden in plain sight." },
      { e:"😁", name:"Grin", x:85.2, y:31.0, text:"Confidence, mischief, or the reveal getting closer." },
      { e:"⚡", name:"Lightning", x:91.1, y:31.0, text:"Sudden energy. Fast movement." },

      { e:"🎮", name:"Game", x:13.2, y:51.2, text:"GameStop energy. The game continues." },
      { e:"🚀", name:"Rocket", x:19.3, y:51.2, text:"Launch imagery. Obvious but powerful." },
      { e:"🍄", name:"Mushroom", x:25.3, y:51.2, text:"Power-up mode." },
      { e:"💥", name:"Explosion", x:31.2, y:51.2, text:"Boom. Impact moment." },
      { e:"🍏", name:"Apple", x:37.2, y:51.2, text:"A clean bite, company clue, or garden-path clue." },
      { e:"🤔", name:"Thinking", x:43.2, y:51.2, text:"Question everything. Do not accept the first answer." },
      { e:"🥴", name:"Dizzy", x:49.3, y:51.2, text:"Disorientation before the reveal." },
      { e:"💜", name:"Purple Heart", x:55.3, y:51.2, text:"Community loyalty, DRS-purple, or love for the thesis." },
      { e:"👥", name:"People", x:61.3, y:51.2, text:"The crowd, the community, the players." },
      { e:"👌", name:"OK", x:67.2, y:51.2, text:"Signal accepted." },
      { e:"🤝", name:"Handshake", x:73.2, y:51.2, text:"Deal, agreement, partnership, or merger tinfoil." },
      { e:"⛺", name:"Tent", x:79.3, y:51.2, text:"Camp, setup, waiting, or gathering." },
      { e:"😼", name:"Smirking Cat", x:85.2, y:51.2, text:"The cat knows something." },
      { e:"🎯", name:"Target", x:91.1, y:51.2, text:"The thesis narrows." },

      { e:"👀", name:"Eyes Again", x:25.3, y:70.7, text:"A repeated watch signal. Look again." },
      { e:"🐶", name:"Dog", x:31.2, y:70.7, text:"Loyalty, pet clue, or company reference." },
      { e:"🇺🇸", name:"Flag", x:37.2, y:70.7, text:"America, timing, markets, celebration, or announcement energy." },
      { e:"👀", name:"Eyes Again", x:43.2, y:70.7, text:"The pattern repeats. Keep watching." },
      { e:"🔥", name:"Fire", x:49.3, y:70.7, text:"Everything heats up." },
      { e:"💥", name:"Explosion Again", x:55.3, y:70.7, text:"Second boom. Bigger impact." },
      { e:"🍻", name:"Beers", x:61.3, y:70.7, text:"Beer = Friday. The celebration card." }
    ];

    const emojiButtons = document.getElementById("emojiButtons");
    const modal = document.getElementById("modal");
    const modalEmoji = document.getElementById("modalEmoji");
    const modalTitle = document.getElementById("modalTitle");
    const modalText = document.getElementById("modalText");
    const theoryInput = document.getElementById("theoryInput");
    const saveTheory = document.getElementById("saveTheory");
    const theoryList = document.getElementById("theoryList");
    const closeModal = document.getElementById("closeModal");

    let activeIndex = null;

    emojis.forEach((item, index) => {
      const btn = document.createElement("button");
      btn.className = "emoji-btn";
      btn.textContent = item.e;
      btn.style.left = item.x + "%";
      btn.style.top = item.y + "%";
      btn.title = `${index + 1}. ${item.name}`;
      btn.setAttribute("aria-label", `${index + 1}. ${item.name}`);
      btn.addEventListener("click", () => openEmoji(index));
      emojiButtons.appendChild(btn);
    });

    function openEmoji(index) {
      activeIndex = index;
      const item = emojis[index];

      modalEmoji.textContent = item.e;
      modalTitle.textContent = `${index + 1}. ${item.name}`;
      modalText.textContent = item.text;
      theoryInput.value = "";

      renderTheories();
      modal.classList.add("active");
    }

    function getTheoryKey() {
      return `emoji-theories-${activeIndex}`;
    }

    function renderTheories() {
      theoryList.innerHTML = "";
      const saved = JSON.parse(localStorage.getItem(getTheoryKey()) || "[]");

      if (saved.length === 0) {
        theoryList.innerHTML = "<p>No theories saved yet.</p>";
        return;
      }

      saved.forEach((text) => {
        const div = document.createElement("div");
        div.className = "theory";
        div.textContent = text;
        theoryList.appendChild(div);
      });
    }

    saveTheory.addEventListener("click", () => {
      const text = theoryInput.value.trim();
      if (!text) return;

      const key = getTheoryKey();
      const saved = JSON.parse(localStorage.getItem(key) || "[]");

      saved.unshift(text);
      localStorage.setItem(key, JSON.stringify(saved));

      theoryInput.value = "";
      renderTheories();
    });

    closeModal.addEventListener("click", () => {
      modal.classList.remove("active");
    });

    modal.addEventListener("click", (event) => {
      if (event.target === modal) {
        modal.classList.remove("active");
      }
    });
  </script>
</body>
</html>
