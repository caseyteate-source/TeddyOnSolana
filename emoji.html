<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Emoji Timeline</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #050510;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 30px;
    }

    .container {
      width: 100%;
      max-width: 1600px;
    }

    .back {
      display: inline-block;
      margin-bottom: 20px;
      color: #00d4ff;
      text-decoration: none;
      font-size: 18px;
    }

    .board {
      width: 100%;
      display: block;
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(0,212,255,.25);
    }
  </style>
</head>
<body>

<div class="container">

  <a class="back" href="index.html">
    ← Back to Arcade
  </a>

  <img
    class="board"
    src="emoji-timeline-bg.png"
    alt="The Emoji Timeline"
  >

</div>

</body>
</html>
