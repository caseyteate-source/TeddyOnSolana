<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Emoji Timeline</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #050510;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.045) 0,
        rgba(255,255,255,.045) 1px,
        transparent 2px,
        transparent 5px
      );
      mix-blend-mode: overlay;
    }

    .page {
      min-height: 100vh;
      background: #050510;
      display: flex;
      justify-content: center;
    }

    .frame {
      position: relative;
      width: min(100%, 1600px);
      margin: 0 auto;
    }

    .bg {
      width: 100%;
      display: block;
      user-select: none;
    }

    .back-link {
      position: absolute;
      left: 2%;
      top: 2%;
      z-index: 40;
      color: transparent;
      width: 13%;
      height: 6%;
      text-decoration: none;
    }

    /*
      INVISIBLE HOTSPOTS:
      These do not display emojis.
      They only sit over the existing emoji cards in the artwork.
    */

    .emoji-zone {
      position: absolute;
      z-index: 35;
      width: 5.2%;
      height: 10%;
      border: 0;
      background: transparent;
      padding: 0;
      cursor: pointer;
      transform: translate(-50%, -50%);
    }

    .emoji-zone:hover {
      background: transparent;
      outline: none;
      box-shadow: none;
    }

    .emoji-zone:focus {
      outline: none;
    }

    .emoji-zone:active {
      transform: translate(-50%, -50%) scale(.96);
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.84);
      z-index: 1000;
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    .modal-box {
      position: relative;
      width: min(680px, 95vw);
      border: 3px solid #ff2aa3;
      border-radius: 24px;
      background: linear-gradient(180deg, #12001f, #050510);
      padding: 30px;
      box-shadow:
        0 0 35px #ff2aa3,
        0 0 65px rgba(0,245,255,.7);
    }

    .close {
      position: absolute;
      top: 10px;
      right: 16px;
      background: transparent;
      border: 0;
      color: white;
      font-size: 34px;
      cursor: pointer;
    }

    .modal-emoji {
      font-size: 5rem;
      text-align: center;
    }

    .modal-box h2 {
      color: #00f5ff;
      text-align: center;
      margin: 6px 0 14px;
    }

    .modal-box p {
      color: #eee;
      line-height: 1.6;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      background: #070711;
      color: white;
      border: 2px solid #00f5ff;
      border-radius: 14px;
      padding: 14px;
      resize: vertical;
      font-size: 1rem;
    }

    .save-btn {
      margin-top: 12px;
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 14px;
      background: #ff2aa3;
      color: white;
      font-weight: 900;
      cursor: pointer;
    }

    .saved-theories {
      margin-top: 18px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,.2);
    }

    .theory {
      background: rgba(0,245,255,.08);
      border-left: 3px solid #00f5ff;
      margin-top: 10px;
      padding: 10px;
      color: #dffcff;
    }

    .hint {
      font-size: .9rem;
      color: #aaa;
      text-align: center;
      margin-top: 10px;
    }

    @media (max-width: 800px) {
      .frame {
        width: 1400px;
        max-width: none;
      }

      .page {
        overflow-x: auto;
        justify-content: flex-start;
      }
    }
  </style>
</head>

<body>
  <div class="scanlines"></div>

  <main class="page">
    <section class="frame">
      <img src="emoji-timeline-bg.png" class="bg" alt="The Emoji Timeline" />

      <a href="hub.html" class="back-link" aria-label="Back to hub"></a>

      <div id="emojiZones"></div>
    </section>
  </main>

  <div id="modal" class="modal">
    <div class="modal-box">
      <button id="closeModal" class="close">×</button>

      <div id="modalEmoji" class="modal-emoji"></div>
      <h2 id="modalTitle"></h2>

      <p id="modalText"></p>

      <h3>Community Theory</h3>
      <textarea id="theoryInput" placeholder="Add your interpretation of this emoji..."></textarea>
      <button id="saveTheory" class="save-btn">SAVE THEORY</button>

      <p class="hint">
        These notes save locally in your browser for now. Later we can connect this to a real community submission system.
      </p>

      <div class="saved-theories">
        <h3>Saved Theories</h3>
        <div id="theoryList"></div>
      </div>
    </div>
  </div>

  <script>
    /*
      Exact 35 emoji sequence from your reference image.
      The artwork itself is visible.
      These are invisible clickable zones over the cards.
    */

    const emojis = [
      { e:"😳", name:"Shock", x:13.2, y:32.0, text:"The opening signal. Surprise, confusion, and attention. It may represent the moment the audience is supposed to realize something unusual is happening." },
      { e:"💩", name:"Mess", x:19.2, y:32.0, text:"Chaos, ugliness, or everything looking like a disaster before the next turn." },
      { e:"😿", name:"Sad Cat", x:25.2, y:32.0, text:"The cat appears wounded or discouraged, but this may be a fake-out rather than the end of the story." },
      { e:"🥜", name:"Peanuts", x:31.2, y:32.0, text:"Something small, overlooked, or dismissed as insignificant that may matter later." },
      { e:"🐸", name:"Frog", x:37.2, y:32.0, text:"A leap, transformation, meme signal, or jump from one phase to another." },
      { e:"🍦", name:"Ice Cream", x:43.2, y:32.0, text:"Often read by the community as a Cohen-coded clue, sweetness, reward, or callback." },
      { e:"🤢", name:"Sick", x:49.2, y:32.0, text:"A rough market moment, nausea, discomfort, or emotional pressure before the pivot." },
      { e:"👍", name:"Thumbs Up", x:55.2, y:32.0, text:"Approval, confirmation, or a signal that something checks out." },
      { e:"👊", name:"Fist", x:61.2, y:32.0, text:"Resolve, solidarity, locked-in conviction, or community strength." },
      { e:"💀", name:"Skull", x:67.2, y:32.0, text:"Danger, death of an old thesis, shorts getting wrecked, or FUD entering the board." },
      { e:"🤓", name:"Nerd", x:73.2, y:32.0, text:"Research mode. This may be a signal to study the details instead of reacting emotionally." },
      { e:"👀", name:"Eyes", x:79.2, y:32.0, text:"Watch closely. Something hidden in plain sight may be developing." },
      { e:"😁", name:"Grin", x:85.2, y:32.0, text:"Confidence, mischief, or the feeling that the reveal is getting closer." },
      { e:"⚡", name:"Lightning", x:91.2, y:32.0, text:"Sudden energy, speed, volatility, or an electric move." },

      { e:"🎮", name:"Game", x:13.2, y:51.8, text:"GameStop energy. The game continues. Could also represent the site itself as a playable mystery." },
      { e:"🚀", name:"Rocket", x:19.2, y:51.8, text:"Launch imagery. The classic meme-market symbol for upward movement." },
      { e:"🍄", name:"Mushroom", x:25.2, y:51.8, text:"Power-up mode, video game transformation, or entering another level." },
      { e:"💥", name:"Explosion", x:31.2, y:51.8, text:"A boom, impact event, or sudden break in the timeline." },
      { e:"🍏", name:"Apple", x:37.2, y:51.8, text:"Could suggest a clean bite, temptation, technology, a company clue, or a garden-path clue." },
      { e:"🤔", name:"Thinking", x:43.2, y:51.8, text:"Question everything. The sequence may require interpretation rather than a surface reading." },
      { e:"🥴", name:"Dizzy", x:49.2, y:51.8, text:"Confusion, disorientation, or the audience being thrown off before the reveal." },
      { e:"💜", name:"Purple Heart", x:55.2, y:51.8, text:"Community loyalty, purple DRS associations, or love for the thesis." },
      { e:"👥", name:"People", x:61.2, y:51.8, text:"The crowd, the community, the players, or collective attention." },
      { e:"👌", name:"OK", x:67.2, y:51.8, text:"Signal accepted. A small confirmation marker." },
      { e:"🤝", name:"Handshake", x:73.2, y:51.8, text:"Deal, agreement, partnership, merger speculation, or two parties connecting." },
      { e:"⛺", name:"Tent", x:79.2, y:51.8, text:"Camping, waiting, setting up, gathering, or holding position." },
      { e:"😼", name:"Smirking Cat", x:85.2, y:51.8, text:"The cat knows something. Confidence with a hidden card." },
      { e:"🎯", name:"Target", x:91.2, y:51.8, text:"The thesis narrows. A target has been identified." },

      { e:"👀", name:"Eyes Again", x:25.2, y:71.2, text:"A repeated watch signal. The viewer is being told to look again." },
      { e:"🐶", name:"Dog", x:31.2, y:71.2, text:"Loyalty, pet-related clue, company reference, or a faithful companion signal." },
      { e:"🇺🇸", name:"Flag", x:37.2, y:71.2, text:"America, timing, market structure, celebration, or an announcement window." },
      { e:"👀", name:"Eyes Again", x:43.2, y:71.2, text:"The pattern repeats again. Pay attention to what changed between the first eyes and now." },
      { e:"🔥", name:"Fire", x:49.2, y:71.2, text:"Heat, momentum, attention, or everything starting to catch fire." },
      { e:"💥", name:"Explosion Again", x:55.2, y:71.2, text:"Second boom. A larger impact or follow-up event." },
      { e:"🍻", name:"Beers", x:61.2, y:71.2, text:"Beer = Friday. Celebration, timing, or the end-of-week signal." }
    ];

    const emojiZones = document.getElementById("emojiZones");
    const modal = document.getElementById("modal");
    const modalEmoji = document.getElementById("modalEmoji");
    const modalTitle = document.getElementById("modalTitle");
    const modalText = document.getElementById("modalText");
    const theoryInput = document.getElementById("theoryInput");
    const saveTheory = document.getElementById("saveTheory");
    const theoryList = document.getElementById("theoryList");
    const closeModal = document.getElementById("closeModal");

    let activeIndex = null;

    emojis.forEach((item, index) => {
      const zone = document.createElement("button");
      zone.className = "emoji-zone";
      zone.style.left = item.x + "%";
      zone.style.top = item.y + "%";
      zone.title = `${index + 1}. ${item.name}`;
      zone.setAttribute("aria-label", `${index + 1}. ${item.name}`);
      zone.addEventListener("click", () => openEmoji(index));
      emojiZones.appendChild(zone);
    });

    function openEmoji(index) {
      activeIndex = index;
      const item = emojis[index];

      modalEmoji.textContent = item.e;
      modalTitle.textContent = `${index + 1}. ${item.name}`;
      modalText.textContent = item.text;
      theoryInput.value = "";

      renderTheories();
      modal.classList.add("active");
    }

    function getTheoryKey() {
      return `emoji-theories-${activeIndex}`;
    }

    function renderTheories() {
      theoryList.innerHTML = "";
      const saved = JSON.parse(localStorage.getItem(getTheoryKey()) || "[]");

      if (saved.length === 0) {
        theoryList.innerHTML = "<p>No theories saved yet.</p>";
        return;
      }

      saved.forEach((text) => {
        const div = document.createElement("div");
        div.className = "theory";
        div.textContent = text;
        theoryList.appendChild(div);
      });
    }

    saveTheory.addEventListener("click", () => {
      const text = theoryInput.value.trim();
      if (!text) return;

      const key = getTheoryKey();
      const saved = JSON.parse(localStorage.getItem(key) || "[]");

      saved.unshift(text);
      localStorage.setItem(key, JSON.stringify(saved));

      theoryInput.value = "";
      renderTheories();
    });

    closeModal.addEventListener("click", () => {
      modal.classList.remove("active");
    });

    modal.addEventListener("click", (event) => {
      if (event.target === modal) {
        modal.classList.remove("active");
      }
    });
  </script>
</body>
</html>
