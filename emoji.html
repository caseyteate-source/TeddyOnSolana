<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Emoji Timeline</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #050510;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      background: #050510;
      display: flex;
      justify-content: center;
    }

    .frame {
      position: relative;
      width: min(100%, 1600px);
      margin: 0 auto;
    }

    .bg {
      width: 100%;
      display: block;
      user-select: none;
    }

    .back-link {
      position: absolute;
      left: 1.4%;
      top: 1.5%;
      width: 14.5%;
      height: 7.5%;
      z-index: 80;
      color: transparent;
      text-decoration: none;
    }

    .timeline-overlay {
      position: absolute;
      left: 9.2%;
      top: 25.8%;
      width: 78.8%;
      z-index: 75;
    }

    .emoji-row {
      display: grid;
      gap: 0.65%;
      margin-bottom: 6.15%;
    }

    .row1,
    .row2 {
      grid-template-columns: repeat(14, 1fr);
    }

    .row3 {
      width: 52%;
      margin: 0 auto;
      grid-template-columns: repeat(7, 1fr);
    }

    .emoji-zone {
      position: relative;
      aspect-ratio: 0.74 / 1;
      border: 0;
      background: transparent;
      cursor: pointer;
      padding: 0;
    }

    .emoji-zone:hover {
      outline: none;
      filter: drop-shadow(0 0 8px #00f5ff);
    }

    body.debug .emoji-zone {
      background: rgba(0,245,255,.16);
      border: 2px solid #00f5ff;
      border-radius: 8px;
    }

    body.debug .emoji-zone::after {
      content: attr(data-number);
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: black;
      color: white;
      border: 2px solid #00f5ff;
      border-radius: 999px;
      width: 26px;
      height: 26px;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 900;
      box-shadow: 0 0 12px #00f5ff;
    }

    .debug-label {
      display: none;
    }

    body.debug .debug-label {
      display: block;
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 2000;
      background: #00f5ff;
      color: #050510;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 900;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.86);
      z-index: 1000;
      padding: 20px;
    }

    .modal.active { display: flex; }

    .modal-box {
      width: min(680px, 95vw);
      border: 3px solid #ff2aa3;
      border-radius: 24px;
      background: linear-gradient(180deg, #12001f, #050510);
      padding: 30px;
      position: relative;
      box-shadow: 0 0 35px #ff2aa3, 0 0 65px rgba(0,245,255,.7);
    }

    .close {
      position: absolute;
      top: 10px;
      right: 16px;
      background: transparent;
      border: 0;
      color: white;
      font-size: 34px;
      cursor: pointer;
    }

    .modal-emoji {
      text-align: center;
      font-size: 5rem;
    }

    .modal-box h2 {
      color: #00f5ff;
      text-align: center;
      margin: 6px 0 14px;
    }

    .modal-box p {
      color: #eee;
      line-height: 1.6;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      background: #070711;
      color: white;
      border: 2px solid #00f5ff;
      border-radius: 14px;
      padding: 14px;
      resize: vertical;
      font-size: 1rem;
    }

    .save-btn {
      margin-top: 12px;
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 14px;
      background: #ff2aa3;
      color: white;
      font-weight: 900;
      cursor: pointer;
    }

    .saved-theories {
      margin-top: 18px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,.2);
    }

    .theory {
      background: rgba(0,245,255,.08);
      border-left: 3px solid #00f5ff;
      margin-top: 10px;
      padding: 10px;
      color: #dffcff;
    }

    @media (max-width: 800px) {
      .frame {
        width: 1200px;
        max-width: none;
      }

      .page {
        overflow-x: auto;
        justify-content: flex-start;
      }
    }
  </style>
</head>

<body>
  <div class="debug-label">DEBUG: grid overlay loaded</div>

  <main class="page">
    <section class="frame">
      <img src="emoji-timeline-bg.png" class="bg" alt="The Emoji Timeline" />

      <a href="hub.html" class="back-link" aria-label="Back to hub"></a>

      <div class="timeline-overlay">
        <div id="row1" class="emoji-row row1"></div>
        <div id="row2" class="emoji-row row2"></div>
        <div id="row3" class="emoji-row row3"></div>
      </div>
    </section>
  </main>

  <div id="modal" class="modal">
    <div class="modal-box">
      <button id="closeModal" class="close">×</button>
      <div id="modalEmoji" class="modal-emoji"></div>
      <h2 id="modalTitle"></h2>
      <p id="modalText"></p>

      <h3>Community Theory</h3>
      <textarea id="theoryInput" placeholder="Add your interpretation of this emoji..."></textarea>
      <button id="saveTheory" class="save-btn">SAVE THEORY</button>

      <div class="saved-theories">
        <h3>Saved Theories</h3>
        <div id="theoryList"></div>
      </div>
    </div>
  </div>

  <script>
    if (new URLSearchParams(window.location.search).get("debug") === "1") {
      document.body.classList.add("debug");
    }

    const emojis = [
      { e:"😳", name:"Shock", text:"Surprise, confusion, or the opening signal." },
      { e:"💩", name:"Mess", text:"Chaos, ugliness, or everything looking bad before the turn." },
      { e:"😿", name:"Crying Cat", text:"The cat appears wounded, but the story may not be over." },
      { e:"🥜", name:"Peanuts", text:"Something small or dismissed that may matter later." },
      { e:"🐸", name:"Frog", text:"A leap, transformation, or meme signal." },
      { e:"🍦", name:"Ice Cream", text:"Sweet reward, callback, or Cohen-coded lore." },
      { e:"🤢", name:"Sick", text:"Discomfort, pressure, or a rough market moment." },
      { e:"👍", name:"Thumbs Up", text:"Confirmation. Something checks out." },
      { e:"👊", name:"Fist", text:"Resolve, strength, or community conviction." },
      { e:"💀", name:"Skull", text:"Danger, FUD, shorts, or something getting buried." },
      { e:"🤓", name:"Nerd", text:"Research mode. Look closer." },
      { e:"👀", name:"Eyes", text:"Watch closely. Something is hidden in plain sight." },
      { e:"🤩", name:"Star Eyes", text:"Excitement, awe, or the reveal getting closer." },
      { e:"⚡", name:"Lightning", text:"Sudden energy, speed, or volatility." },

      { e:"🎮", name:"Game", text:"GameStop energy. The game continues." },
      { e:"🚀", name:"Rocket", text:"Launch imagery and upward movement." },
      { e:"🍄", name:"Mushroom", text:"Power-up mode or entering another level." },
      { e:"💥", name:"Explosion", text:"Impact event, boom, or sudden break." },
      { e:"🍏", name:"Apple", text:"A bite, clue, company reference, or garden-path signal." },
      { e:"🤔", name:"Thinking", text:"Question everything. Do not accept the first answer." },
      { e:"🥴", name:"Dizzy", text:"Confusion or disorientation before the reveal." },
      { e:"💜", name:"Purple Heart", text:"Community loyalty, purple/DRS associations, or love for the thesis." },
      { e:"👥", name:"People", text:"The crowd, community, or collective attention." },
      { e:"👌", name:"OK", text:"Signal accepted." },
      { e:"🤝", name:"Handshake", text:"Deal, partnership, agreement, or merger tinfoil." },
      { e:"⛺", name:"Tent", text:"Camping, waiting, gathering, or holding position." },
      { e:"😿", name:"Crying Cat Again", text:"The cat appears again. Repetition may matter." },
      { e:"🎯", name:"Target", text:"The thesis narrows. A target is identified." },

      { e:"👀", name:"Eyes Again", text:"A repeated watch signal." },
      { e:"🐶", name:"Dog", text:"Loyalty, pet clue, or company reference." },
      { e:"🇺🇸🎤🎶", name:"Flag Mic Music", text:"The American flag with microphone/music notes clue." },
      { e:"👀", name:"Eyes Again", text:"Look again. The pattern repeats." },
      { e:"🔥", name:"Fire", text:"Heat, attention, and momentum." },
      { e:"💥", name:"Explosion Again", text:"Second boom or larger impact." },
      { e:"🍻", name:"Beers", text:"Beer = Friday. Celebration or timing clue." }
    ];

    const row1 = document.getElementById("row1");
    const row2 = document.getElementById("row2");
    const row3 = document.getElementById("row3");

    const modal = document.getElementById("modal");
    const modalEmoji = document.getElementById("modalEmoji");
    const modalTitle = document.getElementById("modalTitle");
    const modalText = document.getElementById("modalText");
    const theoryInput = document.getElementById("theoryInput");
    const saveTheory = document.getElementById("saveTheory");
    const theoryList = document.getElementById("theoryList");
    const closeModal = document.getElementById("closeModal");

    let activeIndex = null;

    emojis.forEach((item, index) => {
      const btn = document.createElement("button");
      btn.className = "emoji-zone";
      btn.dataset.number = index + 1;
      btn.title = `${index + 1}. ${item.name}`;
      btn.setAttribute("aria-label", `${index + 1}. ${item.name}`);
      btn.addEventListener("click", () => openEmoji(index));

      if (index < 14) {
        row1.appendChild(btn);
      } else if (index < 28) {
        row2.appendChild(btn);
      } else {
        row3.appendChild(btn);
      }
    });

    function openEmoji(index) {
      activeIndex = index;
      const item = emojis[index];

      modalEmoji.textContent = item.e;
      modalTitle.textContent = `${index + 1}. ${item.name}`;
      modalText.textContent = item.text;
      theoryInput.value = "";

      renderTheories();
      modal.classList.add("active");
    }

    function getTheoryKey() {
      return `emoji-theories-${activeIndex}`;
    }

    function renderTheories() {
      theoryList.innerHTML = "";
      const saved = JSON.parse(localStorage.getItem(getTheoryKey()) || "[]");

      if (saved.length === 0) {
        theoryList.innerHTML = "<p>No theories saved yet.</p>";
        return;
      }

      saved.forEach((text) => {
        const div = document.createElement("div");
        div.className = "theory";
        div.textContent = text;
        theoryList.appendChild(div);
      });
    }

    saveTheory.addEventListener("click", () => {
      const text = theoryInput.value.trim();
      if (!text) return;

      const key = getTheoryKey();
      const saved = JSON.parse(localStorage.getItem(key) || "[]");

      saved.unshift(text);
      localStorage.setItem(key, JSON.stringify(saved));

      theoryInput.value = "";
      renderTheories();
    });

    closeModal.addEventListener("click", () => {
      modal.classList.remove("active");
    });

    modal.addEventListener("click", (event) => {
      if (event.target === modal) {
        modal.classList.remove("active");
      }
    });
  </script>
</body>
</html>
