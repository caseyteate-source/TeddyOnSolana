<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Emoji Timeline</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #050510;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.045) 0,
        rgba(255,255,255,.045) 1px,
        transparent 2px,
        transparent 5px
      );
      mix-blend-mode: overlay;
    }

    .page {
      min-height: 100vh;
      background: #050510;
      display: flex;
      justify-content: center;
    }

    .frame {
      position: relative;
      width: min(100%, 1600px);
    }

    .bg {
      width: 100%;
      display: block;
    }

    .back-link {
      position: absolute;
      left: 2%;
      top: 2%;
      z-index: 20;
      color: #00f5ff;
      text-decoration: none;
      font-weight: 900;
      padding: 12px 18px;
      border-radius: 12px;
    }

    .emoji-layer {
      position: absolute;
      left: 9.7%;
      top: 25.5%;
      width: 75%;
      z-index: 30;
      display: grid;
      grid-template-columns: repeat(14, 1fr);
      gap: 3.2vw 1.15vw;
      pointer-events: none;
    }

    .emoji-btn {
      pointer-events: auto;
      border: 0;
      background: transparent;
      cursor: pointer;
      font-size: clamp(24px, 3.2vw, 52px);
      line-height: 1;
      transition: transform .18s ease, filter .18s ease;
      padding: 0;
      text-shadow: 0 0 14px rgba(0,245,255,.45);
    }

    .emoji-btn:hover {
      transform: scale(1.35) translateY(-8px);
      filter: drop-shadow(0 0 18px #ff2aa3) drop-shadow(0 0 12px #00f5ff);
      z-index: 50;
    }

    .emoji-btn:nth-child(n+15):nth-child(-n+28) {
      transform: translateY(18px);
    }

    .emoji-btn:nth-child(n+29) {
      transform: translateY(36px);
    }

    .emoji-btn:nth-child(n+29):hover {
      transform: translateY(28px) scale(1.35);
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.84);
      z-index: 1000;
      padding: 20px;
    }

    .modal.active {
      display: flex;
    }

    .modal-box {
      position: relative;
      width: min(680px, 95vw);
      border: 3px solid #ff2aa3;
      border-radius: 24px;
      background: linear-gradient(180deg, #12001f, #050510);
      padding: 30px;
      box-shadow:
        0 0 35px #ff2aa3,
        0 0 65px rgba(0,245,255,.7);
    }

    .close {
      position: absolute;
      top: 10px;
      right: 16px;
      background: transparent;
      border: 0;
      color: white;
      font-size: 34px;
      cursor: pointer;
    }

    .modal-emoji {
      font-size: 5rem;
      text-align: center;
    }

    .modal-box h2 {
      color: #00f5ff;
      text-align: center;
      margin: 6px 0 14px;
    }

    .modal-box p {
      color: #eee;
      line-height: 1.6;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      background: #070711;
      color: white;
      border: 2px solid #00f5ff;
      border-radius: 14px;
      padding: 14px;
      resize: vertical;
      font-size: 1rem;
    }

    .save-btn {
      margin-top: 12px;
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 14px;
      background: #ff2aa3;
      color: white;
      font-weight: 900;
      cursor: pointer;
    }

    .saved-theories {
      margin-top: 18px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,.2);
    }

    .theory {
      background: rgba(0,245,255,.08);
      border-left: 3px solid #00f5ff;
      margin-top: 10px;
      padding: 10px;
      color: #dffcff;
    }

    @media (max-width: 800px) {
      .frame {
        width: 1400px;
      }

      .page {
        overflow-x: auto;
        justify-content: flex-start;
      }

      .emoji-layer {
        gap: 44px 16px;
      }
    }
  </style>
</head>

<body>
  <div class="scanlines"></div>

  <main class="page">
    <section class="frame">
      <img src="emoji-timeline-bg.png" class="bg" alt="The Emoji Timeline" />

      <a href="hub.html" class="back-link">← BACK TO HUB</a>

      <div id="emojiLayer" class="emoji-layer"></div>
    </section>
  </main>

  <div id="modal" class="modal">
    <div class="modal-box">
      <button id="closeModal" class="close">×</button>

      <div id="modalEmoji" class="modal-emoji"></div>
      <h2 id="modalTitle"></h2>

      <p id="modalText"></p>

      <h3>Community Theory</h3>
      <textarea id="theoryInput" placeholder="Add your interpretation of this emoji..."></textarea>
      <button id="saveTheory" class="save-btn">SAVE THEORY</button>

      <div class="saved-theories">
        <h3>Saved Theories</h3>
        <div id="theoryList"></div>
      </div>
    </div>
  </div>

  <script>
    const emojis = [
      { e:"😳", name:"Shock", text:"The opening signal. Surprise, confusion, and attention." },
      { e:"💩", name:"Mess", text:"Chaos, noise, or the market looking ugly before the next move." },
      { e:"😿", name:"Sad Cat", text:"The cat looks wounded, but the story is not over." },
      { e:"🥜", name:"Peanuts", text:"Small pieces that may matter more than they seem." },
      { e:"🐸", name:"Frog", text:"A leap, a jump, a meme signal, or transformation clue." },
      { e:"🍦", name:"Ice Cream", text:"Sweet Cohen-coded community lore." },
      { e:"🤢", name:"Sick", text:"Nausea, discomfort, or a rough market moment before the turn." },
      { e:"👍", name:"Thumbs Up", text:"Confirmation. Something checks out." },
      { e:"👊", name:"Fist", text:"Locked in. Community resolve." },
      { e:"💀", name:"Skull", text:"Danger, FUD, shorts, or something getting buried." },
      { e:"🤓", name:"Nerd", text:"Research mode. Look closer." },
      { e:"👀", name:"Eyes", text:"Watch closely. Something is hidden in plain sight." },
      { e:"😁", name:"Grin", text:"Confidence, mischief, or the reveal getting closer." },
      { e:"⚡", name:"Lightning", text:"Sudden energy. Fast movement." },
      { e:"🎮", name:"Game", text:"GameStop energy. The game continues." },
      { e:"🚀", name:"Rocket", text:"Launch imagery. Obvious but powerful." },
      { e:"🍄", name:"Mushroom", text:"Power-up mode." },
      { e:"💥", name:"Explosion", text:"Boom. Impact moment." },
      { e:"🍏", name:"Apple", text:"A clean bite, company clue, or garden-path clue." },
      { e:"🤔", name:"Thinking", text:"Question everything. Do not accept the first answer." },
      { e:"🥴", name:"Dizzy", text:"Disorientation before the reveal." },
      { e:"💜", name:"Purple Heart", text:"Community loyalty, DRS-purple, or love for the thesis." },
      { e:"👥", name:"People", text:"The crowd, the community, the players." },
      { e:"👌", name:"OK", text:"Signal accepted." },
      { e:"🤝", name:"Handshake", text:"Deal, agreement, partnership, or merger tinfoil." },
      { e:"⛺", name:"Tent", text:"Camp, setup, waiting, or gathering." },
      { e:"😼", name:"Smirking Cat", text:"The cat knows something." },
      { e:"🎯", name:"Target", text:"The thesis narrows." },
      { e:"👀", name:"Eyes Again", text:"A repeated watch signal. Look again." },
      { e:"🐶", name:"Dog", text:"Loyalty, pet clue, or company reference." },
      { e:"🇺🇸", name:"Flag", text:"America, timing, markets, celebration, or announcement energy." },
      { e:"👀", name:"Eyes Again", text:"The pattern repeats. Keep watching." },
      { e:"🔥", name:"Fire", text:"Everything heats up." },
      { e:"💥", name:"Explosion Again", text:"Second boom. Bigger impact." },
      { e:"🍻", name:"Beers", text:"Beer = Friday. The celebration card." }
    ];

    const layer = document.getElementById("emojiLayer");
    const modal = document.getElementById("modal");
    const modalEmoji = document.getElementById("modalEmoji");
    const modalTitle = document.getElementById("modalTitle");
    const modalText = document.getElementById("modalText");
    const theoryInput = document.getElementById("theoryInput");
    const saveTheory = document.getElementById("saveTheory");
    const theoryList = document.getElementById("theoryList");
    const closeModal = document.getElementById("closeModal");

    let activeIndex = null;

    emojis.forEach((item, index) => {
      const btn = document.createElement("button");
      btn.className = "emoji-btn";
      btn.textContent = item.e;
      btn.title = `${index + 1}. ${item.name}`;
      btn.addEventListener("click", () => openEmoji(index));
      layer.appendChild(btn);
    });

    function openEmoji(index) {
      activeIndex = index;
      const item = emojis[index];

      modalEmoji.textContent = item.e;
      modalTitle.textContent = `${index + 1}. ${item.name}`;
      modalText.textContent = item.text;
      theoryInput.value = "";

      renderTheories();
      modal.classList.add("active");
    }

    function getTheoryKey() {
      return `emoji-theories-${activeIndex}`;
    }

    function renderTheories() {
      theoryList.innerHTML = "";
      const saved = JSON.parse(localStorage.getItem(getTheoryKey()) || "[]");

      if (saved.length === 0) {
        theoryList.innerHTML = "<p>No theories saved yet.</p>";
        return;
      }

      saved.forEach((text) => {
        const div = document.createElement("div");
        div.className = "theory";
        div.textContent = text;
        theoryList.appendChild(div);
      });
    }

    saveTheory.addEventListener("click", () => {
      const text = theoryInput.value.trim();
      if (!text) return;

      const key = getTheoryKey();
      const saved = JSON.parse(localStorage.getItem(key) || "[]");

      saved.unshift(text);
      localStorage.setItem(key, JSON.stringify(saved));

      theoryInput.value = "";
      renderTheories();
    });

    closeModal.addEventListener("click", () => {
      modal.classList.remove("active");
    });

    modal.addEventListener("click", (event) => {
      if (event.target === modal) {
        modal.classList.remove("active");
      }
    });
  </script>
</body>
</html>
