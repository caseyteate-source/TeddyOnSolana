<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>$TEDDY | Kitty Files</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #07010f;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      padding: 20px;
      background:
        radial-gradient(circle at top, rgba(255,0,180,.18), transparent 35%),
        linear-gradient(180deg, #07010f, #120016 60%, #050008);
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      align-items: center;
      margin-bottom: 15px;
      text-align: center;
    }

    h1 {
      width: 100%;
      margin: 0 0 8px;
      color: #ff4fd8;
      text-shadow: 0 0 14px #ff4fd8;
      font-size: clamp(28px, 5vw, 58px);
    }

    .back {
      color: #00eaff;
      text-decoration: none;
      border: 2px solid #00eaff;
      padding: 10px 14px;
      border-radius: 10px;
      box-shadow: 0 0 12px #00eaff;
      background: rgba(0, 234, 255, .08);
    }

    button {
      cursor: pointer;
      border: 2px solid #ff4fd8;
      background: rgba(255,79,216,.12);
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: bold;
      box-shadow: 0 0 12px rgba(255,79,216,.6);
    }

    button.active {
      background: #ff4fd8;
      color: #130018;
    }

    .board-wrap {
      position: relative;
      max-width: 1300px;
      margin: 0 auto;
      border: 4px solid #ff4fd8;
      box-shadow: 0 0 30px rgba(255,79,216,.7);
      border-radius: 18px;
      overflow: hidden;
      background: #111;
    }

    .board-img {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
    }

    .hotspot {
      position: absolute;
      display: block;
      border: 3px dashed rgba(0, 234, 255, .95);
      background: rgba(0, 234, 255, .12);
      border-radius: 10px;
      z-index: 5;
      text-decoration: none;
    }

    .hotspot:hover {
      background: rgba(255, 79, 216, .18);
      border-color: #ff4fd8;
    }

    body:not(.drag-mode) .hotspot {
      border-color: rgba(0, 234, 255, .15);
      background: transparent;
    }

    body:not(.drag-mode) .hotspot:hover {
      border-color: rgba(255, 79, 216, .8);
      background: rgba(255,79,216,.08);
    }

    body.drag-mode .hotspot {
      cursor: move;
      pointer-events: auto;
    }

    .resize-handle {
      display: none;
      position: absolute;
      right: -7px;
      bottom: -7px;
      width: 16px;
      height: 16px;
      background: #ff4fd8;
      border: 2px solid white;
      border-radius: 50%;
      cursor: nwse-resize;
      z-index: 10;
    }

    body.drag-mode .resize-handle {
      display: block;
    }

    .output {
      max-width: 1300px;
      margin: 18px auto 0;
      background: rgba(0,0,0,.75);
      border: 2px solid #00eaff;
      border-radius: 14px;
      padding: 15px;
      display: none;
      white-space: pre-wrap;
      color: #dffcff;
      font-family: monospace;
      font-size: 13px;
      line-height: 1.45;
    }

    body.drag-mode .output {
      display: block;
    }

    .note {
      text-align: center;
      color: #ffd6fb;
      margin: 10px auto 18px;
      max-width: 900px;
    }

    @media (max-width: 700px) {
      .page { padding: 10px; }
      .hotspot { border-width: 2px; }
    }
  </style>
</head>

<body>
  <main class="page">
    <div class="topbar">
      <h1>🐱 Kitty Files</h1>
      <a class="back" href="index.html">← Back to Arcade</a>
      <button id="dragBtn">🎯 Drag Mode OFF</button>
      <button id="copyBtn">📋 Copy Hotspot CSS</button>
    </div>

    <p class="note">
      Turn Drag Mode ON, drag each blue box into place, resize from the pink dot, then copy the CSS.
    </p>

    <div class="board-wrap" id="board">
      <!-- Change this image name if your board graphic has a different filename -->
      <img src="kitty-board.png" alt="Roaring Kitty conspiracy corkboard" class="board-img" />

      <!-- HOTSPOTS: adjust these manually with drag mode -->
      <a class="hotspot" id="hs-1" href="#" style="left: 7%; top: 12%; width: 16%; height: 16%;" data-name="Hotspot 1"><span class="resize-handle"></span></a>
      <a class="hotspot" id="hs-2" href="#" style="left: 31%; top: 10%; width: 16%; height: 16%;" data-name="Hotspot 2"><span class="resize-handle"></span></a>
      <a class="hotspot" id="hs-3" href="#" style="left: 55%; top: 11%; width: 16%; height: 16%;" data-name="Hotspot 3"><span class="resize-handle"></span></a>
      <a class="hotspot" id="hs-4" href="#" style="left: 76%; top: 13%; width: 16%; height: 16%;" data-name="Hotspot 4"><span class="resize-handle"></span></a>

      <a class="hotspot" id="hs-5" href="#" style="left: 9%; top: 36%; width: 16%; height: 16%;" data-name="Hotspot 5"><span class="resize-handle"></span></a>
      <a class="hotspot" id="hs-6" href="#" style="left: 32%; top: 35%; width: 16%; height: 16%;" data-name="Hotspot 6"><span class="resize-handle"></span></a>
      <a class="hotspot" id="hs-7" href="#" style="left: 55%; top: 36%; width: 16%; height: 16%;" data-name="Hotspot 7"><span class="resize-handle"></span></a>
      <a class="hotspot" id="hs-8" href="#" style="left: 76%; top: 37%; width: 16%; height: 16%;" data-name="Hotspot 8"><span class="resize-handle"></span></a>

      <a class="hotspot" id="hs-9" href="#" style="left: 10%; top: 63%; width: 16%; height: 16%;" data-name="Hotspot 9"><span class="resize-handle"></span></a>
      <a class="hotspot" id="hs-10" href="#" style="left: 32%; top: 62%; width: 16%; height: 16%;" data-name="Hotspot 10"><span class="resize-handle"></span></a>
      <a class="hotspot" id="hs-11" href="#" style="left: 55%; top: 63%; width: 16%; height: 16%;" data-name="Hotspot 11"><span class="resize-handle"></span></a>
      <a class="hotspot" id="hs-12" href="#" style="left: 76%; top: 64%; width: 16%; height: 16%;" data-name="Hotspot 12"><span class="resize-handle"></span></a>
    </div>

    <div class="output" id="output"></div>
  </main>

  <script>
    const dragBtn = document.getElementById("dragBtn");
    const copyBtn = document.getElementById("copyBtn");
    const board = document.getElementById("board");
    const output = document.getElementById("output");
    const hotspots = document.querySelectorAll(".hotspot");

    let dragMode = false;
    let active = null;
    let resizing = false;
    let startX = 0;
    let startY = 0;
    let startLeft = 0;
    let startTop = 0;
    let startWidth = 0;
    let startHeight = 0;

    dragBtn.addEventListener("click", () => {
      dragMode = !dragMode;
      document.body.classList.toggle("drag-mode", dragMode);
      dragBtn.classList.toggle("active", dragMode);
      dragBtn.textContent = dragMode ? "🎯 Drag Mode ON" : "🎯 Drag Mode OFF";
      updateOutput();
    });

    hotspots.forEach(hs => {
      hs.addEventListener("click", e => {
        if (dragMode) e.preventDefault();
      });

      hs.addEventListener("mousedown", e => {
        if (!dragMode) return;

        e.preventDefault();
        active = hs;
        resizing = e.target.classList.contains("resize-handle");

        const boardRect = board.getBoundingClientRect();
        const hsRect = hs.getBoundingClientRect();

        startX = e.clientX;
        startY = e.clientY;
        startLeft = hsRect.left - boardRect.left;
        startTop = hsRect.top - boardRect.top;
        startWidth = hsRect.width;
        startHeight = hsRect.height;

        document.addEventListener("mousemove", moveHotspot);
        document.addEventListener("mouseup", stopMove);
      });
    });

    function moveHotspot(e) {
      if (!active) return;

      const boardRect = board.getBoundingClientRect();
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;

      if (resizing) {
        const newWidth = Math.max(20, startWidth + dx);
        const newHeight = Math.max(20, startHeight + dy);

        active.style.width = ((newWidth / boardRect.width) * 100).toFixed(2) + "%";
        active.style.height = ((newHeight / boardRect.height) * 100).toFixed(2) + "%";
      } else {
        const newLeft = startLeft + dx;
        const newTop = startTop + dy;

        active.style.left = ((newLeft / boardRect.width) * 100).toFixed(2) + "%";
        active.style.top = ((newTop / boardRect.height) * 100).toFixed(2) + "%";
      }

      updateOutput();
    }

    function stopMove() {
      active = null;
      resizing = false;
      document.removeEventListener("mousemove", moveHotspot);
      document.removeEventListener("mouseup", stopMove);
      updateOutput();
    }

    function updateOutput() {
      let css = "/* COPY THESE HOTSPOT POSITIONS */\n\n";

      hotspots.forEach(hs => {
        css += `#${hs.id} {\n`;
        css += `  left: ${hs.style.left};\n`;
        css += `  top: ${hs.style.top};\n`;
        css += `  width: ${hs.style.width};\n`;
        css += `  height: ${hs.style.height};\n`;
        css += `}\n\n`;
      });

      output.textContent = css;
    }

    copyBtn.addEventListener("click", async () => {
      updateOutput();
      try {
        await navigator.clipboard.writeText(output.textContent);
        copyBtn.textContent = "✅ Copied!";
        setTimeout(() => copyBtn.textContent = "📋 Copy Hotspot CSS", 1200);
      } catch {
        alert("Could not auto-copy. Highlight the text box and copy manually.");
      }
    });

    updateOutput();
  </script>
</body>
</html>
