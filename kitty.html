<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>$TEDDY | Kitty Files</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #050510;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.045) 0,
        rgba(255,255,255,.045) 1px,
        transparent 2px,
        transparent 5px
      );
      mix-blend-mode: overlay;
    }

    .page {
      min-height: 100vh;
      background: #050510;
      display: flex;
      justify-content: center;
    }

    .board-frame {
      position: relative;
      width: min(100%, 1600px);
      margin: 0 auto;
    }

    .board-bg {
      width: 100%;
      display: block;
      user-select: none;
    }

    .hotspot {
      position: absolute;
      z-index: 50;
      border: 0;
      background: transparent;
      padding: 0;
      cursor: pointer;
      transform: translate(-50%, -50%);
      border-radius: 10px;
    }

    .hotspot:hover {
      box-shadow:
        0 0 18px rgba(0,245,255,.9),
        inset 0 0 18px rgba(255,42,163,.35);
    }

    body.drag-mode .hotspot {
      border: 2px solid #ff2aa3;
      background: rgba(0,245,255,.24);
      box-shadow: 0 0 12px rgba(255,42,163,.8);
      color: white;
      font-weight: 900;
      font-size: 11px;
      text-shadow: 0 2px 4px black;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 4px;
      touch-action: none;
    }

    body.drag-mode .hotspot::after {
      content: attr(data-label);
      pointer-events: none;
    }

    .dev-panel {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 3000;
      width: min(520px, calc(100vw - 24px));
      background: rgba(0,0,0,.88);
      border: 2px solid #00f5ff;
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 0 24px rgba(0,245,255,.65);
    }

    .dev-panel button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 11px;
      margin-top: 8px;
      color: white;
      font-weight: 900;
      cursor: pointer;
      background: #ff2aa3;
    }

    .dev-panel .secondary {
      background: #00aaff;
    }

    .dev-panel p {
      margin: 8px 0 0;
      color: #dffcff;
      font-size: 13px;
      line-height: 1.4;
    }

    body:not(.drag-mode) #copyClues {
      display: none;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.86);
      z-index: 1000;
      padding: 20px;
    }

    .modal.active { display: flex; }

    .modal-box {
      position: relative;
      width: min(720px, 95vw);
      border: 3px solid #ff2aa3;
      border-radius: 24px;
      background: linear-gradient(180deg, #13001f, #050510);
      padding: 28px;
      box-shadow:
        0 0 35px #ff2aa3,
        0 0 65px rgba(0,245,255,.7);
    }

    .close {
      position: absolute;
      top: 10px;
      right: 16px;
      background: transparent;
      border: 0;
      color: white;
      font-size: 34px;
      cursor: pointer;
    }

    .modal-tag {
      color: #ffea00;
      font-weight: 900;
      letter-spacing: 1px;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .modal-box h2 {
      color: #00f5ff;
      margin: 0 0 8px;
      font-size: 2rem;
    }

    .date {
      color: #ff8bd6;
      font-weight: 800;
      margin-bottom: 14px;
    }

    .modal-box p {
      line-height: 1.6;
      color: #eee;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      background: #070711;
      color: white;
      border: 2px solid #00f5ff;
      border-radius: 14px;
      padding: 14px;
      resize: vertical;
      font-size: 1rem;
      margin-top: 10px;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    .modal-btn {
      display: block;
      text-align: center;
      border: 0;
      border-radius: 14px;
      padding: 14px;
      color: white;
      font-weight: 900;
      text-decoration: none;
      cursor: pointer;
    }

    .save-btn { background: #ff2aa3; }
    .x-btn { background: #00aaff; }

    .saved-theories {
      margin-top: 18px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,.2);
    }

    .theory {
      background: rgba(0,245,255,.08);
      border-left: 3px solid #00f5ff;
      margin-top: 10px;
      padding: 10px;
      color: #dffcff;
    }

    @media (max-width: 800px) {
      .board-frame {
        width: 1500px;
        max-width: none;
      }

      .page {
        overflow-x: auto;
        justify-content: flex-start;
      }

      .dev-panel {
        position: fixed;
        left: 8px;
        right: 8px;
        bottom: 8px;
        width: auto;
      }
    }
  </style>
</head>

<body>
  <div class="scanlines"></div>

  <div class="dev-panel">
    <button id="toggleDrag">ENTER DRAG MODE</button>
    <button id="copyClues" class="secondary">COPY UPDATED CLUES</button>
    <p>Drag mode lets you move boxes directly on the board. Copy updated clues after lining everything up.</p>
  </div>

  <main class="page">
    <section class="board-frame">
      <img src="kitty-board-bg.png" class="board-bg" alt="$TEDDY Roaring Kitty Investigation Board" />
      <div id="hotspots"></div>
    </section>
  </main>

  <div id="modal" class="modal">
    <div class="modal-box">
      <button id="closeModal" class="close">×</button>

      <div id="modalTag" class="modal-tag"></div>
      <h2 id="modalTitle"></h2>
      <div id="modalDate" class="date"></div>
      <p id="modalText"></p>

      <h3>Community Theory</h3>
      <textarea id="theoryInput" placeholder="Add your tinfoil theory here..."></textarea>

      <div class="button-row">
        <button id="saveTheory" class="modal-btn save-btn">SAVE THEORY</button>
        <a id="xLink" class="modal-btn x-btn" href="#" target="_blank" rel="noopener">VIEW OG X POST</a>
      </div>

      <div class="saved-theories">
        <h3>Saved Theories</h3>
        <div id="theoryList"></div>
      </div>
    </div>
  </div>

  <script>
    let dragMode = false;

    const clues = [
      { id:"hang", title:"Hang In There", tag:"Poster", date:"Classic Cat Signal", text:"Hold on. Follow the thread.", xPost:"https://x.com/TheRoaringKitty", x:7.9, y:18.7, w:10.5, h:27.5 },
      { id:"top-dog", title:"The Comeback", tag:"The Return", date:"May 12, 2024", text:"The comeback signal. This card starts the board timeline.", xPost:"https://x.com/TheRoaringKitty", x:20.7, y:21.5, w:10.2, h:22.5 },
      { id:"cheers", title:"Cheers", tag:"The Memes Begin", date:"May 13, 2024", text:"The next beat in the timeline. Celebration, confidence, or invitation?", xPost:"https://x.com/TheRoaringKitty", x:31.1, y:21.5, w:8.4, h:22.5 },
      { id:"game-over", title:"Game Over", tag:"Meme Signal", date:"May 14, 2024", text:"A major game/meme signal.", xPost:"https://x.com/TheRoaringKitty", x:40.0, y:21.5, w:8.7, h:22.5 },
      { id:"ill-be-back-1", title:"I'll Be Back", tag:"Movie Signal", date:"May 16, 2024", text:"A return motif. Something is not finished.", xPost:"https://x.com/TheRoaringKitty", x:49.3, y:21.5, w:8.7, h:22.5 },
      { id:"ill-be-back-2", title:"I'll Be Back Again", tag:"Movie Signal", date:"May 16, 2024", text:"Second return signal. We can rename or swap this later if needed.", xPost:"https://x.com/TheRoaringKitty", x:58.3, y:21.5, w:8.7, h:22.5 },
      { id:"whats-next", title:"What's Next", tag:"Transition", date:"May 17, 2024", text:"A bridge clue. What changes after this point?", xPost:"https://x.com/TheRoaringKitty", x:67.3, y:21.5, w:8.7, h:22.5 },
      { id:"time", title:"TIME", tag:"Magazine Clue", date:"May 29, 2024", text:"Why TIME? Timing, countdown, cover symbolism, or something hidden in the frame.", xPost:"https://x.com/TheRoaringKitty", x:79.3, y:19.7, w:10.5, h:25.5 },
      { id:"gift", title:"Gift Box", tag:"Teddy Clue", date:"May 29, 2024", text:"What is inside? Who is the gift for?", xPost:"https://x.com/TheRoaringKitty", x:90.2, y:23.5, w:10.6, h:22.5 },

      { id:"kitty-stare", title:"Kitty Stare", tag:"Game Signal", date:"May 21, 2024", text:"A stare, a pause, a prompt to look closer.", xPost:"https://x.com/TheRoaringKitty", x:21.2, y:50.0, w:9.4, h:22.8 },
      { id:"reverse", title:"Reverse", tag:"Game Signal", date:"UNO Reverse", text:"Direction changes. Roles flip.", xPost:"https://x.com/TheRoaringKitty", x:31.4, y:50.0, w:9.2, h:22.8 },
      { id:"good-boy", title:"Good Boy", tag:"Dog Signal", date:"May 26, 2024", text:"Dog clue. Could connect to loyalty, pets, Chewy, or a companion signal.", xPost:"https://x.com/TheRoaringKitty", x:41.5, y:50.0, w:9.2, h:22.8 },
      { id:"dog", title:"The Dog", tag:"Emoji / Pet Signal", date:"May 27, 2024", text:"A dog image deserves its own node because dog/pet symbolism keeps returning.", xPost:"https://x.com/TheRoaringKitty", x:51.5, y:50.0, w:9.2, h:22.8 },
      { id:"bruno", title:"Bruno / Green Face", tag:"Movie Clip", date:"May 28, 2024", text:"A mysterious emotional beat. Fear, realization, magic, or hidden pressure.", xPost:"https://x.com/TheRoaringKitty", x:61.5, y:50.0, w:9.2, h:22.8 },
      { id:"bandana-cat", title:"Bandana Cat", tag:"Cat Signal", date:"May 28, 2024", text:"The bandana cat is a strong RK identity node.", xPost:"https://x.com/TheRoaringKitty", x:72.0, y:50.0, w:8.5, h:22.8 },
      { id:"handshake", title:"Handshake", tag:"Possible Deal", date:"June 21, 2024", text:"Handshake imagery invites deal, agreement, or partnership theories.", xPost:"https://x.com/TheRoaringKitty", x:82.5, y:50.0, w:9.5, h:22.8 },
      { id:"billionaire", title:"You Were A Billionaire", tag:"Memory / Regret", date:"June 2, 2024", text:"A high-emotion clue. Reminder, warning, or mirror.", xPost:"https://x.com/TheRoaringKitty", x:93.0, y:51.0, w:9.5, h:25.5 },

      { id:"cookie", title:"Tin Foil... Num Num Num", tag:"Tinfoil Corner", date:"Community Joke", text:"The tinfoil monster eats the theories.", xPost:"https://x.com/TheRoaringKitty", x:7.3, y:59.5, w:13.5, h:25 },
      { id:"latest-gif", title:"Latest GIF / Clip", tag:"CRT Monitor", date:"Featured Clip", text:"This CRT can link to the highlighted RK clip or X video.", xPost:"https://x.com/i/status/1874621633777844714", x:7.5, y:80.5, w:13.8, h:22 },

      { id:"amc-gme", title:"AMC / GameStop Gift", tag:"Meme Signal", date:"January 1, 2021", text:"AMC, GameStop, gift box, celebration energy.", xPost:"https://x.com/TheRoaringKitty", x:21.2, y:75.5, w:9.2, h:22 },
      { id:"teddy", title:"Teddy?", tag:"Teddy Signal", date:"June 7, 2024", text:"Comfort? Waiting? Teddy?", xPost:"https://x.com/TheRoaringKitty", x:31.6, y:75.5, w:9.2, h:22 },
      { id:"pain", title:"Pain", tag:"Emotional Beat", date:"June 8, 2024", text:"Pain, pressure, endurance.", xPost:"https://x.com/TheRoaringKitty", x:42.0, y:75.5, w:9.2, h:22 },
      { id:"lean-in", title:"Lean In", tag:"Instruction", date:"June 10, 2024", text:"Lean in. Pay attention. Get closer.", xPost:"https://x.com/TheRoaringKitty", x:52.5, y:75.5, w:9.2, h:22 },
      { id:"journey", title:"The Journey Continues", tag:"Final Signal", date:"June 3, 2024", text:"The journey continues.", xPost:"https://x.com/TheRoaringKitty", x:63.0, y:75.5, w:9.2, h:22 },
      { id:"focus", title:"Focus / Discipline", tag:"Signal Node", date:"June 6, 2024", text:"Focus. Discipline. Lock in.", xPost:"https://x.com/TheRoaringKitty", x:72.2, y:70.0, w:8.6, h:21 },
      { id:"yellow-note", title:"No One Knows The Full Story", tag:"Sticky Note", date:"Board Note", text:"We are all just connecting the clues.", xPost:"https://x.com/TheRoaringKitty", x:81.3, y:74.5, w:9.5, h:18 },
      { id:"possible-signs", title:"Possible Signs", tag:"Checklist", date:"Open Questions", text:"Headband? Return? Next chapter? Teddy? Double meaning? Reverse everything?", xPost:"https://x.com/TheRoaringKitty", x:91.2, y:78.5, w:11, h:23 },

      { id:"all-clues", title:"All Clues", tag:"Archive Button", date:"Chronological Archive", text:"This will eventually open the full chronological archive of every RK post.", xPost:"https://x.com/TheRoaringKitty", x:44.5, y:93.5, w:14, h:7 },
      { id:"emoji", title:"Emoji Timeline", tag:"Navigation", date:"See Every Emoji", text:"Jump back to the interactive emoji corkboard.", xPost:"emoji.html", nav:"emoji.html", x:60.5, y:93.5, w:14, h:7 },
      { id:"notes", title:"Community Notes", tag:"Theory Hub", date:"Add Your Theories", text:"General board notes.", xPost:"https://x.com/TheRoaringKitty", x:77.0, y:93.5, w:15, h:7 },
      { id:"hub", title:"Hub", tag:"Navigation", date:"Return Home", text:"Return to the main investigation hub.", xPost:"hub.html", nav:"hub.html", x:92.0, y:93.5, w:10, h:7 }
    ];

    const hotspots = document.getElementById("hotspots");
    const modal = document.getElementById("modal");
    const modalTag = document.getElementById("modalTag");
    const modalTitle = document.getElementById("modalTitle");
    const modalDate = document.getElementById("modalDate");
    const modalText = document.getElementById("modalText");
    const theoryInput = document.getElementById("theoryInput");
    const saveTheory = document.getElementById("saveTheory");
    const theoryList = document.getElementById("theoryList");
    const closeModal = document.getElementById("closeModal");
    const xLink = document.getElementById("xLink");
    const toggleDrag = document.getElementById("toggleDrag");
    const copyClues = document.getElementById("copyClues");

    let activeClue = null;

    function updateDragModeUI() {
      document.body.classList.toggle("drag-mode", dragMode);
      toggleDrag.textContent = dragMode ? "EXIT DRAG MODE" : "ENTER DRAG MODE";
    }

    function printClues() {
      return `const clues = [\n${clues.map(c => {
        const navPart = c.nav ? `, nav:${JSON.stringify(c.nav)}` : "";
        return `  { id:${JSON.stringify(c.id)}, title:${JSON.stringify(c.title)}, tag:${JSON.stringify(c.tag)}, date:${JSON.stringify(c.date)}, text:${JSON.stringify(c.text)}, xPost:${JSON.stringify(c.xPost)}${navPart}, x:${c.x}, y:${c.y}, w:${c.w}, h:${c.h} }`;
      }).join(",\n")}\n];`;
    }

    function copyUpdatedClues() {
      const text = printClues();
      navigator.clipboard.writeText(text).then(() => {
        copyClues.textContent = "COPIED!";
        setTimeout(() => copyClues.textContent = "COPY UPDATED CLUES", 1200);
      }).catch(() => {
        console.log(text);
        alert("Could not copy automatically. Open console and copy clues there.");
      });
    }

    clues.forEach((clue, index) => {
      const button = document.createElement("button");
      button.className = "hotspot";
      button.dataset.label = clue.title;
      button.style.left = clue.x + "%";
      button.style.top = clue.y + "%";
      button.style.width = clue.w + "%";
      button.style.height = clue.h + "%";
      button.title = clue.title;
      button.setAttribute("aria-label", clue.title);

      let startX = 0;
      let startY = 0;
      let startLeft = 0;
      let startTop = 0;

      button.addEventListener("pointerdown", (event) => {
        if (!dragMode) return;

        event.preventDefault();
        button.setPointerCapture(event.pointerId);

        const frame = document.querySelector(".board-frame");
        const rect = frame.getBoundingClientRect();

        startX = event.clientX;
        startY = event.clientY;
        startLeft = clue.x;
        startTop = clue.y;

        function moveBox(e) {
          const dx = ((e.clientX - startX) / rect.width) * 100;
          const dy = ((e.clientY - startY) / rect.height) * 100;

          clue.x = Number((startLeft + dx).toFixed(2));
          clue.y = Number((startTop + dy).toFixed(2));

          button.style.left = clue.x + "%";
          button.style.top = clue.y + "%";
        }

        function stopMove() {
          button.releasePointerCapture(event.pointerId);
          button.removeEventListener("pointermove", moveBox);
          button.removeEventListener("pointerup", stopMove);
          button.removeEventListener("pointercancel", stopMove);
          console.clear();
          console.log(printClues());
        }

        button.addEventListener("pointermove", moveBox);
        button.addEventListener("pointerup", stopMove);
        button.addEventListener("pointercancel", stopMove);
      });

      button.addEventListener("click", (event) => {
        if (dragMode) {
          event.preventDefault();
          return;
        }

        if (clue.nav) {
          window.location.href = clue.nav;
          return;
        }

        openClue(index);
      });

      hotspots.appendChild(button);
    });

    toggleDrag.addEventListener("click", () => {
      dragMode = !dragMode;
      updateDragModeUI();
    });

    copyClues.addEventListener("click", copyUpdatedClues);

    updateDragModeUI();

    function openClue(index) {
      activeClue = clues[index];

      modalTag.textContent = activeClue.tag;
      modalTitle.textContent = activeClue.title;
      modalDate.textContent = activeClue.date;
      modalText.textContent = activeClue.text;
      theoryInput.value = "";

      xLink.href = activeClue.xPost;
      xLink.textContent = activeClue.xPost.includes("x.com") ? "VIEW OG X POST" : "OPEN LINK";

      renderTheories();
      modal.classList.add("active");
    }

    function getTheoryKey() {
      return `kitty-theories-${activeClue.id}`;
    }

    function renderTheories() {
      theoryList.innerHTML = "";
      const saved = JSON.parse(localStorage.getItem(getTheoryKey()) || "[]");

      if (saved.length === 0) {
        theoryList.innerHTML = "<p>No theories saved yet.</p>";
        return;
      }

      saved.forEach((text) => {
        const div = document.createElement("div");
        div.className = "theory";
        div.textContent = text;
        theoryList.appendChild(div);
      });
    }

    saveTheory.addEventListener("click", () => {
      if (!activeClue) return;
      const text = theoryInput.value.trim();
      if (!text) return;

      const key = getTheoryKey();
      const saved = JSON.parse(localStorage.getItem(key) || "[]");
      saved.unshift(text);
      localStorage.setItem(key, JSON.stringify(saved));
      theoryInput.value = "";
      renderTheories();
    });

    closeModal.addEventListener("click", () => modal.classList.remove("active"));

    modal.addEventListener("click", (event) => {
      if (event.target === modal) modal.classList.remove("active");
    });
  </script>
</body>
</html>
