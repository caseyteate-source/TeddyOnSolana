<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>$TEDDY | Kitty Files</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #050510;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.045) 0,
        rgba(255,255,255,.045) 1px,
        transparent 2px,
        transparent 5px
      );
      mix-blend-mode: overlay;
    }

    .page {
      min-height: 100vh;
      background: #050510;
      display: flex;
      justify-content: center;
    }

    .board-frame {
      position: relative;
      width: min(100%, 1600px);
      margin: 0 auto;
    }

    .board-bg {
      width: 100%;
      display: block;
      user-select: none;
    }

    .hotspot {
      position: absolute;
      z-index: 50;
      border: 0;
      background: transparent;
      padding: 0;
      cursor: pointer;
      transform: translate(-50%, -50%);
    }

    .hotspot:hover {
      box-shadow:
        0 0 18px rgba(0,245,255,.9),
        inset 0 0 18px rgba(255,42,163,.35);
      border-radius: 10px;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.86);
      z-index: 1000;
      padding: 20px;
    }

    .modal.active { display: flex; }

    .modal-box {
      position: relative;
      width: min(720px, 95vw);
      border: 3px solid #ff2aa3;
      border-radius: 24px;
      background: linear-gradient(180deg, #13001f, #050510);
      padding: 28px;
      box-shadow:
        0 0 35px #ff2aa3,
        0 0 65px rgba(0,245,255,.7);
    }

    .close {
      position: absolute;
      top: 10px;
      right: 16px;
      background: transparent;
      border: 0;
      color: white;
      font-size: 34px;
      cursor: pointer;
    }

    .modal-tag {
      color: #ffea00;
      font-weight: 900;
      letter-spacing: 1px;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .modal-box h2 {
      color: #00f5ff;
      margin: 0 0 8px;
      font-size: 2rem;
    }

    .date {
      color: #ff8bd6;
      font-weight: 800;
      margin-bottom: 14px;
    }

    .modal-box p {
      line-height: 1.6;
      color: #eee;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      background: #070711;
      color: white;
      border: 2px solid #00f5ff;
      border-radius: 14px;
      padding: 14px;
      resize: vertical;
      font-size: 1rem;
      margin-top: 10px;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    .modal-btn {
      display: block;
      text-align: center;
      border: 0;
      border-radius: 14px;
      padding: 14px;
      color: white;
      font-weight: 900;
      text-decoration: none;
      cursor: pointer;
    }

    .save-btn {
      background: #ff2aa3;
    }

    .x-btn {
      background: #00aaff;
    }

    .saved-theories {
      margin-top: 18px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,.2);
    }

    .theory {
      background: rgba(0,245,255,.08);
      border-left: 3px solid #00f5ff;
      margin-top: 10px;
      padding: 10px;
      color: #dffcff;
    }

    @media (max-width: 800px) {
      .board-frame {
        width: 1500px;
        max-width: none;
      }

      .page {
        overflow-x: auto;
        justify-content: flex-start;
      }
    }
  </style>
</head>

      {

        date: "Add Your Theories",
        text: "This opens the community theory modal for general board notes.",
        xPost: "https://x.com/TheRoaringKitty",

    const hotspots = document.getElementById("hotspots");
    const modal = document.getElementById("modal");
    const modalTag = document.getElementById("modalTag");
    const modalTitle = document.getElementById("modalTitle");
    const modalDate = document.getElementById("modalDate");
    const modalText = document.getElementById("modalText");
    const theoryInput = document.getElementById("theoryInput");
    const saveTheory = document.getElementById("saveTheory");
    const theoryList = document.getElementById("theoryList");
    const closeModal = document.getElementById("closeModal");
    const xLink = document.getElementById("xLink");

    let activeClue = null;

    clues.forEach((clue, index) => {
      const button = document.createElement("button");
      button.className = "hotspot";
      button.style.left = clue.x + "%";
      button.style.top = clue.y + "%";
      button.style.width = clue.w + "%";
      button.style.height = clue.h + "%";
      button.title = clue.title;
      button.setAttribute("aria-label", clue.title);

      button.addEventListener("click", () => {
        if (clue.nav) {
          window.location.href = clue.nav;
          return;
        }
        openClue(index);
      });

      hotspots.appendChild(button);
    });

    function openClue(index) {
      activeClue = clues[index];

      modalTag.textContent = activeClue.tag;
      modalTitle.textContent = activeClue.title;
      modalDate.textContent = activeClue.date;
      modalText.textContent = activeClue.text;
      theoryInput.value = "";

      xLink.href = activeClue.xPost;
      xLink.textContent = activeClue.xPost.includes("x.com")
        ? "VIEW OG X POST"
        : "OPEN LINK";

      renderTheories();
      modal.classList.add("active");
    }

    function getTheoryKey() {
      return `kitty-theories-${activeClue.id}`;
    }

    function renderTheories() {
      theoryList.innerHTML = "";

      const saved = JSON.parse(localStorage.getItem(getTheoryKey()) || "[]");

      if (saved.length === 0) {
        theoryList.innerHTML = "<p>No theories saved yet.</p>";
        return;
      }

      saved.forEach((text) => {
        const div = document.createElement("div");
        div.className = "theory";
        div.textContent = text;
        theoryList.appendChild(div);
      });
    }

    saveTheory.addEventListener("click", () => {
      if (!activeClue) return;

      const text = theoryInput.value.trim();
      if (!text) return;

      const key = getTheoryKey();
      const saved = JSON.parse(localStorage.getItem(key) || "[]");

      saved.unshift(text);
      localStorage.setItem(key, JSON.stringify(saved));

      theoryInput.value = "";
      renderTheories();
    });

    closeModal.addEventListener("click", () => {
      modal.classList.remove("active");
    });

    modal.addEventListener("click", (event) => {
      if (event.target === modal) {
        modal.classList.remove("active");
      }
    });
