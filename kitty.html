<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>$TEDDY | Kitty Files</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #050306;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.035) 0,
        rgba(255,255,255,.035) 1px,
        transparent 2px,
        transparent 5px
      );
      mix-blend-mode: overlay;
    }

    .room {
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 50% 8%, rgba(255,210,125,.30), transparent 27%),
        radial-gradient(circle at 50% 38%, rgba(255,175,70,.16), transparent 42%),
        linear-gradient(180deg, #1a1010 0%, #0b0708 55%, #030203 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 34px 18px 46px;
    }

    .room::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255,255,255,.018) 1px, transparent 1px);
      background-size: 72px 72px;
      opacity: .3;
    }

    .room::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      background:
        radial-gradient(ellipse at center, transparent 33%, rgba(0,0,0,.48) 75%, rgba(0,0,0,.82) 100%);
    }

    .lamp {
      position: fixed;
      top: -6px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      width: 130px;
      height: 80px;
      pointer-events: none;
    }

    .lamp::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 0;
      width: 3px;
      height: 34px;
      transform: translateX(-50%);
      background: rgba(255,235,180,.65);
    }

    .lamp::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 30px;
      width: 92px;
      height: 42px;
      transform: translateX(-50%);
      border-radius: 50% 50% 12px 12px;
      background: linear-gradient(180deg, #2d2520, #0d0909);
      box-shadow: 0 10px 55px rgba(255,205,105,.55);
    }

    .board-frame {
      position: relative;
      z-index: 5;
      width: min(100%, 1500px);
      margin: 0 auto;
      filter: drop-shadow(0 24px 42px rgba(0,0,0,.75));
    }

    .board-frame::before {
      content: "";
      position: absolute;
      inset: -18px;
      z-index: -1;
      border-radius: 18px;
      background: rgba(0,0,0,.28);
      box-shadow:
        0 0 80px rgba(255,180,70,.18),
        inset 0 0 40px rgba(255,255,255,.035);
    }

    .board-bg {
      width: 100%;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .hotspot {
      position: absolute;
      z-index: 50;
      border: 0;
      background: transparent;
      padding: 0;
      cursor: pointer;
      transform: translate(-50%, -50%);
      border-radius: 10px;
    }

    .hotspot:hover {
      box-shadow:
        0 0 18px rgba(0,245,255,.9),
        inset 0 0 18px rgba(255,42,163,.28);
      background: rgba(255,255,255,.025);
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.86);
      z-index: 1000;
      padding: 20px;
    }

    .modal.active { display: flex; }

    .modal-box {
      position: relative;
      width: min(720px, 95vw);
      border: 3px solid #ff2aa3;
      border-radius: 24px;
      background: linear-gradient(180deg, #13001f, #050510);
      padding: 28px;
      box-shadow:
        0 0 35px #ff2aa3,
        0 0 65px rgba(0,245,255,.7);
    }

    .close {
      position: absolute;
      top: 10px;
      right: 16px;
      background: transparent;
      border: 0;
      color: white;
      font-size: 34px;
      cursor: pointer;
    }

    .modal-tag {
      color: #ffea00;
      font-weight: 900;
      letter-spacing: 1px;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .modal-box h2 {
      color: #00f5ff;
      margin: 0 0 8px;
      font-size: 2rem;
    }

    .date {
      color: #ff8bd6;
      font-weight: 800;
      margin-bottom: 14px;
    }

    .modal-box p {
      line-height: 1.6;
      color: #eee;
    }

    .related-links {
      display: grid;
      gap: 10px;
      margin: 18px 0;
    }

    .related-links a {
      display: block;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(0,245,255,.10);
      border: 1px solid rgba(0,245,255,.55);
      color: #dffcff;
      text-decoration: none;
      font-weight: 900;
    }

    .related-links a:hover {
      background: rgba(255,42,163,.16);
      border-color: #ff2aa3;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      background: #070711;
      color: white;
      border: 2px solid #00f5ff;
      border-radius: 14px;
      padding: 14px;
      resize: vertical;
      font-size: 1rem;
      margin-top: 10px;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    .modal-btn {
      display: block;
      text-align: center;
      border: 0;
      border-radius: 14px;
      padding: 14px;
      color: white;
      font-weight: 900;
      text-decoration: none;
      cursor: pointer;
    }

    .save-btn { background: #ff2aa3; }
    .x-btn { background: #00aaff; }

    .saved-theories {
      margin-top: 18px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,.2);
    }

    .theory {
      background: rgba(0,245,255,.08);
      border-left: 3px solid #00f5ff;
      margin-top: 10px;
      padding: 10px;
      color: #dffcff;
    }

    @media (max-width: 800px) {
      .room {
        overflow-x: auto;
        justify-content: flex-start;
        padding: 24px 0 34px;
      }

      .board-frame {
        width: 1500px;
        max-width: none;
        margin-left: 0;
      }

      .modal-box {
        padding: 22px;
      }
    }
  </style>
  </style>

<link rel="stylesheet" href="wiki-card-skin.css?v=2" />
</head>
</head>

<body>
  <div class="scanlines"></div>

  <main class="room">
    <section class="board-frame">
      <img src="kitty-board-bg.png" class="board-bg" alt="$TEDDY Roaring Kitty Investigation Board" />
      <div id="hotspots"></div>

  <div id="modal" class="modal">

      <button id="closeModal" class="close">×</button>

      <div id="modalTag" class="modal-tag"></div>
      <h2 id="modalTitle"></h2>
      <div id="modalDate" class="date"></div>
      <p id="modalText"></p>
      <div id="relatedLinks" class="related-links"></div>

      <h3>Community Theory</h3>
      <textarea id="theoryInput" placeholder="Add your tinfoil theory here..."></textarea>

      <div class="button-row">
        <button id="saveTheory" class="modal-btn save-btn">SAVE THEORY</button>
        <a id="xLink" class="modal-btn x-btn" href="#" target="_blank" rel="noopener">VIEW OG X POST</a>
      </div>

      <div class="saved-theories">
        <h3>Saved Theories</h3>
        <div id="theoryList"></div>
      </div>
    </div>
  </div>

  <script>
    const clues = [
      { id:"hang", title:"Hang In There", tag:"Poster", date:"Classic Cat Signal", text:"Hold on. Follow the thread.", xPost:"https://x.com/TheRoaringKitty", x:7.96, y:18.9, w:10.5, h:27.5 },

      { id:"cheers", title:"Cheers", tag:"The Memes Begin", date:"May 13, 2024", text:"The next beat in the timeline. Celebration, confidence, or invitation?", xPost:"https://x.com/TheRoaringKitty", x:30.4, y:23.28, w:8.4, h:22.5 },
      { id:"game-over", title:"Game Over", tag:"Meme Signal", date:"May 14, 2024", text:"A major game/meme signal.", xPost:"https://x.com/TheRoaringKitty", x:39.98, y:22.99, w:8.7, h:22.5 },
      { id:"ill-be-back-1", title:"I'll Be Back", tag:"Movie Signal", date:"May 16, 2024", text:"A return motif. Something is not finished.", xPost:"https://x.com/TheRoaringKitty", x:49.95, y:22.67, w:8.7, h:22.5 },
      { id:"ill-be-back-2", title:"I'll Be Back Again", tag:"Movie Signal", date:"May 16, 2024", text:"Second return signal. We can rename or swap this later if needed.", xPost:"https://x.com/TheRoaringKitty", x:58.82, y:22.13, w:8.7, h:22.5 },
      { id:"whats-next", title:"What's Next", tag:"Transition", date:"May 17, 2024", text:"A bridge clue. What changes after this point?", xPost:"https://x.com/TheRoaringKitty", x:67.82, y:21.8, w:8.7, h:22.5 },
      { id:"time", title:"TIME", tag:"Magazine Clue", date:"May 29, 2024", text:"Why TIME? Timing, countdown, cover symbolism, or something hidden in the frame.", xPost:"https://x.com/TheRoaringKitty", x:77, y:17.03, w:10.5, h:25.5 },
      { id:"gift", title:"Gift Box", tag:"Teddy Clue", date:"May 29, 2024", text:"What is inside? Who is the gift for?", xPost:"https://x.com/TheRoaringKitty", x:88.2, y:24.93, w:10.6, h:22.5 },

      { id:"kitty-stare", title:"Kitty Stare", tag:"Game Signal", date:"May 21, 2024", text:"A stare, a pause, a prompt to look closer.", xPost:"https://x.com/TheRoaringKitty", x:20.8, y:48.56, w:9.4, h:22.8 },
      { id:"reverse", title:"Reverse", tag:"Game Signal", date:"UNO Reverse", text:"Direction changes. Roles flip.", xPost:"https://x.com/TheRoaringKitty", x:30.97, y:48.42, w:9.2, h:22.8 },
      { id:"good-boy", title:"Good Boy", tag:"Dog Signal", date:"May 26, 2024", text:"Dog clue. Could connect to loyalty, pets, Chewy, or a companion signal.", xPost:"https://x.com/TheRoaringKitty", x:40.69, y:48.57, w:9.2, h:22.8 },
      { id:"dog", title:"The Dog", tag:"Emoji / Pet Signal", date:"May 27, 2024", text:"A dog image deserves its own node because dog/pet symbolism keeps returning.", xPost:"https://x.com/TheRoaringKitty", x:50.46, y:48.21, w:9.2, h:22.8 },
      { id:"bruno", title:"Bruno / Green Face", tag:"Movie Clip", date:"May 28, 2024", text:"A mysterious emotional beat. Fear, realization, magic, or hidden pressure.", xPost:"https://x.com/TheRoaringKitty", x:60.91, y:47.97, w:9.2, h:22.8 },
      { id:"bandana-cat", title:"Bandana Cat", tag:"Cat Signal", date:"May 28, 2024", text:"The bandana cat is a strong RK identity node.", xPost:"https://x.com/TheRoaringKitty", x:71.91, y:44.2, w:8.5, h:22.8 },
      {
        id:"handshake",
        title:"Handshake",
        tag:"Possible Deal",
        date:"June 21, 2024",
        text:"Handshake imagery invites deal, agreement, partnership, merger, or negotiation theories.",
        xPost:"https://x.com/TheRoaringKitty",
        related:[
          { label:"🎬 Watch The Office Handshake Clip", url:"https://youtu.be/ueVby9HffPE?si=mKHsioajJn5Z0eJh" },
          { label:"🐦 Original Roaring Kitty X Post", url:"https://x.com/TheRoaringKitty" }
        ],
        x:81.77,
        y:49.94,
        w:9.5,
        h:22.8
      },
      { id:"billionaire", title:"You Were A Billionaire", tag:"Memory / Regret", date:"June 2, 2024", text:"A high-emotion clue. Reminder, warning, or mirror.", xPost:"https://x.com/TheRoaringKitty", x:92.56, y:51.73, w:9.5, h:25.5 },

      { id:"cookie", title:"Tin Foil... Num Num Num", tag:"Tinfoil Corner", date:"Community Joke", text:"The tinfoil monster eats the theories.", xPost:"https://x.com/TheRoaringKitty", x:7.43, y:58.6, w:13.5, h:25 },
      { id:"latest-gif", title:"Latest GIF / Clip", tag:"CRT Monitor", date:"Featured Clip", text:"This CRT can link to the highlighted RK clip or X video.", xPost:"https://x.com/i/status/1874621633777844714", x:8.91, y:82.36, w:13.8, h:22 },

      { id:"amc-gme", title:"AMC / GameStop Gift", tag:"Meme Signal", date:"January 1, 2021", text:"AMC, GameStop, gift box, celebration energy.", xPost:"https://x.com/TheRoaringKitty", x:21.19, y:72.08, w:9.2, h:22 },
      { id:"teddy", title:"Teddy?", tag:"Teddy Signal", date:"June 7, 2024", text:"Comfort? Waiting? Teddy?", xPost:"https://x.com/TheRoaringKitty", x:31.31, y:72.76, w:9.2, h:22 },
      { id:"pain", title:"Pain", tag:"Emotional Beat", date:"June 8, 2024", text:"Pain, pressure, endurance.", xPost:"https://x.com/TheRoaringKitty", x:41.24, y:72.42, w:9.2, h:22 },
      { id:"lean-in", title:"Lean In", tag:"Instruction", date:"June 10, 2024", text:"Lean in. Pay attention. Get closer.", xPost:"https://x.com/TheRoaringKitty", x:51.66, y:71.72, w:9.2, h:22 },
      { id:"journey", title:"The Journey Continues", tag:"Final Signal", date:"June 3, 2024", text:"The journey continues.", xPost:"https://x.com/TheRoaringKitty", x:61.64, y:71.66, w:9.2, h:22 },
      { id:"focus", title:"Focus / Discipline", tag:"Signal Node", date:"June 6, 2024", text:"Focus. Discipline. Lock in.", xPost:"https://x.com/TheRoaringKitty", x:72.13, y:66.52, w:8.6, h:21 },
      { id:"yellow-note", title:"No One Knows The Full Story", tag:"Sticky Note", date:"Board Note", text:"We are all just connecting the clues.", xPost:"https://x.com/TheRoaringKitty", x:81.17, y:74.36, w:9.5, h:18 },
      { id:"possible-signs", title:"Possible Signs", tag:"Checklist", date:"Open Questions", text:"Headband? Return? Next chapter? Teddy? Double meaning? Reverse everything?", xPost:"https://x.com/TheRoaringKitty", x:92.01, y:78.84, w:11, h:23 },

      { id:"all-clues", title:"All Clues", tag:"Archive Button", date:"Chronological Archive", text:"This will eventually open the full chronological archive of every RK post.", xPost:"https://x.com/TheRoaringKitty", x:43.6, y:94.27, w:14, h:7 },
      { id:"emoji", title:"Emoji Timeline", tag:"Navigation", date:"See Every Emoji", text:"Jump back to the interactive emoji corkboard.", xPost:"emoji.html", nav:"emoji.html", x:59.21, y:94.31, w:14, h:7 },
      { id:"notes", title:"Community Notes", tag:"Theory Hub", date:"Add Your Theories", text:"General board notes.", xPost:"https://x.com/TheRoaringKitty", x:76.5, y:94.13, w:15, h:7 },
      { id:"hub", title:"Hub", tag:"Navigation", date:"Return Home", text:"Return to the main investigation hub.", xPost:"hub.html", nav:"hub.html", x:90.18, y:94.2, w:10, h:7 }
    ];

    const hotspots = document.getElementById("hotspots");
    const modal = document.getElementById("modal");
    const modalTag = document.getElementById("modalTag");
    const modalTitle = document.getElementById("modalTitle");
    const modalDate = document.getElementById("modalDate");
    const modalText = document.getElementById("modalText");
    const relatedLinks = document.getElementById("relatedLinks");
    const theoryInput = document.getElementById("theoryInput");
    const saveTheory = document.getElementById("saveTheory");
    const theoryList = document.getElementById("theoryList");
    const closeModal = document.getElementById("closeModal");
    const xLink = document.getElementById("xLink");

    let activeClue = null;

    clues.forEach((clue, index) => {
      const button = document.createElement("button");
      button.className = "hotspot";
      button.style.left = clue.x + "%";
      button.style.top = clue.y + "%";
      button.style.width = clue.w + "%";
      button.style.height = clue.h + "%";
      button.title = clue.title;
      button.setAttribute("aria-label", clue.title);

      button.addEventListener("click", () => {
        if (clue.nav) {
          window.location.href = clue.nav;
          return;
        }

        openClue(index);
      });

      hotspots.appendChild(button);
    });

    function openClue(index) {
      activeClue = clues[index];

      modalTag.textContent = activeClue.tag;
      modalTitle.textContent = activeClue.title;
      modalDate.textContent = activeClue.date;
      modalText.textContent = activeClue.text;
      theoryInput.value = "";

      relatedLinks.innerHTML = "";

      if (activeClue.related && activeClue.related.length) {
        activeClue.related.forEach(link => {
          const a = document.createElement("a");
          a.href = link.url;
          a.target = "_blank";
          a.rel = "noopener";
          a.textContent = link.label;
          relatedLinks.appendChild(a);
        });
      }

      xLink.href = activeClue.xPost;
      xLink.textContent = activeClue.xPost.includes("x.com") ? "🐦 ORIGINAL X POST" : "OPEN LINK";

      renderTheories();
      modal.classList.add("active");
    }

    function getTheoryKey() {
      return `kitty-theories-${activeClue.id}`;
    }

    function renderTheories() {
      theoryList.innerHTML = "";
      const saved = JSON.parse(localStorage.getItem(getTheoryKey()) || "[]");

      if (saved.length === 0) {
        theoryList.innerHTML = "<p>No theories saved yet.</p>";
        return;
      }

      saved.forEach((text) => {
        const div = document.createElement("div");
        div.className = "theory";
        div.textContent = text;
        theoryList.appendChild(div);
      });
    }

    saveTheory.addEventListener("click", () => {
      if (!activeClue) return;

      const text = theoryInput.value.trim();
      if (!text) return;

      const key = getTheoryKey();
      const saved = JSON.parse(localStorage.getItem(key) || "[]");
      saved.unshift(text);
      localStorage.setItem(key, JSON.stringify(saved));
      theoryInput.value = "";
      renderTheories();
    });

    closeModal.addEventListener("click", () => modal.classList.remove("active"));

    modal.addEventListener("click", (event) => {
      if (event.target === modal) modal.classList.remove("active");
    });
  </script>
</body>
</html>
