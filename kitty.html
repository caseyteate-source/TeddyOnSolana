<head>
  <meta charset="UTF-8" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Audiowide&family=Bungee+Shade&family=Faster+One&family=Monoton&family=Orbitron:wght@500;700;900&family=Permanent+Marker&family=Space+Mono:wght@400;700&display=swap');

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #050306;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.035) 0,
        rgba(255,255,255,.035) 1px,
        transparent 2px,
        transparent 5px
      );
      mix-blend-mode: overlay;
    }

    .room {
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 50% 8%, rgba(255,210,125,.30), transparent 27%),
        radial-gradient(circle at 50% 38%, rgba(255,175,70,.16), transparent 42%),
        linear-gradient(180deg, #1a1010 0%, #0b0708 55%, #030203 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 34px 18px 46px;
    }

    .room::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255,255,255,.018) 1px, transparent 1px);
      background-size: 72px 72px;
      opacity: .3;
    }

    .room::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      background:
        radial-gradient(ellipse at center, transparent 33%, rgba(0,0,0,.48) 75%, rgba(0,0,0,.82) 100%);
    }

    .lamp {
      position: fixed;
      top: -6px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      width: 130px;
      height: 80px;
      pointer-events: none;
    }

    .lamp::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 0;
      width: 3px;
      height: 34px;
      transform: translateX(-50%);
      background: rgba(255,235,180,.65);
    }

    .lamp::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 30px;
      width: 92px;
      height: 42px;
      transform: translateX(-50%);
      border-radius: 50% 50% 12px 12px;
      background: linear-gradient(180deg, #2d2520, #0d0909);
      box-shadow: 0 10px 55px rgba(255,205,105,.55);
    }

    .board-frame {
      position: relative;
      z-index: 5;
      width: min(100%, 1500px);
      margin: 0 auto;
      filter: drop-shadow(0 24px 42px rgba(0,0,0,.75));
    }

    .board-frame::before {
      content: "";
      position: absolute;
      inset: -18px;
      z-index: -1;
      border-radius: 18px;
      background: rgba(0,0,0,.28);
      box-shadow:
        0 0 80px rgba(255,180,70,.18),
        inset 0 0 40px rgba(255,255,255,.035);
    }

    .board-bg {
      width: 100%;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .hotspot {
      position: absolute;
      z-index: 50;
      border: 0;
      background: transparent;
      padding: 0;
      cursor: pointer;
      transform: translate(-50%, -50%);
      border-radius: 10px;
    }

    .hotspot:hover {
      box-shadow:
        0 0 18px rgba(0,245,255,.9),
        inset 0 0 18px rgba(255,42,163,.28);
      background: rgba(255,255,255,.025);
    }

    /* ======================================================
       RADICAL 80s MODAL / WIKI CARD STYLE
    ====================================================== */

    :root {
      --wiki-hot-pink: #ff2aa3;
      --wiki-pink-2: #ff72cc;
      --wiki-cyan: #00f5ff;
      --wiki-blue: #178dff;
      --wiki-yellow: #ffe84a;
      --wiki-purple: #180026;
      --wiki-purple-2: #2b044f;
      --wiki-black: #030008;
      --wiki-white: #f9fbff;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
      background:
        radial-gradient(circle at 50% 18%, rgba(0,245,255,.17), transparent 32%),
        radial-gradient(circle at 50% 80%, rgba(255,42,163,.16), transparent 34%),
        rgba(0,0,0,.88);
      backdrop-filter: blur(8px) saturate(1.15);
    }

    .modal.active {
      display: flex;
    }

    .modal-box {
      width: min(820px, 94vw);
      max-height: 92vh;
      overflow-y: auto;
      position: relative;

      padding: 34px 30px 30px;
      border-radius: 30px;
      border: 4px solid var(--wiki-hot-pink);

      text-align: center;

      background:
        linear-gradient(135deg, rgba(0,245,255,.13), transparent 27%),
        linear-gradient(315deg, rgba(255,42,163,.16), transparent 32%),
        linear-gradient(180deg, var(--wiki-purple-2), var(--wiki-purple) 55%, var(--wiki-black));

      box-shadow:
        0 0 18px rgba(255,42,163,1),
        0 0 42px rgba(255,42,163,.52),
        0 0 72px rgba(0,245,255,.36),
        inset 0 0 28px rgba(0,245,255,.10);
    }

    .modal-box::before {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 22px;
      pointer-events: none;
      border: 1px solid rgba(0,245,255,.34);
      box-shadow:
        inset 0 0 18px rgba(0,245,255,.12),
        inset 0 0 28px rgba(255,42,163,.10);
      z-index: 0;
    }

    .modal-box::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,.045) 0px,
          rgba(255,255,255,.045) 1px,
          transparent 2px,
          transparent 5px
        );
      opacity: .22;
      mix-blend-mode: screen;
    }

    .modal-box > * {
      position: relative;
      z-index: 2;
    }

    .close {
      position: absolute;
      top: 12px;
      right: 18px;
      z-index: 5;

      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;

      background: rgba(255,42,163,.12);
      border: 1px solid rgba(255,42,163,.42);
      border-radius: 999px;

      color: white;
      font-family: "Orbitron", sans-serif;
      font-size: 34px;
      font-weight: 900;
      line-height: 1;
      cursor: pointer;

      text-shadow:
        0 0 8px var(--wiki-hot-pink),
        0 0 18px var(--wiki-hot-pink);
    }

    .close:hover {
      color: var(--wiki-cyan);
      border-color: var(--wiki-cyan);
      text-shadow:
        0 0 8px var(--wiki-cyan),
        0 0 18px var(--wiki-cyan);
    }

    .modal-tag {
      display: inline-block;
      margin: 0 auto 12px;
      padding: 8px 16px;

      border-radius: 999px;
      border: 1px solid rgba(255,232,74,.55);
      background: rgba(255,232,74,.11);

      color: var(--wiki-yellow);
      font-family: "Orbitron", sans-serif;
      font-size: clamp(11px, 1.15vw, 13px);
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      line-height: 1.2;

      text-shadow:
        0 0 8px rgba(255,232,74,.78),
        0 0 16px rgba(255,232,74,.30);
    }

    .modal-box h2 {
      display: block;
      width: 100%;

      margin: 0 auto 12px;
      text-align: center;

      font-family: "Bungee Shade", "Faster One", "Arial Black", sans-serif;
      font-size: clamp(38px, 5.5vw, 76px);
      font-weight: 400;
      line-height: .9;
      letter-spacing: 1px;
      text-transform: uppercase;

      background: linear-gradient(
        180deg,
        #ffffff 0%,
        #ffd6ee 13%,
        #ff79c6 30%,
        #ff2aa3 48%,
        #36f5ff 72%,
        #167cff 100%
      );

      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;

      filter:
        drop-shadow(0 5px 0 rgba(0,0,0,.35))
        drop-shadow(0 0 10px rgba(255,42,163,.34))
        drop-shadow(0 0 18px rgba(0,245,255,.18));
    }

    .date {
      display: block;
      margin: 0 auto 20px;
      text-align: center;

      color: var(--wiki-pink-2);
      font-family: "Permanent Marker", cursive;
      font-size: clamp(20px, 2.4vw, 32px);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: .5px;

      text-shadow:
        0 0 10px rgba(255,42,163,.72),
        0 0 20px rgba(255,42,163,.28);
    }

    .date::after,
    .modal-box h2::after {
      content: "";
      display: block;
      width: min(380px, 72%);
      height: 2px;
      margin: 16px auto 0;

      background:
        linear-gradient(
          to right,
          transparent,
          rgba(0,245,255,.95),
          rgba(255,42,163,.95),
          transparent
        );

      box-shadow:
        0 0 10px rgba(0,245,255,.45),
        0 0 14px rgba(255,42,163,.28);
    }

    .modal-box p {
      max-width: 650px;
      margin-left: auto;
      margin-right: auto;

      text-align: center;
      color: var(--wiki-white);
      font-family: "Space Mono", monospace;
      font-size: clamp(15px, 1.25vw, 18px);
      line-height: 1.72;
    }

    .modal-box h3 {
      margin: 26px auto 14px;
      text-align: center;

      color: var(--wiki-cyan);
      font-family: "Monoton", cursive;
      font-size: clamp(22px, 2.7vw, 36px);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: 1px;

      text-shadow:
        0 0 8px rgba(0,245,255,.85),
        0 0 20px rgba(0,245,255,.38),
        0 0 32px rgba(255,42,163,.22);
    }

    .related-links {
      width: min(620px, 100%);
      margin: 20px auto;
      display: grid;
      gap: 12px;
    }

    .related-links a {
      display: block;
      padding: 12px 14px;
      border-radius: 18px;
      border: 2px solid rgba(0,245,255,.65);
      background:
        linear-gradient(180deg, rgba(0,245,255,.15), rgba(0,55,95,.22));

      color: #e8fdff;
      font-family: "Orbitron", sans-serif;
      font-size: clamp(13px, 1.1vw, 16px);
      font-weight: 900;
      letter-spacing: .4px;
      text-align: center;
      text-decoration: none;

      box-shadow:
        0 0 14px rgba(0,245,255,.20),
        inset 0 -3px 0 rgba(0,0,0,.22);
    }

    textarea {
      width: min(620px, 100%);
      min-height: 118px;
      display: block;

      margin: 0 auto;
      padding: 16px 18px;

      border-radius: 18px;
      border: 2px solid var(--wiki-cyan);

      background:
        linear-gradient(180deg, rgba(0,9,32,.96), rgba(1,0,16,.98));

      color: #e4fcff;
      font-family: "Space Mono", monospace;
      font-size: clamp(15px, 1.15vw, 17px);
      line-height: 1.55;
      text-align: left;

      outline: none;
      resize: vertical;

      box-shadow:
        inset 0 0 18px rgba(0,245,255,.10),
        0 0 16px rgba(0,245,255,.18);
    }

    textarea::placeholder {
      color: rgba(228,252,255,.50);
      font-style: italic;
    }

    .button-row {
      width: min(620px, 100%);
      margin: 18px auto 0;

      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }

    .modal-btn,
    .save-btn,
    .x-btn {
      flex: 1 1 220px;
      min-height: 58px;
      display: inline-flex;
      justify-content: center;
      align-items: center;

      border: 2px solid transparent;
      border-radius: 18px;
      padding: 14px 22px;

      color: white;
      font-family: "Orbitron", sans-serif;
      font-size: clamp(14px, 1.2vw, 18px);
      font-weight: 900;
      letter-spacing: .8px;
      text-transform: uppercase;
      text-decoration: none;

      cursor: pointer;
      transition:
        transform .18s ease,
        filter .18s ease,
        border-color .18s ease;
    }

    .save-btn {
      background: linear-gradient(180deg, #ff4fbd, #e91386);
      box-shadow:
        0 0 18px rgba(255,42,163,.62),
        inset 0 -3px 0 rgba(0,0,0,.28);
    }

    .x-btn {
      background: linear-gradient(180deg, #30cfff, #0d82dd);
      box-shadow:
        0 0 18px rgba(0,245,255,.48),
        inset 0 -3px 0 rgba(0,0,0,.28);
    }

    .modal-btn:hover,
    .save-btn:hover,
    .x-btn:hover,
    .related-links a:hover {
      transform: translateY(-2px) scale(1.015);
      border-color: white;
      filter: brightness(1.12);
    }

    .saved-theories {
      width: min(620px, 100%);
      margin: 22px auto 0;
      padding: 16px;

      border-radius: 20px;
      border: 1px solid rgba(255,42,163,.32);
      background:
        linear-gradient(180deg, rgba(255,42,163,.08), rgba(0,245,255,.04));

      box-shadow:
        inset 0 0 16px rgba(255,42,163,.08),
        0 0 16px rgba(255,42,163,.10);

      text-align: center;
    }

    .theory {
      margin: 12px auto 0;
      padding: 12px 14px;

      border-radius: 14px;
      border: 1px solid rgba(0,245,255,.38);
      border-left: 4px solid var(--wiki-cyan);

      background: rgba(0,245,255,.08);
      color: #e4fcff;

      font-family: "Space Mono", monospace;
      font-size: 15px;
      line-height: 1.5;
      text-align: left;
    }

    @media (max-width: 800px) {
      .room {
        overflow-x: auto;
        justify-content: flex-start;
        padding: 24px 0 34px;
      }

      .board-frame {
        width: 1500px;
        max-width: none;
        margin-left: 0;
      }

      .modal {
        padding: 14px;
      }

      .modal-box {
        width: 94vw;
        padding: 28px 16px 22px;
        border-radius: 24px;
      }

      .modal-box h2 {
        font-size: clamp(32px, 10vw, 48px);
      }

      .date {
        font-size: 22px;
      }

      .modal-box h3 {
        font-size: 25px;
      }

      .modal-btn,
      .save-btn,
      .x-btn {
        flex-basis: 100%;
        width: 100%;
      }
    }
  </style>
</head>

      { id:"all-clues", title:"All Clues", tag:"Archive Button", date:"Chronological Archive", text:"This will eventually open the full chronological archive of every RK post.", xPost:"https://x.com/TheRoaringKitty", x:43.6, y:94.27, w:14, h:7 },
      { id:"emoji", title:"Emoji Timeline", tag:"Navigation", date:"See Every Emoji", text:"Jump back to the interactive emoji corkboard.", xPost:"emoji.html", nav:"emoji.html", x:59.21, y:94.31, w:14, h:7 },
      { id:"notes", title:"Community Notes", tag:"Theory Hub", date:"Add Your Theories", text:"General board notes.", xPost:"https://x.com/TheRoaringKitty", x:76.5, y:94.13, w:15, h:7 },
      { id:"hub", title:"Hub", tag:"Navigation", date:"Return Home", text:"Return to the main investigation hub.", xPost:"hq.html", nav:"hq.html", x:90.18, y:94.2, w:10, h:7 }
    ];

    const hotspots = document.getElementById("hotspots");
    const modal = document.getElementById("modal");
    const modalTag = document.getElementById("modalTag");
    const modalTitle = document.getElementById("modalTitle");
    const modalDate = document.getElementById("modalDate");
    const modalText = document.getElementById("modalText");
    const relatedLinks = document.getElementById("relatedLinks");
    const theoryInput = document.getElementById("theoryInput");
    const saveTheory = document.getElementById("saveTheory");
    const theoryList = document.getElementById("theoryList");
    const closeModal = document.getElementById("closeModal");
    const xLink = document.getElementById("xLink");

    let activeClue = null;

    clues.forEach((clue, index) => {
      const button = document.createElement("button");
      button.className = "hotspot";
      button.style.left = clue.x + "%";
      button.style.top = clue.y + "%";
      button.style.width = clue.w + "%";
      button.style.height = clue.h + "%";
      button.title = clue.title;
      button.setAttribute("aria-label", clue.title);

      button.addEventListener("click", () => {
        if (clue.nav) {
          window.location.href = clue.nav;
          return;
        }

        openClue(index);
      });

      hotspots.appendChild(button);
    });

    function openClue(index) {
      activeClue = clues[index];

      modalTag.textContent = activeClue.tag;
      modalTitle.textContent = activeClue.title;
      modalDate.textContent = activeClue.date;
      modalText.textContent = activeClue.text;
      theoryInput.value = "";

      relatedLinks.innerHTML = "";

      if (activeClue.related && activeClue.related.length) {
        activeClue.related.forEach(link => {
          const a = document.createElement("a");
          a.href = link.url;
          a.target = "_blank";
          a.rel = "noopener";
          a.textContent = link.label;
          relatedLinks.appendChild(a);
        });
      }

      xLink.href = activeClue.xPost;
      xLink.textContent = activeClue.xPost.includes("x.com") ? "🐦 ORIGINAL X POST" : "OPEN LINK";

      renderTheories();
      modal.classList.add("active");
    }

    function getTheoryKey() {
      return `kitty-theories-${activeClue.id}`;
    }

    function renderTheories() {
      theoryList.innerHTML = "";
      const saved = JSON.parse(localStorage.getItem(getTheoryKey()) || "[]");

      if (saved.length === 0) {
        theoryList.innerHTML = "<p>No theories saved yet.</p>";
        return;
      }

      saved.forEach((text) => {
        const div = document.createElement("div");
        div.className = "theory";
        div.textContent = text;
        theoryList.appendChild(div);
      });
    }

    saveTheory.addEventListener("click", () => {
      if (!activeClue) return;

      const text = theoryInput.value.trim();
      if (!text) return;

      const key = getTheoryKey();
      const saved = JSON.parse(localStorage.getItem(key) || "[]");
      saved.unshift(text);
      localStorage.setItem(key, JSON.stringify(saved));
      theoryInput.value = "";
      renderTheories();
    });

    closeModal.addEventListener("click", () => modal.classList.remove("active"));

    modal.addEventListener("click", (event) => {
      if (event.target === modal) modal.classList.remove("active");
    });
  </script>
</body>
</html>
