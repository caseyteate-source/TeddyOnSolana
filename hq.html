<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>$TEDDY | The Rabbit Hole</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="rabbit-page">
  <div class="scanlines"></div>
  <div class="rabbit-light"></div>
  <div class="rabbit-cursor-glow"></div>

  <button id="staticSoundToggle" class="static-sound-toggle" type="button">
    TV STATIC: OFF
  </button>

  <main class="rabbit-stage">
    <img src="rabbit-hole-bg.png" alt="$TEDDY The Rabbit Hole" class="rabbit-bg" />

    <div class="rabbit-glow-layer">
      <div class="rabbit-glow glow-moass"></div>
      <div class="rabbit-glow glow-bunny"></div>
      <div class="rabbit-glow glow-tv"></div>
      <div class="rabbit-glow glow-arcade"></div>
      <div class="rabbit-glow glow-lava"></div>
      <div class="rabbit-glow glow-lamp"></div>
      <div class="rabbit-glow glow-stock"></div>
      <div class="rabbit-glow glow-phone"></div>

      <div id="tvStaticBox" class="tv-static-wrap">
        <canvas id="tvStaticCanvas" class="tv-static-canvas"></canvas>
        <div class="tv-static-lines"></div>
        <div class="tv-static-roll"></div>
      </div>

      <div class="rabbit-dust dust-one"></div>
      <div class="rabbit-dust dust-two"></div>
    </div>

    <div id="rabbitHotspots"></div>
  </main>

  <script>
    document.addEventListener("pointermove", (event) => {
      document.documentElement.style.setProperty("--rabbit-mouse-x", event.clientX + "px");
      document.documentElement.style.setProperty("--rabbit-mouse-y", event.clientY + "px");
    });

    /* ======================================================
       REALISTIC TV STATIC CANVAS
    ====================================================== */

    const tvCanvas = document.getElementById("tvStaticCanvas");
    const tvCtx = tvCanvas.getContext("2d", { willReadFrequently: true });

    const staticWidth = 180;
    const staticHeight = 120;

    tvCanvas.width = staticWidth;
    tvCanvas.height = staticHeight;

    function drawTvStatic() {
      const imageData = tvCtx.createImageData(staticWidth, staticHeight);
      const data = imageData.data;

      for (let i = 0; i < data.length; i += 4) {
        const shade = Math.random() * 255;
        const flicker = Math.random() > 0.985 ? 255 : shade;

        data[i] = flicker;
        data[i + 1] = flicker;
        data[i + 2] = flicker;
        data[i + 3] = 145 + Math.random() * 85;
      }

      tvCtx.putImageData(imageData, 0, 0);

      tvCtx.fillStyle = "rgba(80, 210, 255, 0.055)";
      tvCtx.fillRect(0, 0, staticWidth, staticHeight);

      if (Math.random() > 0.89) {
        tvCtx.fillStyle = "rgba(255,255,255,0.24)";
        tvCtx.fillRect(0, Math.random() * staticHeight, staticWidth, 2 + Math.random() * 4);
      }

      requestAnimationFrame(drawTvStatic);
    }

    drawTvStatic();

    /* ======================================================
       OPTIONAL LOW-VOLUME TV STATIC SOUND
    ====================================================== */

    const staticToggle = document.getElementById("staticSoundToggle");

    let audioCtx = null;
    let staticSource = null;
    let staticGain = null;
    let staticFilter = null;
    let staticPlaying = false;

    function createStaticSound() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      const bufferSize = audioCtx.sampleRate * 2;
      const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const output = noiseBuffer.getChannelData(0);

      for (let i = 0; i < bufferSize; i++) {
        output[i] = Math.random() * 2 - 1;
      }

      staticSource = audioCtx.createBufferSource();
      staticSource.buffer = noiseBuffer;
      staticSource.loop = true;

      staticFilter = audioCtx.createBiquadFilter();
      staticFilter.type = "bandpass";
      staticFilter.frequency.value = 1150;
      staticFilter.Q.value = 0.55;

      staticGain = audioCtx.createGain();
      staticGain.gain.value = 0.018;

      staticSource.connect(staticFilter);
      staticFilter.connect(staticGain);
      staticGain.connect(audioCtx.destination);

      staticSource.start();
    }

    staticToggle.addEventListener("click", async () => {
      if (!audioCtx) {
        createStaticSound();
        staticPlaying = true;
        staticToggle.textContent = "TV STATIC: ON";
        staticToggle.classList.add("active");
        return;
      }

      if (audioCtx.state === "suspended") {
        await audioCtx.resume();
      }

      staticPlaying = !staticPlaying;

      if (staticPlaying) {
        staticGain.gain.setTargetAtTime(0.018, audioCtx.currentTime, 0.08);
        staticToggle.textContent = "TV STATIC: ON";
        staticToggle.classList.add("active");
      } else {
        staticGain.gain.setTargetAtTime(0.0001, audioCtx.currentTime, 0.08);
        staticToggle.textContent = "TV STATIC: OFF";
        staticToggle.classList.remove("active");
      }
    });

    /* ======================================================
       TV STATIC PLACEMENT EDITOR
       Use: hq.html?tvedit=1
    ====================================================== */

    const tvEditMode = new URLSearchParams(window.location.search).has("tvedit");
    const tvBox = document.getElementById("tvStaticBox");

    let tvState = {
      left: 80.91,
      top: 25.22,
      width: 19,
      height: 19.7,
      rotate: -0.1,
      skewX: -0.65,
      skewY: 0.35,
      opacity: 0.9,
      tlx: 6.4,
      tly: 4.4,
      trx: 97.4,
      tryy: 5.4,
      brx: 95.8,
      bry: 100,
      blx: 5.6,
      bly: 90.6
    };

    const savedTvState = localStorage.getItem("teddyTvStaticState");

    if (savedTvState) {
      try {
        tvState = { ...tvState, ...JSON.parse(savedTvState) };
      } catch {}
    }

    function applyTvState() {
      tvBox.style.left = tvState.left + "%";
      tvBox.style.top = tvState.top + "%";
      tvBox.style.width = tvState.width + "%";
      tvBox.style.height = tvState.height + "%";
      tvBox.style.opacity = tvState.opacity;
      tvBox.style.transform =
        `rotate(${tvState.rotate}deg) skewX(${tvState.skewX}deg) skewY(${tvState.skewY}deg)`;

      tvBox.style.clipPath =
        `polygon(${tvState.tlx}% ${tvState.tly}%, ${tvState.trx}% ${tvState.tryy}%, ${tvState.brx}% ${tvState.bry}%, ${tvState.blx}% ${tvState.bly}%)`;

      localStorage.setItem("teddyTvStaticState", JSON.stringify(tvState));
      syncTvSliders();
      updateTvEditorOutput();
    }

    function createTvStaticEditor() {
      document.body.classList.add("tv-static-edit-mode");

      const glowLayer = document.querySelector(".rabbit-glow-layer");
      const hotspotLayer = document.getElementById("rabbitHotspots");

      if (glowLayer) glowLayer.style.pointerEvents = "auto";
      if (hotspotLayer) hotspotLayer.style.pointerEvents = "none";

      tvBox.style.pointerEvents = "auto";
      tvBox.style.zIndex = "5000";

      const panel = document.createElement("div");
      panel.className = "tv-static-editor-panel";

      panel.innerHTML = `
        <strong>TV Static Box Editor</strong>
        <p>Drag the static box. Use sliders to move, size, rotate, skew, and shape corners.</p>

        <div class="tv-nudge-grid">
          <button type="button" data-tv-nudge-y="-0.15">UP</button>
          <button type="button" data-tv-nudge-x="-0.15">LEFT</button>
          <button type="button" data-tv-nudge-x="0.15">RIGHT</button>
          <button type="button" data-tv-nudge-y="0.15">DOWN</button>
        </div>

        <label>Left <input type="range" min="60" max="100" step="0.05" data-tv-key="left"></label>
        <label>Top <input type="range" min="10" max="60" step="0.05" data-tv-key="top"></label>
        <label>Width <input type="range" min="4" max="28" step="0.1" data-tv-key="width"></label>
        <label>Height <input type="range" min="4" max="28" step="0.1" data-tv-key="height"></label>
        <label>Rotate <input type="range" min="-8" max="8" step="0.05" data-tv-key="rotate"></label>
        <label>Skew X <input type="range" min="-12" max="12" step="0.05" data-tv-key="skewX"></label>
        <label>Skew Y <input type="range" min="-12" max="12" step="0.05" data-tv-key="skewY"></label>
        <label>Opacity <input type="range" min="0.05" max="0.9" step="0.01" data-tv-key="opacity"></label>

        <hr>

        <label>Top Left X <input type="range" min="0" max="30" step="0.1" data-tv-key="tlx"></label>
        <label>Top Left Y <input type="range" min="0" max="30" step="0.1" data-tv-key="tly"></label>
        <label>Top Right X <input type="range" min="70" max="100" step="0.1" data-tv-key="trx"></label>
        <label>Top Right Y <input type="range" min="0" max="30" step="0.1" data-tv-key="tryy"></label>
        <label>Bottom Right X <input type="range" min="70" max="100" step="0.1" data-tv-key="brx"></label>
        <label>Bottom Right Y <input type="range" min="70" max="100" step="0.1" data-tv-key="bry"></label>
        <label>Bottom Left X <input type="range" min="0" max="30" step="0.1" data-tv-key="blx"></label>
        <label>Bottom Left Y <input type="range" min="70" max="100" step="0.1" data-tv-key="bly"></label>

        <button id="copyTvStaticCss" type="button">COPY TV STATIC CSS</button>
        <textarea id="tvStaticOutput" readonly></textarea>
      `;

      document.body.appendChild(panel);

      panel.querySelectorAll("input[data-tv-key]").forEach((input) => {
        const key = input.dataset.tvKey;
        input.value = tvState[key];

        input.addEventListener("input", () => {
          tvState[key] = Number(input.value);
          applyTvState();
        });
      });

      panel.querySelectorAll("[data-tv-nudge-x], [data-tv-nudge-y]").forEach((button) => {
        button.addEventListener("click", () => {
          tvState.left = Number((tvState.left + Number(button.dataset.tvNudgeX || 0)).toFixed(2));
          tvState.top = Number((tvState.top + Number(button.dataset.tvNudgeY || 0)).toFixed(2));
          applyTvState();
        });
      });

      document.getElementById("copyTvStaticCss").addEventListener("click", async () => {
        updateTvEditorOutput();
        const output = document.getElementById("tvStaticOutput").value;

        try {
          await navigator.clipboard.writeText(output);
          document.getElementById("copyTvStaticCss").textContent = "COPIED!";
          setTimeout(() => {
            document.getElementById("copyTvStaticCss").textContent = "COPY TV STATIC CSS";
          }, 1200);
        } catch {
          alert("Could not auto-copy. Select the text box and copy manually.");
        }
      });

      enableTvDrag();
      applyTvState();
    }

    function syncTvSliders() {
      document.querySelectorAll("input[data-tv-key]").forEach((input) => {
        const key = input.dataset.tvKey;
        input.value = tvState[key];
      });
    }

    function enableTvDrag() {
      let startX = 0;
      let startY = 0;
      let startLeft = 0;
      let startTop = 0;

      tvBox.addEventListener("pointerdown", (event) => {
        if (!tvEditMode) return;

        event.preventDefault();
        event.stopPropagation();

        tvBox.setPointerCapture(event.pointerId);

        const stage = document.querySelector(".rabbit-stage");
        const rect = stage.getBoundingClientRect();

        startX = event.clientX;
        startY = event.clientY;
        startLeft = tvState.left;
        startTop = tvState.top;

        function moveTvBox(e) {
          const dx = ((e.clientX - startX) / rect.width) * 100;
          const dy = ((e.clientY - startY) / rect.height) * 100;

          tvState.left = Number((startLeft + dx).toFixed(2));
          tvState.top = Number((startTop + dy).toFixed(2));

          applyTvState();
        }

        function stopMove() {
          try {
            tvBox.releasePointerCapture(event.pointerId);
          } catch {}

          tvBox.removeEventListener("pointermove", moveTvBox);
          tvBox.removeEventListener("pointerup", stopMove);
          tvBox.removeEventListener("pointercancel", stopMove);
        }

        tvBox.addEventListener("pointermove", moveTvBox);
        tvBox.addEventListener("pointerup", stopMove);
        tvBox.addEventListener("pointercancel", stopMove);
      });
    }

    function updateTvEditorOutput() {
      const output = document.getElementById("tvStaticOutput");
      if (!output) return;

      output.value =
`/* TV STATIC CUSTOM PLACEMENT */
.tv-static-wrap {
  left: ${tvState.left}% !important;
  top: ${tvState.top}% !important;
  width: ${tvState.width}% !important;
  height: ${tvState.height}% !important;
  opacity: ${tvState.opacity} !important;
  transform: rotate(${tvState.rotate}deg) skewX(${tvState.skewX}deg) skewY(${tvState.skewY}deg) !important;
  clip-path: polygon(${tvState.tlx}% ${tvState.tly}%, ${tvState.trx}% ${tvState.tryy}%, ${tvState.brx}% ${tvState.bry}%, ${tvState.blx}% ${tvState.bly}%) !important;
}`;
    }

    applyTvState();

    if (tvEditMode) {
      createTvStaticEditor();
    }
  </script>

  <script src="rabbit-hole.js"></script>

  <script>
    /* ======================================================
       FINAL CLEAN 12:00 BLINK
       This is the ONLY clock blink script in this file.
       It removes old experiments and manually blinks the red digits.
    ====================================================== */

    (function () {
      const CLOCK = {
        left: 76.89,
        top: 56.92,
        width: 4.08,
        height: 1.96,
        rotate: 8.85
      };

      function removeOldClockStuff() {
        document.querySelectorAll(
          "#forcedClockBlinkBox, #forcedBlinkingClock1200, #finalBlinkingClock1200, #cleanBlinkingClock1200, .alarm-blink-box"
        ).forEach((el) => el.remove());

        document.querySelectorAll("style").forEach((style) => {
          const text = style.textContent || "";

          if (
            text.includes("forcedClockBlink") ||
            text.includes("forcedBlinkingClock1200") ||
            text.includes("finalBlinkingClock1200") ||
            text.includes("simpleBlackBoxBlink") ||
            text.includes("alarmRealBlink") ||
            text.includes("alarmCoverBlink") ||
            text.includes("cleanBlinkingClock1200")
          ) {
            style.remove();
          }
        });
      }

      function installCleanStyle() {
        const style = document.createElement("style");
        style.id = "cleanClock1200Style";

        style.textContent = `
          #forcedClockBlinkBox,
          #forcedBlinkingClock1200,
          #finalBlinkingClock1200,
          .alarm-blink-box {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
            box-shadow: none !important;
            outline: none !important;
            border: none !important;
            animation: none !important;
          }

          .rabbit-stage::before,
          .rabbit-stage::after {
            content: none !important;
            display: none !important;
          }

          #cleanBlinkingClock1200 {
            position: fixed !important;
            background: #020000 !important;
            border: none !important;
            outline: none !important;
            box-shadow:
              inset 0 0 5px rgba(0,0,0,1),
              0 0 4px rgba(0,0,0,.7) !important;
            border-radius: 5px !important;
            pointer-events: none !important;
            z-index: 2147483647 !important;
            overflow: hidden !important;

            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
          }

          #cleanBlinkingClock1200 span {
            display: block !important;
            color: #ff1010 !important;
            font-family: "Courier New", monospace !important;
            font-weight: 900 !important;
            line-height: 1 !important;
            letter-spacing: -0.06em !important;
            text-shadow:
              0 0 3px rgba(255,0,0,1),
              0 0 8px rgba(255,0,0,.9),
              0 0 14px rgba(255,0,0,.55) !important;
          }
        `;

        document.head.appendChild(style);
      }

      function createClock() {
        const clock = document.createElement("div");
        clock.id = "cleanBlinkingClock1200";
        clock.innerHTML = "<span>12:00</span>";
        document.body.appendChild(clock);
        return clock;
      }

      function positionClock() {
        const stage = document.querySelector(".rabbit-stage");
        const clock = document.getElementById("cleanBlinkingClock1200");

        if (!stage || !clock) return;

        const rect = stage.getBoundingClientRect();

        const left = rect.left + rect.width * (CLOCK.left / 100);
        const top = rect.top + rect.height * (CLOCK.top / 100);
        const width = rect.width * (CLOCK.width / 100);
        const height = rect.height * (CLOCK.height / 100);

        clock.style.left = left + "px";
        clock.style.top = top + "px";
        clock.style.width = width + "px";
        clock.style.height = height + "px";
        clock.style.transform = "rotate(" + CLOCK.rotate + "deg)";
        clock.style.transformOrigin = "center center";

        const digits = clock.querySelector("span");
        digits.style.fontSize = Math.max(8, height * 0.82) + "px";
      }

      removeOldClockStuff();
      installCleanStyle();
      createClock();
      positionClock();

      let visible = true;

      setInterval(() => {
        const digits = document.querySelector("#cleanBlinkingClock1200 span");
        if (!digits) return;

        visible = !visible;
        digits.style.opacity = visible ? "1" : "0";
      }, 575);

      window.addEventListener("resize", positionClock);
      window.addEventListener("orientationchange", positionClock);

      setTimeout(positionClock, 300);
      setTimeout(positionClock, 900);
    })();
  </script>
</body>
</html>
