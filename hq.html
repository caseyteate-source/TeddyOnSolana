<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>$TEDDY | The Rabbit Hole</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      background: #020207;
    }

    body.rabbit-page {
      margin: 0 !important;
      background: #020207 !important;
      color: white;
      overflow-x: hidden !important;
      min-height: 100vh;
    }

    .scanlines {
      pointer-events: none !important;
      z-index: 9999;
    }

    .rabbit-page-shell {
      width: 100%;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 8%, rgba(255,42,163,.14), transparent 28%),
        radial-gradient(circle at 80% 42%, rgba(0,245,255,.09), transparent 30%),
        #020207;
    }

    .mobile-rabbit-hint {
      display: none;
      position: sticky;
      top: 0;
      z-index: 5000;
      padding: 10px 12px;
      text-align: center;
      font-family: Arial, sans-serif;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .08em;
      color: #fff;
      background: linear-gradient(90deg, rgba(255,42,163,.94), rgba(0,245,255,.88));
      text-shadow: 0 1px 2px rgba(0,0,0,.6);
    }

    .rabbit-scroll-wrap {
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-x: contain;
      position: relative;
      z-index: 1;
      background: #020207;
    }

    .rabbit-stage {
      position: relative !important;
      width: min(100vw, 1600px) !important;
      margin: 0 auto !important;
      background: #050510 !important;
      overflow: hidden !important;
      isolation: isolate !important;
      touch-action: pan-x pan-y;
      transform: translateZ(0);
    }

    .rabbit-stage::before,
    .rabbit-stage::after {
      content: none !important;
      display: none !important;
    }

    .rabbit-bg {
      display: block !important;
      width: 100% !important;
      height: auto !important;
      user-select: none !important;
      -webkit-user-drag: none !important;
      pointer-events: none !important;
    }

    .alarm-blink-box,
    .clock-blink,
    .alarm-digits,
    #alarmBlinkBox,
    #alarmDigits,
    #forcedClockBlinkBox,
    #forcedBlinkingClock1200,
    #finalBlinkingClock1200,
    #cleanBlinkingClock1200 {
      display: none !important;
      opacity: 0 !important;
      visibility: hidden !important;
      pointer-events: none !important;
      position: absolute !important;
      left: -9999px !important;
      top: -9999px !important;
      width: 0 !important;
      height: 0 !important;
      overflow: hidden !important;
    }

    #rabbitOverlayRoot {
      position: absolute;
      inset: 0;
      z-index: 80;
      pointer-events: none;
    }

    .rabbit-overlay {
      position: absolute;
      pointer-events: none;
      z-index: 80;
      transform-origin: center center;
    }

    .tv-static-wrap {
      overflow: hidden !important;
      border-radius: 18px !important;
      mix-blend-mode: screen !important;
      filter:
        contrast(1.18)
        brightness(.92)
        saturate(.35)
        blur(.15px) !important;
      box-shadow:
        inset 0 0 18px rgba(255,255,255,.12),
        0 0 12px rgba(80,210,255,.15) !important;
    }

    .tv-static-canvas {
      width: 100% !important;
      height: 100% !important;
      display: block !important;
      image-rendering: pixelated !important;
      transform: scale(1.08) !important;
      transform-origin: center center !important;
      opacity: .38 !important;
    }

    .tv-static-lines {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.12) 0,
        rgba(255,255,255,.12) 1px,
        transparent 1px,
        transparent 4px
      );
      opacity: .22;
      animation: tvLines 1.8s linear infinite;
    }

    .tv-static-roll {
      position: absolute;
      left: 0;
      right: 0;
      top: -35%;
      height: 24%;
      background: rgba(255,255,255,.10);
      filter: blur(4px);
      animation: tvRoll 3.1s linear infinite;
    }

    .clock-svg-wrap {
      mix-blend-mode: screen;
      filter:
        drop-shadow(0 0 2px rgba(255,0,0,1))
        drop-shadow(0 0 6px rgba(255,0,0,.95))
        drop-shadow(0 0 13px rgba(255,0,0,.75));
      animation: clockBlink 1.08s steps(1, end) infinite;
    }

    .clock-svg {
      display: block;
      width: 100%;
      height: auto;
      overflow: visible;
    }

    .clock-seg,
    .clock-colon {
      fill: #ff1717;
    }

    .clock-colon {
      animation: colonBlink 1.08s steps(1, end) infinite;
    }

    .overlay-edit-mode #rabbitOverlayRoot {
      pointer-events: auto;
      z-index: 500;
    }

    .overlay-edit-mode #rabbitHotspots {
      pointer-events: none !important;
    }

    .overlay-edit-mode .rabbit-overlay {
      pointer-events: auto !important;
      cursor: move;
      outline: 2px solid rgba(255, 234, 0, .95);
      background-color: rgba(255, 234, 0, .08);
    }

    .overlay-edit-mode .rabbit-overlay.selected-overlay {
      outline: 3px solid #00f5ff;
      box-shadow:
        0 0 18px rgba(0,245,255,.9),
        inset 0 0 14px rgba(255,42,163,.25);
    }

    .overlay-floating-label {
      display: none;
      position: absolute;
      z-index: 1600;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(255,255,255,.55);
      border-radius: 999px;
      padding: 5px 8px;
      background: rgba(0,0,0,.9);
      color: #ffea00;
      font-family: Arial, sans-serif;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .03em;
      white-space: nowrap;
      pointer-events: auto;
      cursor: pointer;
      box-shadow:
        0 0 10px rgba(255,234,0,.55),
        0 0 18px rgba(0,245,255,.25);
    }

    .overlay-edit-mode .overlay-floating-label {
      display: block;
    }

    .overlay-floating-label.selected {
      color: #00f5ff;
      border-color: #00f5ff;
      box-shadow:
        0 0 14px rgba(0,245,255,.9),
        0 0 24px rgba(255,42,163,.35);
    }

    .overlay-corner-handle {
      display: none;
      position: absolute;
      z-index: 2200;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      border: 2px solid #fff;
      background: #ff2aa3;
      box-shadow:
        0 0 12px rgba(255,42,163,.9),
        0 0 18px rgba(0,245,255,.45);
      pointer-events: auto;
      cursor: grab;
    }

    .overlay-edit-mode .overlay-corner-handle {
      display: block;
    }

    .overlay-corner-handle::after {
      content: attr(data-corner);
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 8px;
      font-weight: 900;
      font-family: Arial, sans-serif;
    }

    .overlay-editor-panel {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 11000;
      width: min(450px, calc(100vw - 24px));
      background: rgba(0,0,0,.94);
      border: 2px solid #ffea00;
      border-radius: 14px;
      padding: 12px;
      color: white;
      box-shadow: 0 0 24px rgba(255,234,0,.55);
      font-family: Arial, sans-serif;
    }

    .overlay-editor-panel strong {
      color: #ffea00;
      display: block;
      margin-bottom: 6px;
    }

    .overlay-editor-panel p {
      margin: 6px 0 10px;
      color: #fff7b0;
      font-size: 13px;
      line-height: 1.35;
    }

    .overlay-editor-panel select {
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      border-radius: 10px;
      border: 1px solid #00f5ff;
      background: #050510;
      color: #fff;
      font-weight: 900;
    }

    .overlay-editor-panel .selected-name {
      color: #00f5ff;
      font-weight: 900;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .overlay-editor-buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 8px;
    }

    .overlay-editor-panel button {
      border: 0;
      border-radius: 9px;
      padding: 9px 6px;
      color: white;
      font-weight: 900;
      cursor: pointer;
      background: #ff2aa3;
      font-size: 11px;
    }

    .overlay-editor-panel button.blue {
      background: #00aaff;
    }

    .overlay-editor-panel button.yellow {
      background: #c49b00;
    }

    .overlay-editor-panel button.copy {
      width: 100%;
      background: #00aaff;
      margin-bottom: 8px;
    }

    .overlay-editor-panel textarea {
      width: 100%;
      height: 130px;
      background: #050510;
      color: #dffcff;
      border: 1px solid #ffea00;
      border-radius: 10px;
      padding: 10px;
      font-family: monospace;
      font-size: 10px;
      box-sizing: border-box;
    }

    #rabbitHotspots {
      position: absolute !important;
      inset: 0 !important;
      z-index: 300 !important;
    }

    .rabbit-hotspot {
      position: absolute !important;
      z-index: 310 !important;
      border: 0;
      background: transparent;
      cursor: pointer;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .rabbit-hotspot:hover {
      background: rgba(0,245,255,.10);
      box-shadow:
        0 0 22px rgba(0,245,255,.9),
        inset 0 0 18px rgba(255,42,163,.35);
    }

    .rabbit-edit-mode .rabbit-hotspot {
      background: rgba(0,245,255,.34) !important;
      border: 2px solid #00f5ff !important;
      box-shadow: 0 0 18px rgba(0,245,255,.95) !important;
    }

    .rabbit-edit-mode .rabbit-hotspot::after {
      content: attr(data-label);
      position: absolute;
      left: 50%;
      top: 115%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 10px;
      color: white;
      background: rgba(0,0,0,.78);
      border: 1px solid rgba(255,255,255,.35);
      border-radius: 999px;
      padding: 4px 7px;
      pointer-events: none;
    }

    .rabbit-modal {
      position: fixed !important;
      inset: 0 !important;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.82);
      z-index: 9000 !important;
      padding: 20px;
    }

    .rabbit-modal.active {
      display: flex;
    }

    .rabbit-modal-box {
      position: relative;
      width: min(620px, 94vw);
      border: 3px solid #ff2aa3;
      border-radius: 24px;
      padding: 30px;
      background: linear-gradient(180deg, rgba(19,0,31,.97), rgba(5,5,16,.98));
      box-shadow:
        0 0 32px rgba(255,42,163,.9),
        0 0 60px rgba(0,245,255,.6);
    }

    .rabbit-close {
      position: absolute;
      top: 10px;
      right: 16px;
      border: 0;
      background: transparent;
      color: white;
      font-size: 34px;
      cursor: pointer;
    }

    .rabbit-tag {
      color: #ffea00;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 8px;
      letter-spacing: .08em;
    }

    .rabbit-modal-box h2 {
      color: #00f5ff;
      margin: 0 0 12px;
      font-size: clamp(26px, 4vw, 42px);
      text-shadow: 0 0 14px rgba(0,245,255,.75);
    }

    .rabbit-modal-box p {
      color: #eee;
      line-height: 1.6;
      font-size: 18px;
    }

    .rabbit-link {
      display: block;
      margin-top: 18px;
      padding: 14px 18px;
      border-radius: 14px;
      background: #ff2aa3;
      color: white;
      text-decoration: none;
      text-align: center;
      font-weight: 900;
      box-shadow: 0 0 18px rgba(255,42,163,.85);
    }

    .rabbit-link:hover {
      background: #00aaff;
      box-shadow: 0 0 22px rgba(0,245,255,.9);
    }

    .static-sound-toggle {
      position: fixed;
      right: 18px;
      top: 18px;
      z-index: 7000;
      border: 2px solid #00f5ff;
      border-radius: 999px;
      background: rgba(0,0,0,.78);
      color: white;
      padding: 11px 14px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 0 16px rgba(0,245,255,.7);
    }

    .static-sound-toggle.on,
    .static-sound-toggle.active {
      border-color: #ff2aa3;
      box-shadow: 0 0 18px rgba(255,42,163,.85);
    }

    .rabbit-editor-panel {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 10000;
      width: min(520px, calc(100vw - 24px));
      background: rgba(0,0,0,.92);
      border: 2px solid #00f5ff;
      border-radius: 14px;
      padding: 12px;
      color: white;
      box-shadow: 0 0 24px rgba(0,245,255,.65);
    }

    .rabbit-editor-panel strong {
      color: #00f5ff;
    }

    .rabbit-editor-panel p {
      margin: 8px 0;
      color: #dffcff;
      font-size: 13px;
    }

    .rabbit-editor-panel button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 11px;
      color: white;
      font-weight: 900;
      cursor: pointer;
      background: #ff2aa3;
      margin-bottom: 8px;
    }

    .rabbit-editor-panel textarea {
      width: 100%;
      height: 150px;
      background: #050510;
      color: #dffcff;
      border: 1px solid #00f5ff;
      border-radius: 10px;
      padding: 10px;
      font-family: monospace;
      font-size: 11px;
      box-sizing: border-box;
    }

    @keyframes tvLines {
      from { transform: translateY(0); }
      to { transform: translateY(8px); }
    }

    @keyframes tvRoll {
      from { transform: translateY(-60%); }
      to { transform: translateY(620%); }
    }

    @keyframes clockBlink {
      0%, 49% { opacity: .96; }
      50%, 100% { opacity: .18; }
    }

    @keyframes colonBlink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: .2; }
    }

    @media (max-width: 760px) {
      .mobile-rabbit-hint {
        display: block;
      }

      .rabbit-stage {
        width: 1180px !important;
        max-width: none !important;
        margin: 0 !important;
      }

      .static-sound-toggle {
        right: 10px;
        top: 45px;
        font-size: 11px;
        padding: 9px 11px;
      }

      .rabbit-modal {
        padding: 14px;
      }

      .rabbit-modal-box {
        padding: 24px;
      }

      .rabbit-modal-box p {
        font-size: 16px;
      }

      .overlay-editor-panel {
        left: 10px;
        right: auto;
        bottom: 10px;
        max-height: 48vh;
        overflow-y: auto;
      }

      .overlay-floating-label {
        font-size: 10px;
        padding: 4px 7px;
      }
    }
  </style>
</head>

<body class="rabbit-page">
  <div class="scanlines"></div>

  <div class="rabbit-page-shell">
    <div class="mobile-rabbit-hint">
      ← SWIPE THE ROOM • TAP CLUES • FOLLOW THE RABBIT HOLE →
    </div>

    <button id="staticSoundToggle" class="static-sound-toggle" type="button">
      TV STATIC: OFF
    </button>

    <div class="rabbit-scroll-wrap" id="rabbitScrollWrap">
      <main class="rabbit-stage" id="rabbitStage">
        <img src="rabbit-hole-bg.png" alt="$TEDDY The Rabbit Hole" class="rabbit-bg" />

        <div id="rabbitOverlayRoot"></div>

        <div id="rabbitHotspots"></div>
      </main>
    </div>
  </div>

  <div id="rabbitModal" class="rabbit-modal" aria-hidden="true">
    <div class="rabbit-modal-box">
      <button id="rabbitClose" class="rabbit-close" type="button">×</button>
      <div id="rabbitTag" class="rabbit-tag">CASE FILE</div>
      <h2 id="rabbitTitle">Rabbit Hole</h2>
      <p id="rabbitText">Follow the clues.</p>
      <a id="rabbitLink" class="rabbit-link" href="#">ENTER</a>
    </div>
  </div>

  <script src="rabbit-overlays.js"></script>
  <script src="rabbit-hole.js"></script>
</body>
</html>
