<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>$TEDDY | The Rabbit Hole</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    /* ======================================================
       RABBIT HOLE PAGE — CLOCK + ANIMATION OVERLAY BUILD
       Leave rabbit-hole.js alone.
    ====================================================== */

    html,
    body {
      margin: 0;
      padding: 0;
      background: #020207;
    }

    body.rabbit-page {
      margin: 0 !important;
      background: #020207 !important;
      color: white;
      overflow-x: hidden !important;
      min-height: 100vh;
    }

    .scanlines {
      pointer-events: none !important;
      z-index: 9999;
    }

    .rabbit-page-shell {
      width: 100%;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 8%, rgba(255,42,163,.14), transparent 28%),
        radial-gradient(circle at 80% 42%, rgba(0,245,255,.09), transparent 30%),
        #020207;
    }

    .mobile-rabbit-hint {
      display: none;
      position: sticky;
      top: 0;
      z-index: 5000;
      padding: 10px 12px;
      text-align: center;
      font-family: Arial, sans-serif;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .08em;
      color: #fff;
      background: linear-gradient(90deg, rgba(255,42,163,.94), rgba(0,245,255,.88));
      text-shadow: 0 1px 2px rgba(0,0,0,.6);
    }

    .rabbit-scroll-wrap {
      width: 100%;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-x: contain;
      position: relative;
      z-index: 1;
      background: #020207;
    }

    .rabbit-stage {
      position: relative !important;
      width: min(100vw, 1600px) !important;
      margin: 0 auto !important;
      background: #050510 !important;
      overflow: hidden !important;
      isolation: isolate !important;
      touch-action: pan-x pan-y;
      transform: translateZ(0);
    }

    .rabbit-stage::before,
    .rabbit-stage::after {
      content: none !important;
      display: none !important;
      opacity: 0 !important;
      visibility: hidden !important;
    }

    .rabbit-bg {
      display: block !important;
      width: 100% !important;
      height: auto !important;
      user-select: none !important;
      -webkit-user-drag: none !important;
      pointer-events: none !important;
    }

    /* ======================================================
       KILL OLD WANDERING CLOCK OVERLAYS FROM EARLIER TESTS
    ====================================================== */

    .alarm-blink-box,
    .clock-blink,
    .alarm-digits,
    #alarmBlinkBox,
    #alarmDigits,
    #forcedClockBlinkBox,
    #forcedBlinkingClock1200,
    #finalBlinkingClock1200,
    #cleanBlinkingClock1200,
    .rabbit-stage > .alarm-blink-box,
    .rabbit-stage > .clock-blink {
      display: none !important;
      opacity: 0 !important;
      visibility: hidden !important;
      pointer-events: none !important;
      position: absolute !important;
      left: -9999px !important;
      top: -9999px !important;
      width: 0 !important;
      height: 0 !important;
      overflow: hidden !important;
    }

    /* ======================================================
       ALL ANIMATION OVERLAYS — LOCKED TO BACKGROUND IMAGE
    ====================================================== */

    .anim-layer {
      position: absolute;
      pointer-events: none;
      z-index: 80;
      mix-blend-mode: screen;
    }

    .moass-neon {
      left: 1.4%;
      top: 4.8%;
      width: 19.5%;
      height: 12%;
      border-radius: 20px;
      background: rgba(255, 20, 120, .18);
      filter: blur(8px);
      animation: neonFlicker 4.5s infinite;
    }

    .bunny-neon {
      left: 82.8%;
      top: 3.5%;
      width: 12.4%;
      height: 21%;
      border-radius: 999px;
      background: rgba(0, 245, 255, .22);
      filter: blur(7px);
      animation: bunnyFlicker 3.6s infinite;
    }

    .arcade-glow {
      left: 1.8%;
      top: 24.2%;
      width: 21%;
      height: 39%;
      border-radius: 22px;
      background:
        radial-gradient(circle at 50% 32%, rgba(255,42,163,.28), transparent 38%),
        radial-gradient(circle at 52% 58%, rgba(0,245,255,.17), transparent 42%);
      filter: blur(8px);
      animation: softPulse 3.2s infinite ease-in-out;
    }

    .lava-glow {
      left: 24.8%;
      top: 13.5%;
      width: 4.6%;
      height: 17%;
      border-radius: 999px;
      background:
        radial-gradient(circle at 50% 25%, rgba(255,230,80,.42), transparent 24%),
        radial-gradient(circle at 45% 60%, rgba(255,42,163,.38), transparent 34%),
        radial-gradient(circle at 60% 85%, rgba(0,245,255,.20), transparent 28%);
      filter: blur(5px);
      animation: lavaPulse 2.7s infinite ease-in-out;
    }

    .lava-bubble-one,
    .lava-bubble-two,
    .lava-bubble-three {
      position: absolute;
      left: 25.75%;
      top: 16.5%;
      width: .9%;
      height: 1.8%;
      border-radius: 999px;
      z-index: 88;
      pointer-events: none;
      mix-blend-mode: screen;
      background: rgba(255, 90, 190, .65);
      box-shadow:
        0 0 8px rgba(255,42,163,.9),
        0 0 16px rgba(255,42,163,.5);
      animation: lavaBubble 4.2s infinite ease-in-out;
    }

    .lava-bubble-two {
      left: 26.9%;
      top: 22.5%;
      width: .7%;
      height: 1.4%;
      background: rgba(255, 226, 80, .62);
      animation-delay: -1.4s;
    }

    .lava-bubble-three {
      left: 25.35%;
      top: 26%;
      width: .75%;
      height: 1.5%;
      background: rgba(0, 245, 255, .38);
      animation-delay: -2.4s;
    }

    .phone-glow {
      left: 4.8%;
      top: 77%;
      width: 15%;
      height: 15%;
      border-radius: 999px;
      background: rgba(0, 245, 255, .08);
      filter: blur(8px);
      animation: phonePulse 5s infinite ease-in-out;
    }

    .heart-gme-pulse {
      left: 22.1%;
      top: 52.2%;
      width: 5.2%;
      height: 6.4%;
      border-radius: 999px;
      background: rgba(255, 50, 80, .2);
      filter: blur(5px);
      animation: heartPulse 1.4s infinite;
    }

    .power-glow {
      left: 70.8%;
      top: 30.5%;
      width: 8.8%;
      height: 10.6%;
      border-radius: 10px;
      background: rgba(255, 231, 70, .13);
      filter: blur(4px);
      animation: paperPulse 3.4s infinite ease-in-out;
    }

    .hang-poster-glow {
      left: 5.9%;
      top: 13.2%;
      width: 8.4%;
      height: 17%;
      border-radius: 8px;
      background: rgba(255, 230, 80, .10);
      filter: blur(4px);
      animation: posterPulse 4.2s infinite ease-in-out;
    }

    .chart-shimmer {
      left: 73.9%;
      top: 5.9%;
      width: 9.2%;
      height: 15.3%;
      overflow: hidden;
      opacity: .9;
      clip-path: polygon(5% 3%, 95% 0, 98% 96%, 2% 100%);
    }

    .chart-shimmer::after {
      content: "";
      position: absolute;
      top: -30%;
      left: -90%;
      width: 42%;
      height: 160%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.38), transparent);
      transform: rotate(18deg);
      animation: shimmerSweep 4.2s infinite;
    }

    .magnify-glint {
      left: 63.5%;
      top: 82.4%;
      width: 5.8%;
      height: 6.8%;
      border-radius: 999px;
      background: radial-gradient(circle at 35% 30%, rgba(255,255,255,.55), transparent 36%);
      filter: blur(1px);
      animation: magnifyGlint 3.1s infinite;
    }

    .diamond-sparkle {
      left: 56.6%;
      top: 46.2%;
      width: 6%;
      height: 8.5%;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(255,255,255,.38), rgba(0,245,255,.12), transparent 55%);
      filter: blur(2px);
      animation: diamondFlash 2.8s infinite;
    }

    .kitty-pulse {
      left: 54.7%;
      top: 60.3%;
      width: 8%;
      height: 14.5%;
      border-radius: 999px;
      background: rgba(255, 210, 55, .12);
      filter: blur(5px);
      animation: kittyPulse 2.1s infinite ease-in-out;
    }

    .vhs-glow {
      left: 45.4%;
      top: 77.2%;
      width: 15.8%;
      height: 6.4%;
      border-radius: 12px;
      background: rgba(255, 42, 163, .08);
      filter: blur(5px);
      animation: softPulse 4.6s infinite ease-in-out;
    }

    .notebook-pulse {
      left: 46.5%;
      top: 83.5%;
      width: 17%;
      height: 11%;
      border-radius: 14px;
      background: rgba(255, 232, 150, .07);
      filter: blur(4px);
      animation: paperPulse 4.9s infinite ease-in-out;
    }

    .coffee-steam {
      left: 75.6%;
      top: 75%;
      width: 5%;
      height: 10%;
      overflow: visible;
      opacity: .55;
    }

    .coffee-steam span {
      position: absolute;
      bottom: 0;
      width: 2px;
      height: 30px;
      border-radius: 999px;
      background: rgba(255,255,255,.5);
      filter: blur(3px);
      animation: steamRise 3.4s infinite ease-in-out;
    }

    .coffee-steam span:nth-child(1) { left: 20%; animation-delay: 0s; }
    .coffee-steam span:nth-child(2) { left: 48%; animation-delay: .9s; }
    .coffee-steam span:nth-child(3) { left: 72%; animation-delay: 1.6s; }

    .dust {
      position: absolute;
      z-index: 95;
      left: 12%;
      top: 20%;
      width: 4px;
      height: 4px;
      pointer-events: none;
      border-radius: 50%;
      background: rgba(255,255,255,.5);
      box-shadow:
        90px 70px rgba(255,255,255,.2),
        220px 40px rgba(0,245,255,.22),
        360px 125px rgba(255,42,163,.2),
        540px 80px rgba(255,255,255,.16),
        780px 170px rgba(255,255,255,.16),
        980px 100px rgba(0,245,255,.15);
      animation: dustFloat 13s linear infinite;
    }

    .dust.two {
      left: 42%;
      top: 31%;
      opacity: .55;
      animation-delay: -6s;
    }

    /* ======================================================
       TV STATIC — LOCKED INSIDE SCREEN
    ====================================================== */

    .tv-static-wrap {
      position: absolute !important;
      left: 81.92% !important;
      top: 36.55% !important;
      width: 13.7% !important;
      height: 15.7% !important;
      transform: rotate(-1.1deg) skewX(-1.5deg) skewY(.3deg) !important;
      clip-path: polygon(4% 5%, 96% 2%, 98% 94%, 5% 98%) !important;
      z-index: 100 !important;
      pointer-events: none !important;
      overflow: hidden !important;
      opacity: .72 !important;
      mix-blend-mode: screen;
      border-radius: 5px;
      filter: contrast(1.2) brightness(1.05);
    }

    .tv-static-canvas {
      width: 100%;
      height: 100%;
      display: block;
      opacity: .72;
    }

    .tv-static-lines {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.12) 0,
        rgba(255,255,255,.12) 1px,
        transparent 1px,
        transparent 4px
      );
      opacity: .32;
      animation: tvLines 1.8s linear infinite;
    }

    .tv-static-roll {
      position: absolute;
      left: 0;
      right: 0;
      top: -35%;
      height: 24%;
      background: rgba(255,255,255,.16);
      filter: blur(4px);
      animation: tvRoll 3.1s linear infinite;
    }

    /* ======================================================
       SVG CLOCK — LOCKED TO THE IMAGE, NO WANDERING TEXT
    ====================================================== */

    .clock-svg-wrap {
      position: absolute !important;
      left: 80.08% !important;
      top: 67.06% !important;
      width: 4.25% !important;
      height: auto !important;
      transform: translate(-50%, -50%) rotate(6deg) !important;
      z-index: 150 !important;
      pointer-events: none !important;
      mix-blend-mode: screen;
      filter:
        drop-shadow(0 0 2px rgba(255,0,0,1))
        drop-shadow(0 0 6px rgba(255,0,0,.95))
        drop-shadow(0 0 13px rgba(255,0,0,.75));
      animation: clockBlink 1.08s steps(1, end) infinite;
    }

    .clock-svg {
      display: block;
      width: 100%;
      height: auto;
      overflow: visible;
    }

    .clock-seg {
      fill: #ff1717;
    }

    .clock-colon {
      fill: #ff1717;
      animation: colonBlink 1.08s steps(1, end) infinite;
    }

    /* ======================================================
       HOTSPOTS
    ====================================================== */

    #rabbitHotspots {
      position: absolute !important;
      inset: 0 !important;
      z-index: 300 !important;
    }

    .rabbit-hotspot {
      position: absolute !important;
      z-index: 310 !important;
      border: 0;
      background: transparent;
      cursor: pointer;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .rabbit-hotspot:hover {
      background: rgba(0,245,255,.10);
      box-shadow:
        0 0 22px rgba(0,245,255,.9),
        inset 0 0 18px rgba(255,42,163,.35);
    }

    .rabbit-edit-mode .rabbit-hotspot {
      background: rgba(0,245,255,.34) !important;
      border: 2px solid #00f5ff !important;
      box-shadow: 0 0 18px rgba(0,245,255,.95) !important;
    }

    .rabbit-edit-mode .rabbit-hotspot::after {
      content: attr(data-label);
      position: absolute;
      left: 50%;
      top: 115%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 10px;
      color: white;
      background: rgba(0,0,0,.78);
      border: 1px solid rgba(255,255,255,.35);
      border-radius: 999px;
      padding: 4px 7px;
      pointer-events: none;
    }

    /* ======================================================
       MODAL
    ====================================================== */

    .rabbit-modal {
      position: fixed !important;
      inset: 0 !important;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.82);
      z-index: 9000 !important;
      padding: 20px;
    }

    .rabbit-modal.active {
      display: flex;
    }

    .rabbit-modal-box {
      position: relative;
      width: min(620px, 94vw);
      border: 3px solid #ff2aa3;
      border-radius: 24px;
      padding: 30px;
      background: linear-gradient(180deg, rgba(19,0,31,.97), rgba(5,5,16,.98));
      box-shadow:
        0 0 32px rgba(255,42,163,.9),
        0 0 60px rgba(0,245,255,.6);
    }

    .rabbit-close {
      position: absolute;
      top: 10px;
      right: 16px;
      border: 0;
      background: transparent;
      color: white;
      font-size: 34px;
      cursor: pointer;
    }

    .rabbit-tag {
      color: #ffea00;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 8px;
      letter-spacing: .08em;
    }

    .rabbit-modal-box h2 {
      color: #00f5ff;
      margin: 0 0 12px;
      font-size: clamp(26px, 4vw, 42px);
      text-shadow: 0 0 14px rgba(0,245,255,.75);
    }

    .rabbit-modal-box p {
      color: #eee;
      line-height: 1.6;
      font-size: 18px;
    }

    .rabbit-link {
      display: block;
      margin-top: 18px;
      padding: 14px 18px;
      border-radius: 14px;
      background: #ff2aa3;
      color: white;
      text-decoration: none;
      text-align: center;
      font-weight: 900;
      box-shadow: 0 0 18px rgba(255,42,163,.85);
    }

    .rabbit-link:hover {
      background: #00aaff;
      box-shadow: 0 0 22px rgba(0,245,255,.9);
    }

    /* ======================================================
       TV SOUND BUTTON
    ====================================================== */

    .static-sound-toggle {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 7000;
      border: 2px solid #00f5ff;
      border-radius: 999px;
      background: rgba(0,0,0,.78);
      color: white;
      padding: 11px 14px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 0 16px rgba(0,245,255,.7);
    }

    .static-sound-toggle.on {
      border-color: #ff2aa3;
      box-shadow: 0 0 18px rgba(255,42,163,.85);
    }

    /* ======================================================
       EDITOR PANEL
    ====================================================== */

    .rabbit-editor-panel {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 10000;
      width: min(520px, calc(100vw - 24px));
      background: rgba(0,0,0,.92);
      border: 2px solid #00f5ff;
      border-radius: 14px;
      padding: 12px;
      color: white;
      box-shadow: 0 0 24px rgba(0,245,255,.65);
    }

    .rabbit-editor-panel strong {
      color: #00f5ff;
    }

    .rabbit-editor-panel p {
      margin: 8px 0;
      color: #dffcff;
      font-size: 13px;
    }

    .rabbit-editor-panel button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 11px;
      color: white;
      font-weight: 900;
      cursor: pointer;
      background: #ff2aa3;
      margin-bottom: 8px;
    }

    .rabbit-editor-panel textarea {
      width: 100%;
      height: 150px;
      background: #050510;
      color: #dffcff;
      border: 1px solid #00f5ff;
      border-radius: 10px;
      padding: 10px;
      font-family: monospace;
      font-size: 11px;
      box-sizing: border-box;
    }

    /* ======================================================
       KEYFRAMES
    ====================================================== */

    @keyframes neonFlicker {
      0%, 100% { opacity: .78; }
      3% { opacity: .25; }
      4% { opacity: .9; }
      8% { opacity: .38; }
      10% { opacity: .85; }
      64% { opacity: .7; }
      65% { opacity: .2; }
      66% { opacity: .9; }
    }

    @keyframes bunnyFlicker {
      0%, 100% { opacity: .72; transform: scale(1); }
      44% { opacity: .48; }
      45% { opacity: .95; transform: scale(1.03); }
      46% { opacity: .45; }
      47% { opacity: .9; }
    }

    @keyframes softPulse {
      0%, 100% { opacity: .32; transform: scale(1); }
      50% { opacity: .75; transform: scale(1.04); }
    }

    @keyframes lavaPulse {
      0%, 100% { opacity: .28; transform: scaleY(.95); }
      50% { opacity: .95; transform: scaleY(1.08); }
    }

    @keyframes lavaBubble {
      0% { transform: translateY(28px) scale(.7); opacity: .12; }
      25% { opacity: .72; }
      65% { opacity: .9; }
      100% { transform: translateY(-52px) scale(1.12); opacity: .05; }
    }

    @keyframes phonePulse {
      0%, 100% { opacity: .14; transform: scale(.98); }
      50% { opacity: .55; transform: scale(1.05); }
    }

    @keyframes heartPulse {
      0%, 100% { opacity: .25; transform: scale(.96); }
      50% { opacity: .9; transform: scale(1.12); }
    }

    @keyframes paperPulse {
      0%, 100% { opacity: .22; }
      50% { opacity: .62; }
    }

    @keyframes posterPulse {
      0%, 100% { opacity: .14; transform: scale(.99); }
      50% { opacity: .58; transform: scale(1.03); }
    }

    @keyframes shimmerSweep {
      0% { left: -90%; }
      45%, 100% { left: 140%; }
    }

    @keyframes magnifyGlint {
      0%, 100% { opacity: .08; transform: scale(.8); }
      40% { opacity: .8; transform: scale(1.1); }
    }

    @keyframes diamondFlash {
      0%, 100% { opacity: .12; transform: scale(.8) rotate(0deg); }
      50% { opacity: .9; transform: scale(1.18) rotate(12deg); }
    }

    @keyframes kittyPulse {
      0%, 100% { opacity: .18; transform: scale(.98); }
      50% { opacity: .7; transform: scale(1.08); }
    }

    @keyframes steamRise {
      0% { transform: translateY(18px) translateX(0); opacity: 0; }
      30% { opacity: .55; }
      100% { transform: translateY(-52px) translateX(10px); opacity: 0; }
    }

    @keyframes dustFloat {
      from { transform: translateY(0); opacity: .2; }
      50% { opacity: .7; }
      to { transform: translateY(-110px); opacity: .1; }
    }

    @keyframes tvLines {
      from { transform: translateY(0); }
      to { transform: translateY(8px); }
    }

    @keyframes tvRoll {
      from { transform: translateY(-60%); }
      to { transform: translateY(620%); }
    }

    @keyframes clockBlink {
      0%, 49% {
        opacity: .96;
      }

      50%, 100% {
        opacity: .18;
      }
    }

    @keyframes colonBlink {
      0%, 49% {
        opacity: 1;
      }

      50%, 100% {
        opacity: .2;
      }
    }

    /* ======================================================
       MOBILE / iPHONE
    ====================================================== */

    @media (max-width: 760px) {
      .mobile-rabbit-hint {
        display: block;
      }

      .rabbit-stage {
        width: 1180px !important;
        max-width: none !important;
        margin: 0 !important;
      }

      .static-sound-toggle {
        right: 10px;
        bottom: 10px;
        font-size: 11px;
        padding: 9px 11px;
      }

      .rabbit-modal {
        padding: 14px;
      }

      .rabbit-modal-box {
        padding: 24px;
      }

      .rabbit-modal-box p {
        font-size: 16px;
      }

      .clock-svg-wrap {
        width: 50px !important;
      }
    }
  </style>
</head>

<body class="rabbit-page">
  <div class="scanlines"></div>

  <div class="rabbit-page-shell">
    <div class="mobile-rabbit-hint">
      ← SWIPE THE ROOM • TAP CLUES • FOLLOW THE RABBIT HOLE →
    </div>

    <button id="staticSoundToggle" class="static-sound-toggle" type="button">
      TV STATIC: OFF
    </button>

    <div class="rabbit-scroll-wrap" id="rabbitScrollWrap">
      <main class="rabbit-stage" id="rabbitStage">
        <img src="rabbit-hole-bg.png" alt="$TEDDY The Rabbit Hole" class="rabbit-bg" />

        <div class="anim-layer moass-neon"></div>
        <div class="anim-layer bunny-neon"></div>
        <div class="anim-layer arcade-glow"></div>
        <div class="anim-layer lava-glow"></div>
        <div class="lava-bubble-one"></div>
        <div class="lava-bubble-two"></div>
        <div class="lava-bubble-three"></div>
        <div class="anim-layer phone-glow"></div>
        <div class="anim-layer heart-gme-pulse"></div>
        <div class="anim-layer power-glow"></div>
        <div class="anim-layer hang-poster-glow"></div>
        <div class="anim-layer chart-shimmer"></div>

  <script>
    /* ======================================================
       TV STATIC CANVAS
    ====================================================== */

    const tvCanvas = document.getElementById("tvStaticCanvas");
    const tvCtx = tvCanvas.getContext("2d", { willReadFrequently: true });
    const staticWidth = 180;
    const staticHeight = 120;

    tvCanvas.width = staticWidth;
    tvCanvas.height = staticHeight;

    function drawTvStatic() {
      const imageData = tvCtx.createImageData(staticWidth, staticHeight);
      const data = imageData.data;

      for (let i = 0; i < data.length; i += 4) {
        const shade = Math.random() * 255;
        const pop = Math.random() > 0.985 ? 255 : shade;

        data[i] = pop;
        data[i + 1] = pop;
        data[i + 2] = pop;
        data[i + 3] = 135 + Math.random() * 95;
      }

      tvCtx.putImageData(imageData, 0, 0);

      tvCtx.fillStyle = "rgba(80, 210, 255, 0.06)";
      tvCtx.fillRect(0, 0, staticWidth, staticHeight);

      if (Math.random() > 0.9) {
        tvCtx.fillStyle = "rgba(255,255,255,0.25)";
        tvCtx.fillRect(0, Math.random() * staticHeight, staticWidth, 2 + Math.random() * 6);
      }

      requestAnimationFrame(drawTvStatic);
    }

    drawTvStatic();

    /* ======================================================
       OPTIONAL TV STATIC SOUND
    ====================================================== */

    const staticSoundToggle = document.getElementById("staticSoundToggle");
    let audioContext = null;
    let staticNode = null;
    let staticGain = null;
    let staticPlaying = false;

    function startStaticSound() {
      if (staticPlaying) return;

      audioContext = new (window.AudioContext || window.webkitAudioContext)();

      const bufferSize = 2 * audioContext.sampleRate;
      const noiseBuffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
      const output = noiseBuffer.getChannelData(0);

      for (let i = 0; i < bufferSize; i++) {
        output[i] = Math.random() * 2 - 1;
      }

      staticNode = audioContext.createBufferSource();
      staticNode.buffer = noiseBuffer;
      staticNode.loop = true;

      staticGain = audioContext.createGain();
      staticGain.gain.value = 0.025;

      const filter = audioContext.createBiquadFilter();
      filter.type = "highpass";
      filter.frequency.value = 850;

      staticNode.connect(filter);
      filter.connect(staticGain);
      staticGain.connect(audioContext.destination);

      staticNode.start();
      staticPlaying = true;

      staticSoundToggle.textContent = "TV STATIC: ON";
      staticSoundToggle.classList.add("on");
    }

    function stopStaticSound() {
      if (!staticPlaying) return;

      try { staticNode.stop(); } catch {}
      try { audioContext.close(); } catch {}

      audioContext = null;
      staticNode = null;
      staticGain = null;
      staticPlaying = false;

      staticSoundToggle.textContent = "TV STATIC: OFF";
      staticSoundToggle.classList.remove("on");
    }

    staticSoundToggle.addEventListener("click", () => {
      if (staticPlaying) {
        stopStaticSound();
      } else {
        startStaticSound();
      }
    });

    /* ======================================================
       MOBILE START POSITION
    ====================================================== */

    window.addEventListener("load", () => {
      const wrap = document.getElementById("rabbitScrollWrap");

      if (window.innerWidth <= 760 && wrap) {
        wrap.scrollLeft = 360;
      }
    });
  </script>
