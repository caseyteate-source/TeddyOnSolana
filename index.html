<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>$TEDDY | Insert Coin</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    body {
      margin: 0;
      background:
        radial-gradient(circle at 50% 0%, rgba(0,245,255,.16), transparent 34%),
        radial-gradient(circle at 20% 20%, rgba(255,42,163,.18), transparent 28%),
        #030306;
      color: white;
      overflow-x: hidden;
    }

    .arcade-page {
      min-height: 100vh;
      padding: 14px 14px 28px;
      box-sizing: border-box;
    }

    .arcade-top-panel {
      width: min(99vw, 1180px);
      margin: 0 auto 12px;
      padding: 12px 16px;
      box-sizing: border-box;
      border: 2px solid rgba(0,245,255,.5);
      border-radius: 18px;
      background:
        linear-gradient(90deg, rgba(255,42,163,.18), rgba(0,245,255,.14)),
        rgba(0,0,0,.72);
      box-shadow:
        0 0 18px rgba(0,245,255,.35),
        0 0 24px rgba(255,42,163,.22);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .arcade-instructions {
      flex: 1 1 420px;
      font-size: clamp(11px, 1vw, 14px);
      line-height: 1.45;
      color: #dffcff;
      text-shadow: 0 0 8px rgba(0,0,0,.9);
    }

    .arcade-instructions strong {
      color: #ffea00;
    }

    .arcade-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .arcade-btn {
      border: 0;
      border-radius: 999px;
      padding: 13px 22px;
      color: white;
      font-weight: 900;
      letter-spacing: 1px;
      cursor: pointer;
      background: #ff2aa3;
      box-shadow:
        0 0 14px rgba(255,42,163,.95),
        inset 0 -3px 0 rgba(0,0,0,.25);
      font-size: clamp(12px, 1.1vw, 16px);
      text-transform: uppercase;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .arcade-btn:hover {
      transform: translateY(-2px);
      background: #00aaff;
      box-shadow: 0 0 18px rgba(0,245,255,.95);
    }

    .arcade-btn.enter {
      background: #00aaff;
      box-shadow:
        0 0 14px rgba(0,245,255,.95),
        inset 0 -3px 0 rgba(0,0,0,.25);
    }

    .arcade-btn.enter:hover {
      background: #ff2aa3;
      box-shadow: 0 0 18px rgba(255,42,163,.95);
    }

    .arcade-shell {
      position: relative;
      width: min(99vw, 1180px);
      margin: 0 auto;
    }

    .arcade-cabinet-img {
      width: 100%;
      height: auto;
      display: block;
      filter:
        drop-shadow(0 0 24px rgba(255,42,163,.75))
        drop-shadow(0 0 42px rgba(0,245,255,.45));
      user-select: none;
      -webkit-user-drag: none;
    }

    /*
      Game screen placement inside the cabinet.
      If the screen is slightly off later, only adjust these 4 values.
    */
    .arcade-screen {
      position: absolute;
      left: 22.6%;
      top: 19.2%;
      width: 54.8%;
      height: 33.8%;
      border-radius: 12px;
      overflow: hidden;
      background: #050510;
      box-shadow:
        inset 0 0 22px rgba(0,245,255,.5),
        0 0 18px rgba(0,245,255,.55);
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #050510;
      cursor: crosshair;
    }

    #siteContent {
      display: none;
    }

    @media (max-width: 700px) {
      .arcade-page {
        padding: 10px 8px 30px;
        overflow-x: auto;
      }

      .arcade-top-panel {
        width: 1180px;
        max-width: none;
        margin-left: 0;
        margin-right: 0;
      }

      .arcade-shell {
        width: 1180px;
        max-width: none;
        margin-left: 0;
        margin-right: 0;
      }

      body {
        overflow-x: auto;
      }

      .arcade-top-panel {
        justify-content: flex-start;
      }

      .arcade-instructions {
        flex-basis: 100%;
      }
    }
  
    /* ======================================================
       MOBILE ARCADE + REAL CABINET BUTTONS - CLEAN V6
    ====================================================== */

    #gameCanvas,
    .arcade-screen,
    .mobile-gamepad,
    .mobile-gamepad * {
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .cabinet-button-hotspot {
      position: absolute;
      z-index: 90;
      border: 0;
      padding: 0;
      margin: 0;
      background: transparent;
      border-radius: 999px;
      cursor: pointer;
      transform: translate(-50%, -50%);
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    .cabinet-button-hotspot span {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    body.arcade-show-cabinet-buttons .cabinet-button-hotspot,
    body.arcade-edit-buttons .cabinet-button-hotspot {
      background: rgba(0,245,255,.22);
      border: 2px solid rgba(0,245,255,.92);
      box-shadow:
        0 0 20px rgba(0,245,255,.75),
        inset 0 0 14px rgba(255,42,163,.35);
    }

    body.arcade-show-cabinet-buttons .cabinet-button-hotspot span,
    body.arcade-edit-buttons .cabinet-button-hotspot span {
      position: static;
      width: auto;
      height: auto;
      clip: auto;
      display: grid;
      place-items: center;
      color: white;
      font-size: 11px;
      font-weight: 900;
      text-shadow: 0 2px 4px black;
      pointer-events: none;
    }

    .mobile-gamepad {
      display: none;
      width: min(236px, calc(100vw - 18px));
      margin: 8px auto 0;
      padding: 6px;
      border: 2px solid rgba(0,245,255,.5);
      border-radius: 16px;
      background:
        linear-gradient(180deg, rgba(255,42,163,.13), rgba(0,245,255,.09)),
        rgba(0,0,0,.80);
      box-shadow:
        0 0 14px rgba(0,245,255,.25),
        0 0 16px rgba(255,42,163,.20);
      touch-action: none;
    }

    .mobile-gamepad-title {
      text-align: center;
      color: #ffea00;
      font-weight: 900;
      font-size: 9px;
      letter-spacing: .08em;
      margin-bottom: 5px;
      text-transform: uppercase;
    }

    .mobile-gamepad-grid {
      display: grid;
      grid-template-columns: 36px 36px 36px;
      grid-template-rows: 33px 33px 33px;
      gap: 5px;
      justify-content: center;
      grid-template-areas:
        ". up ."
        "left center right"
        ". down .";
    }

    .mobile-pad-btn {
      border: 0;
      border-radius: 9px;
      background: #ff2aa3;
      color: white;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      box-shadow:
        0 0 10px rgba(255,42,163,.70),
        inset 0 -3px 0 rgba(0,0,0,.28);
      touch-action: none;
    }

    .mobile-pad-btn:active,
    .mobile-pad-btn.active {
      transform: translateY(2px);
      background: #00aaff;
      box-shadow:
        0 0 16px rgba(0,245,255,.90),
        inset 0 -1px 0 rgba(0,0,0,.24);
    }

    .mobile-pad-up { grid-area: up; }
    .mobile-pad-left { grid-area: left; }
    .mobile-pad-right { grid-area: right; }
    .mobile-pad-down { grid-area: down; }

    .mobile-pad-center {
      grid-area: center;
      display: grid;
      place-items: center;
      color: #dffcff;
      font-size: 7.5px;
      text-align: center;
      line-height: 1.08;
      padding: 3px;
      border-radius: 9px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.52);
    }

    .mobile-gamepad-hint {
      text-align: center;
      margin-top: 5px;
      font-size: 8.5px;
      line-height: 1.25;
      color: #dffcff;
    }

    .cabinet-editor-panel {
      position: fixed;
      left: 10px;
      right: 10px;
      bottom: 10px;
      z-index: 9000;
      max-width: 560px;
      margin: 0 auto;
      padding: 12px;
      border: 2px solid #00f5ff;
      border-radius: 14px;
      background: rgba(0,0,0,.94);
      color: white;
      box-shadow: 0 0 22px rgba(0,245,255,.65);
      font-family: Arial, Helvetica, sans-serif;
    }

    .cabinet-editor-panel strong {
      color: #00f5ff;
    }

    .cabinet-editor-panel p {
      margin: 7px 0;
      font-size: 12px;
      line-height: 1.35;
      color: #dffcff;
    }

    .cabinet-editor-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .cabinet-editor-panel button {
      border: 0;
      border-radius: 10px;
      background: #ff2aa3;
      color: white;
      font-weight: 900;
      cursor: pointer;
      padding: 10px;
      font-size: 12px;
    }

    .cabinet-editor-panel button.secondary {
      background: #00aaff;
    }

    .cabinet-editor-panel textarea {
      width: 100%;
      height: 120px;
      margin-top: 8px;
      padding: 9px;
      border: 1px solid #00f5ff;
      border-radius: 10px;
      background: #050510;
      color: #dffcff;
      font-family: monospace;
      font-size: 11px;
      box-sizing: border-box;
    }

    @media (max-width: 760px) {
      body {
        overflow-x: hidden;
        background: #030306;
      }

      .arcade-page {
        padding: 6px 4px 86px;
        overflow-x: hidden;
        min-height: 100svh;
      }

      .arcade-top-panel {
        width: min(100%, 520px);
        max-width: 100%;
        margin: 0 auto 6px;
        padding: 8px;
        border-radius: 14px;
        gap: 8px;
      }

      .arcade-instructions {
        flex-basis: 100%;
        font-size: 10px;
        line-height: 1.25;
      }

      .arcade-controls {
        width: 100%;
        justify-content: center;
        gap: 7px;
      }

      .arcade-btn {
        padding: 10px 12px;
        font-size: 11px;
      }

      /*
        Mobile fit mode: cabinet is a little wider than the viewport
        so the game screen, Teddy, and emojis are not microscopic.
      */
      .arcade-shell {
        width: min(126vw, 600px);
        max-width: none;
        margin-left: 50%;
        transform: translateX(-50%);
      }

      .arcade-screen {
        border-radius: 7px;
      }

      .mobile-gamepad {
        display: block;
        position: fixed;
        left: 50%;
        bottom: max(8px, env(safe-area-inset-bottom));
        transform: translateX(-50%);
        z-index: 5000;
      }

      body.arcade-desktop-mode {
        overflow-x: auto;
      }

      body.arcade-desktop-mode .arcade-page {
        overflow-x: auto;
      }

      body.arcade-desktop-mode .arcade-top-panel {
        width: 1180px;
        max-width: none;
        margin-left: 0;
        margin-right: 0;
      }

      body.arcade-desktop-mode .arcade-shell {
        width: 1180px;
        max-width: none;
        margin-left: 0;
        margin-right: 0;
        transform: none;
      }
    }

  </style>

  <script>
    /*
      Hard override:
      Keeps the arcade page/game the same, but forces ENTER SITE to teddy.html
      even if script.js still has older hq.html routing inside it.
    */
    document.addEventListener("click", function (event) {
      const enterLink = event.target.closest(".arcade-btn.enter, #enterSite, #enterWebsite");
      if (!enterLink) return;

      event.preventDefault();
      event.stopPropagation();
      event.stopImmediatePropagation();

      window.location.href = "teddy.html";
    }, true);

    window.TEDDY_ENTER_SITE_URL = "teddy.html";
  </script>
</head>

  <section id="siteContent" class="hidden"></section>


  <script>
    /*
      iPhone canvas emoji fix:
      Forces Apple Color Emoji for the game emojis/Teddy/skulls and removes
      the heavy glow on iPhone so they do not render as dark shadows.
    */
    (function () {
      if (!window.CanvasRenderingContext2D) return;

      const proto = CanvasRenderingContext2D.prototype;
      if (proto.__teddyEmojiPatchApplied) return;
      proto.__teddyEmojiPatchApplied = true;

      const originalFillText = proto.fillText;

      const isiPhoneLike =
        /iPhone|iPad|iPod/i.test(navigator.userAgent) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

      function hasEmoji(text) {
        return /[\u2600-\u27BF]|\uD83C[\uD000-\uDFFF]|\uD83D[\uDC00-\uDFFF]|\uD83E[\uDD00-\uDFFF]/.test(String(text));
      }

      function mostlyEmoji(text) {
        const value = String(text).trim();
        return hasEmoji(value) && value.length <= 8;
      }

      function emojiFontFrom(currentFont) {
        const match = String(currentFont || "").match(/(\d+(?:\.\d+)?)px/i);
        const px = match ? match[1] : "32";
        return `${px}px "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif`;
      }

      proto.fillText = function patchedFillText(text, x, y, maxWidth) {
        if (!mostlyEmoji(text)) {
          return originalFillText.apply(this, arguments);
        }

        const oldFont = this.font;
        const oldShadowBlur = this.shadowBlur;
        const oldShadowColor = this.shadowColor;
        const oldFillStyle = this.fillStyle;

        this.font = emojiFontFrom(oldFont);

        if (isiPhoneLike) {
          this.shadowBlur = 0;
          this.shadowColor = "transparent";
        } else {
          this.shadowBlur = Math.min(Number(oldShadowBlur) || 0, 5);
        }

        this.fillStyle = "#ffffff";

        const result = typeof maxWidth === "number"
          ? originalFillText.call(this, text, x, y, maxWidth)
          : originalFillText.call(this, text, x, y);

        this.font = oldFont;
        this.shadowBlur = oldShadowBlur;
        this.shadowColor = oldShadowColor;
        this.fillStyle = oldFillStyle;

        return result;
      };
    })();
  </script>


  <script src="script.js"></script>

  <script>
    /*
      Clean mobile + cabinet button helper v6.
      No stacked old code. No extra START/SELECT row under the arrows.
    */
    (function () {
      const body = document.body;
      const startBtn = document.getElementById("startGame");
      const canvas = document.getElementById("gameCanvas");
      const screen = document.querySelector(".arcade-screen");
      const shell = document.querySelector(".arcade-shell");
      const cabinetStartBtn = document.getElementById("cabinetStartBtn");
      const cabinetSelectBtn = document.getElementById("cabinetSelectBtn");
      const mobileButtons = document.querySelectorAll("[data-arcade-key]");
      const params = new URLSearchParams(window.location.search);

      const showButtons = params.has("showbuttons");
      const editButtons = params.has("editbuttons");

      const zones = {
        /*
          Defaults can be changed in edit mode. These are just starting points.
          START and SELECT are intentionally separated far enough to avoid overlap.
        */
        start: { left: 45.7, top: 82.2, width: 8.2, height: 5.6 },
        select: { left: 56.2, top: 82.2, width: 8.2, height: 5.6 }
      };

      if (showButtons || editButtons) {
        body.classList.add("arcade-show-cabinet-buttons");
      }

      if (editButtons) {
        body.classList.add("arcade-edit-buttons");
      }

      function applyZone(button, zone) {
        if (!button || !zone) return;

        button.style.left = zone.left + "%";
        button.style.top = zone.top + "%";
        button.style.width = zone.width + "%";
        button.style.height = zone.height + "%";
      }

      function applyAllZones() {
        applyZone(cabinetStartBtn, zones.start);
        applyZone(cabinetSelectBtn, zones.select);
      }

      function forceCanvasRefresh() {
        requestAnimationFrame(function () {
          window.dispatchEvent(new Event("resize"));
        });

        setTimeout(function () {
          window.dispatchEvent(new Event("resize"));
        }, 100);

        setTimeout(function () {
          window.dispatchEvent(new Event("resize"));
        }, 320);
      }

      function setViewMode(mode) {
        if (mode === "desktop") {
          body.classList.add("arcade-desktop-mode");
          localStorage.setItem("teddyArcadeViewMode", "desktop");
        } else {
          body.classList.remove("arcade-desktop-mode");
          localStorage.setItem("teddyArcadeViewMode", "fit");
        }

        forceCanvasRefresh();
      }

      function toggleViewMode() {
        const isDesktop = body.classList.contains("arcade-desktop-mode");
        setViewMode(isDesktop ? "fit" : "desktop");
      }

      function applyInitialViewMode() {
        const saved = localStorage.getItem("teddyArcadeViewMode");
        const small = window.matchMedia("(max-width: 760px)").matches;

        if (small) {
          setViewMode(saved === "desktop" ? "desktop" : "fit");
        } else {
          body.classList.remove("arcade-desktop-mode");
          forceCanvasRefresh();
        }
      }

      function startArcadeGame() {
        forceCanvasRefresh();

        if (typeof window.startGame === "function") {
          window.startGame();
        } else if (startBtn) {
          startBtn.click();
        }

        forceCanvasRefresh();
      }

      function fireKey(type, key) {
        const event = new KeyboardEvent(type, {
          key,
          code: key,
          bubbles: true,
          cancelable: true
        });

        window.dispatchEvent(event);
        document.dispatchEvent(event);
      }

      mobileButtons.forEach(function (button) {
        const key = button.dataset.arcadeKey;

        button.addEventListener("pointerdown", function (event) {
          event.preventDefault();
          try { button.setPointerCapture(event.pointerId); } catch {}
          button.classList.add("active");
          fireKey("keydown", key);
        });

        ["pointerup", "pointercancel", "pointerleave"].forEach(function (eventName) {
          button.addEventListener(eventName, function (event) {
            event.preventDefault();
            button.classList.remove("active");
            fireKey("keyup", key);
          });
        });

        button.addEventListener("contextmenu", function (event) {
          event.preventDefault();
        });
      });

      [canvas, screen].forEach(function (el) {
        if (!el) return;

        el.addEventListener("touchstart", function (event) {
          event.preventDefault();
        }, { passive: false });

        el.addEventListener("touchmove", function (event) {
          event.preventDefault();
        }, { passive: false });

        el.addEventListener("pointerdown", forceCanvasRefresh);
      });

      function moveZone(which, dx, dy) {
        zones[which].left = Number((zones[which].left + dx).toFixed(2));
        zones[which].top = Number((zones[which].top + dy).toFixed(2));
        applyAllZones();
        updateEditorOutput();
      }

      function resizeZone(which, dw, dh) {
        zones[which].width = Number(Math.max(2, zones[which].width + dw).toFixed(2));
        zones[which].height = Number(Math.max(2, zones[which].height + dh).toFixed(2));
        applyAllZones();
        updateEditorOutput();
      }

      function swapZones() {
        const oldStart = { ...zones.start };
        zones.start = { ...zones.select };
        zones.select = oldStart;
        applyAllZones();
        updateEditorOutput();
      }

      function makeDraggable(button, which) {
        if (!button || !editButtons) return;

        button.addEventListener("pointerdown", function (event) {
          event.preventDefault();
          event.stopPropagation();

          try { button.setPointerCapture(event.pointerId); } catch {}

          const rect = shell.getBoundingClientRect();
          const startX = event.clientX;
          const startY = event.clientY;
          const startLeft = zones[which].left;
          const startTop = zones[which].top;

          function move(e) {
            zones[which].left = Number((startLeft + ((e.clientX - startX) / rect.width) * 100).toFixed(2));
            zones[which].top = Number((startTop + ((e.clientY - startY) / rect.height) * 100).toFixed(2));
            applyAllZones();
            updateEditorOutput();
          }

          function stop() {
            try { button.releasePointerCapture(event.pointerId); } catch {}
            button.removeEventListener("pointermove", move);
            button.removeEventListener("pointerup", stop);
            button.removeEventListener("pointercancel", stop);
            updateEditorOutput();
          }

          button.addEventListener("pointermove", move);
          button.addEventListener("pointerup", stop);
          button.addEventListener("pointercancel", stop);
        });
      }

      function createEditorPanel() {
        if (!editButtons || document.getElementById("cabinetEditorPanel")) return;

        const panel = document.createElement("div");
        panel.id = "cabinetEditorPanel";
        panel.className = "cabinet-editor-panel";
        panel.innerHTML = `
          <strong>Cabinet Button Editor</strong>
          <p>Drag START and SELECT boxes, or use the nudge buttons. If the buttons are reversed, tap SWAP.</p>

          <div class="cabinet-editor-grid">
            <button type="button" data-nudge="start:-1:0">START ←</button>
            <button type="button" data-nudge="select:-1:0">SELECT ←</button>
            <button type="button" data-nudge="start:1:0">START →</button>
            <button type="button" data-nudge="select:1:0">SELECT →</button>
            <button type="button" data-nudge="start:0:-1">START ↑</button>
            <button type="button" data-nudge="select:0:-1">SELECT ↑</button>
            <button type="button" data-nudge="start:0:1">START ↓</button>
            <button type="button" data-nudge="select:0:1">SELECT ↓</button>
          </div>

          <div class="cabinet-editor-grid">
            <button type="button" class="secondary" id="swapCabinetZones">SWAP START / SELECT</button>
            <button type="button" class="secondary" id="copyCabinetZones">COPY POSITIONS</button>
            <button type="button" data-size="start:1:0">START WIDER</button>
            <button type="button" data-size="select:1:0">SELECT WIDER</button>
            <button type="button" data-size="start:-1:0">START NARROWER</button>
            <button type="button" data-size="select:-1:0">SELECT NARROWER</button>
          </div>

          <textarea id="cabinetZonesOutput" readonly></textarea>
        `;

        document.body.appendChild(panel);

        panel.querySelectorAll("[data-nudge]").forEach(function (btn) {
          btn.addEventListener("click", function () {
            const [which, dx, dy] = btn.dataset.nudge.split(":");
            moveZone(which, Number(dx), Number(dy));
          });
        });

        panel.querySelectorAll("[data-size]").forEach(function (btn) {
          btn.addEventListener("click", function () {
            const [which, dw, dh] = btn.dataset.size.split(":");
            resizeZone(which, Number(dw), Number(dh));
          });
        });

        document.getElementById("swapCabinetZones").addEventListener("click", swapZones);

        document.getElementById("copyCabinetZones").addEventListener("click", async function () {
          updateEditorOutput();
          const output = document.getElementById("cabinetZonesOutput");
          const value = output ? output.value : "";

          try {
            await navigator.clipboard.writeText(value);
            this.textContent = "COPIED!";
            setTimeout(() => { this.textContent = "COPY POSITIONS"; }, 1200);
          } catch {
            alert("Could not auto-copy. Select the text box and copy manually.");
          }
        });

        updateEditorOutput();
      }

      function updateEditorOutput() {
        const output = document.getElementById("cabinetZonesOutput");
        if (!output) return;

        output.value =
`const zones = {
  start: { left: ${zones.start.left}, top: ${zones.start.top}, width: ${zones.start.width}, height: ${zones.start.height} },
  select: { left: ${zones.select.left}, top: ${zones.select.top}, width: ${zones.select.width}, height: ${zones.select.height} }
};`;
      }

      applyAllZones();

      if (!editButtons) {
        if (cabinetStartBtn) {
          cabinetStartBtn.addEventListener("click", function (event) {
            event.preventDefault();
            event.stopPropagation();
            startArcadeGame();
          });
        }

        if (cabinetSelectBtn) {
          cabinetSelectBtn.addEventListener("click", function (event) {
            event.preventDefault();
            event.stopPropagation();
            toggleViewMode();
          });
        }
      } else {
        makeDraggable(cabinetStartBtn, "start");
        makeDraggable(cabinetSelectBtn, "select");
        createEditorPanel();
      }

      applyInitialViewMode();
      window.addEventListener("resize", forceCanvasRefresh);
      window.addEventListener("orientationchange", function () {
        setTimeout(forceCanvasRefresh, 260);
      });
      setTimeout(forceCanvasRefresh, 80);
      setTimeout(forceCanvasRefresh, 500);
    })();
  </script>


  <script>
    /*
      Second pass after script.js loads:
      If script.js rewrites the href back to hq.html, this changes it back.
    */
    (function () {
      const enterLink = document.querySelector(".arcade-btn.enter, #enterSite, #enterWebsite");
      if (!enterLink) return;

      enterLink.setAttribute("href", "teddy.html");
      enterLink.onclick = function (event) {
        event.preventDefault();
        event.stopPropagation();
        window.location.href = "teddy.html";
        return false;
      };
    })();
  </script>
</body>
</html>
