<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>$TEDDY | Insert Coin</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    body {
      margin: 0;
      background:
        radial-gradient(circle at 50% 0%, rgba(0,245,255,.16), transparent 34%),
        radial-gradient(circle at 20% 20%, rgba(255,42,163,.18), transparent 28%),
        #030306;
      color: white;
      overflow-x: hidden;
    }

    .arcade-page {
      min-height: 100vh;
      padding: 14px 14px 28px;
      box-sizing: border-box;
    }

    .arcade-top-panel {
      width: min(99vw, 1180px);
      margin: 0 auto 12px;
      padding: 12px 16px;
      box-sizing: border-box;
      border: 2px solid rgba(0,245,255,.5);
      border-radius: 18px;
      background:
        linear-gradient(90deg, rgba(255,42,163,.18), rgba(0,245,255,.14)),
        rgba(0,0,0,.72);
      box-shadow:
        0 0 18px rgba(0,245,255,.35),
        0 0 24px rgba(255,42,163,.22);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .arcade-instructions {
      flex: 1 1 420px;
      font-size: clamp(11px, 1vw, 14px);
      line-height: 1.45;
      color: #dffcff;
      text-shadow: 0 0 8px rgba(0,0,0,.9);
    }

    .arcade-instructions strong {
      color: #ffea00;
    }

    .arcade-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .arcade-btn {
      border: 0;
      border-radius: 999px;
      padding: 13px 22px;
      color: white;
      font-weight: 900;
      letter-spacing: 1px;
      cursor: pointer;
      background: #ff2aa3;
      box-shadow:
        0 0 14px rgba(255,42,163,.95),
        inset 0 -3px 0 rgba(0,0,0,.25);
      font-size: clamp(12px, 1.1vw, 16px);
      text-transform: uppercase;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .arcade-btn:hover {
      transform: translateY(-2px);
      background: #00aaff;
      box-shadow: 0 0 18px rgba(0,245,255,.95);
    }

    .arcade-btn.enter {
      background: #00aaff;
      box-shadow:
        0 0 14px rgba(0,245,255,.95),
        inset 0 -3px 0 rgba(0,0,0,.25);
    }

    .arcade-btn.enter:hover {
      background: #ff2aa3;
      box-shadow: 0 0 18px rgba(255,42,163,.95);
    }

    .arcade-shell {
      position: relative;
      width: min(99vw, 1180px);
      margin: 0 auto;
    }

    .arcade-cabinet-img {
      width: 100%;
      height: auto;
      display: block;
      filter:
        drop-shadow(0 0 24px rgba(255,42,163,.75))
        drop-shadow(0 0 42px rgba(0,245,255,.45));
      user-select: none;
      -webkit-user-drag: none;
    }

    /*
      Game screen placement inside the cabinet.
      If the screen is slightly off later, only adjust these 4 values.
    */
    .arcade-screen {
      position: absolute;
      left: 22.6%;
      top: 19.2%;
      width: 54.8%;
      height: 33.8%;
      border-radius: 12px;
      overflow: hidden;
      background: #050510;
      box-shadow:
        inset 0 0 22px rgba(0,245,255,.5),
        0 0 18px rgba(0,245,255,.55);
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #050510;
      cursor: crosshair;
    }

    #siteContent {
      display: none;
    }

    @media (max-width: 700px) {
      .arcade-page {
        padding: 10px 8px 30px;
        overflow-x: auto;
      }

      .arcade-top-panel {
        width: 1180px;
        max-width: none;
        margin-left: 0;
        margin-right: 0;
      }

      .arcade-shell {
        width: 1180px;
        max-width: none;
        margin-left: 0;
        margin-right: 0;
      }

      body {
        overflow-x: auto;
      }

      .arcade-top-panel {
        justify-content: flex-start;
      }

      .arcade-instructions {
        flex-basis: 100%;
      }
    }
  

    /* ======================================================
       MOBILE ARCADE FIT MODE + COMPACT PHONE CONTROLS
       v2: larger mobile cabinet, smaller controls, stronger canvas sizing
    ====================================================== */

    #gameCanvas,
    .arcade-screen,
    .mobile-gamepad,
    .mobile-gamepad * {
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    #gameCanvas {
      image-rendering: auto;
    }

    .arcade-view-toggle {
      background: #7b2cff;
      box-shadow:
        0 0 14px rgba(123,44,255,.92),
        inset 0 -3px 0 rgba(0,0,0,.25);
    }

    .mobile-gamepad {
      display: none;
      width: min(292px, calc(100vw - 20px));
      margin: 10px auto 0;
      padding: 8px;
      border: 2px solid rgba(0,245,255,.5);
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255,42,163,.13), rgba(0,245,255,.09)),
        rgba(0,0,0,.80);
      box-shadow:
        0 0 14px rgba(0,245,255,.25),
        0 0 16px rgba(255,42,163,.20);
      touch-action: none;
    }

    .mobile-gamepad-title {
      text-align: center;
      color: #ffea00;
      font-weight: 900;
      font-size: 10px;
      letter-spacing: .08em;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .mobile-gamepad-grid {
      display: grid;
      grid-template-columns: 46px 46px 46px;
      grid-template-rows: 42px 42px 42px;
      gap: 6px;
      justify-content: center;
      grid-template-areas:
        ". up ."
        "left center right"
        ". down .";
    }

    .mobile-pad-btn,
    .mobile-action-btn {
      border: 0;
      border-radius: 12px;
      background: #ff2aa3;
      color: white;
      font-weight: 900;
      cursor: pointer;
      box-shadow:
        0 0 10px rgba(255,42,163,.70),
        inset 0 -3px 0 rgba(0,0,0,.28);
      touch-action: none;
    }

    .mobile-pad-btn {
      font-size: 21px;
      line-height: 1;
    }
.mobile-pad-btn:active,
    .mobile-pad-btn.active {
      transform: translateY(2px);
      background: #00aaff;
      box-shadow:
        0 0 16px rgba(0,245,255,.90),
        inset 0 -1px 0 rgba(0,0,0,.24);
    }

    .mobile-pad-up { grid-area: up; }
    .mobile-pad-left { grid-area: left; }
    .mobile-pad-right { grid-area: right; }
    .mobile-pad-down { grid-area: down; }

    .mobile-pad-center {
      grid-area: center;
      display: grid;
      place-items: center;
      color: #dffcff;
      font-size: 9px;
      text-align: center;
      line-height: 1.12;
      padding: 4px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.52);
    }

    .mobile-gamepad-hint {
      text-align: center;
      margin-top: 6px;
      font-size: 9px;
      line-height: 1.25;
      color: #dffcff;
    }

    @media (max-width: 760px) {
      body {
        overflow-x: hidden;
        background: #030306;
      }

      .arcade-page {
        padding: 6px 4px 86px;
        overflow-x: hidden;
        min-height: 100svh;
      }

      .arcade-top-panel {
        width: min(100%, 520px);
        max-width: 100%;
        margin: 0 auto 6px;
        padding: 8px;
        border-radius: 14px;
        gap: 8px;
      }

      .arcade-instructions {
        flex-basis: 100%;
        font-size: 10px;
        line-height: 1.25;
      }

      .arcade-controls {
        width: 100%;
        justify-content: center;
        gap: 7px;
      }

      .arcade-btn {
        padding: 10px 12px;
        font-size: 11px;
        border-radius: 999px;
      }

      /*
        Fit mode: cabinet is intentionally a little larger than the phone.
        This makes the actual game screen big enough for Teddy/emojis to show.
      */
      .arcade-shell {
        width: min(118vw, 560px);
        max-width: none;
        margin-left: 50%;
        transform: translateX(-50%);
      }

      .arcade-screen {
        border-radius: 7px;
        box-shadow:
          inset 0 0 15px rgba(0,245,255,.54),
          0 0 12px rgba(0,245,255,.50);
      }

      .mobile-gamepad {
        display: block;
        position: fixed;
        left: 50%;
        bottom: max(8px, env(safe-area-inset-bottom));
        transform: translateX(-50%);
        z-index: 5000;
      }

      /*
        SELECT / desktop mode: full wide cabinet with horizontal scrolling.
      */
      body.arcade-desktop-mode {
        overflow-x: auto;
      }

      body.arcade-desktop-mode .arcade-page {
        overflow-x: auto;
        align-items: flex-start;
      }

      body.arcade-desktop-mode .arcade-top-panel {
        width: 1180px;
        max-width: none;
        margin-left: 0;
        margin-right: 0;
      }

      body.arcade-desktop-mode .arcade-shell {
        width: 1180px;
        max-width: none;
        margin-left: 0;
        margin-right: 0;
        transform: none;
      }
    }

  
    /* ======================================================
       ACTUAL CABINET START / SELECT HOTSPOTS
       Invisible buttons placed over the printed cabinet graphics.
    ====================================================== */

    .arcade-shell {
      position: relative;
    }

    .cabinet-button-hotspot {
      position: absolute;
      z-index: 85;
      border: 0;
      padding: 0;
      margin: 0;
      background: transparent;
      border-radius: 999px;
      cursor: pointer;
      transform: translate(-50%, -50%);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .cabinet-button-hotspot span {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    /*
      These are percent positions relative to teddy-arcade-cabinet.png.
      If they need a tiny nudge later, only adjust left/top here.
    */
    .cabinet-select-hotspot {
      left: 45.7%;
      top: 82.2%;
      width: 8.2%;
      height: 5.6%;
    }

    .cabinet-start-hotspot {
      left: 56.2%;
      top: 82.2%;
      width: 8.2%;
      height: 5.6%;
    }

    .cabinet-button-hotspot:active {
      background: rgba(0,245,255,.16);
      box-shadow:
        0 0 18px rgba(0,245,255,.75),
        inset 0 0 14px rgba(255,42,163,.35);
    }

    body.arcade-show-cabinet-buttons .cabinet-button-hotspot,
    body.arcade-edit-buttons .cabinet-button-hotspot {
      background: rgba(0,245,255,.18);
      border: 2px solid rgba(0,245,255,.85);
      box-shadow: 0 0 18px rgba(0,245,255,.55);
    }

    body.arcade-show-cabinet-buttons .cabinet-button-hotspot span,
    body.arcade-edit-buttons .cabinet-button-hotspot span {
      position: static;
      width: auto;
      height: auto;
      clip: auto;
      display: grid;
      place-items: center;
      color: white;
      font-size: 11px;
      font-weight: 900;
      text-shadow: 0 2px 4px black;
    }

    @media (max-width: 760px) {
      /*
        Slightly bigger cabinet in phone fit mode.
      */
      .arcade-shell {
        width: min(124vw, 590px);
      }

      /*
        Smaller mobile arrows than v2.
      */
      .mobile-gamepad {
        width: min(258px, calc(100vw - 18px));
        padding: 7px;
        border-radius: 16px;
      }

      .mobile-gamepad-grid {
        grid-template-columns: 40px 40px 40px;
        grid-template-rows: 36px 36px 36px;
        gap: 5px;
      }

      .mobile-pad-btn {
        font-size: 18px;
        border-radius: 10px;
      }

      .mobile-pad-center {
        font-size: 8px;
        border-radius: 10px;
      }

      .mobile-gamepad-title {
        font-size: 9px;
        margin-bottom: 5px;
      }

      .mobile-gamepad-hint {
        font-size: 8.5px;
        margin-top: 5px;
      }
    }

  
    /* ======================================================
       FINAL MOBILE CLEANUP: no extra START/SELECT row, smaller arrows
    ====================================================== */

    .mobile-action-row,
    #mobileStartBtn,
    #mobileSelectBtn {
      display: none !important;
    }

    @media (max-width: 760px) {
      .arcade-shell {
        width: min(126vw, 600px);
      }

      .mobile-gamepad {
        width: min(236px, calc(100vw - 18px));
        padding: 6px;
      }

      .mobile-gamepad-grid {
        grid-template-columns: 36px 36px 36px;
        grid-template-rows: 33px 33px 33px;
        gap: 5px;
      }

      .mobile-pad-btn {
        font-size: 16px;
        border-radius: 9px;
      }

      .mobile-pad-center {
        font-size: 7.5px;
        line-height: 1.08;
      }
    }

  </style>

  <script>
    /*
      Hard override:
      Keeps the arcade page/game the same, but forces ENTER SITE to teddy.html
      even if script.js still has older hq.html routing inside it.
    */
    document.addEventListener("click", function (event) {
      const enterLink = event.target.closest(".arcade-btn.enter, #enterSite, #enterWebsite");
      if (!enterLink) return;

      event.preventDefault();
      event.stopPropagation();
      event.stopImmediatePropagation();

      window.location.href = "teddy.html";
    }, true);

    window.TEDDY_ENTER_SITE_URL = "teddy.html";
  </script>

  <script>
    /*
      iPhone canvas emoji fix:
      Some iPhones render canvas emojis as dark shadows when the game uses
      Arial + glow shadows. This patch keeps normal text alone, but when the
      game draws a mostly-emoji item, it forces Apple Color Emoji and softens
      the shadow so Teddy/emojis appear as real color emojis.
    */
    (function () {
      if (!window.CanvasRenderingContext2D) return;

      const proto = CanvasRenderingContext2D.prototype;
      if (proto.__teddyEmojiPatchApplied) return;
      proto.__teddyEmojiPatchApplied = true;

      const originalFillText = proto.fillText;
      const originalStrokeText = proto.strokeText;

      const isiPhoneLike =
        /iPhone|iPad|iPod/i.test(navigator.userAgent) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

      function hasEmoji(text) {
        return /[\u2600-\u27BF]|\uD83C[\uD000-\uDFFF]|\uD83D[\uDC00-\uDFFF]|\uD83E[\uDD00-\uDFFF]/.test(String(text));
      }

      function mostlyEmoji(text) {
        const value = String(text).trim();

        /*
          Single emoji collectibles/player/enemies are the ones that vanish.
          Do not hijack longer HUD text like "AVOID THE FUD ☠️".
        */
        return hasEmoji(value) && value.length <= 8;
      }

      function emojiFontFrom(currentFont) {
        const match = String(currentFont || "").match(/(\d+(?:\.\d+)?)px/i);
        const px = match ? match[1] : "32";

        return `${px}px "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", "Twemoji Mozilla", sans-serif`;
      }

      proto.fillText = function patchedFillText(text, x, y, maxWidth) {
        if (!mostlyEmoji(text)) {
          return originalFillText.apply(this, arguments);
        }

        const oldFont = this.font;
        const oldShadowBlur = this.shadowBlur;
        const oldShadowColor = this.shadowColor;
        const oldFillStyle = this.fillStyle;

        this.font = emojiFontFrom(oldFont);

        if (isiPhoneLike) {
          this.shadowBlur = 0;
          this.shadowColor = "transparent";
        } else {
          this.shadowBlur = Math.min(Number(oldShadowBlur) || 0, 6);
        }

        this.fillStyle = "#ffffff";

        let result;
        if (typeof maxWidth === "number") {
          result = originalFillText.call(this, text, x, y, maxWidth);
        } else {
          result = originalFillText.call(this, text, x, y);
        }

        this.font = oldFont;
        this.shadowBlur = oldShadowBlur;
        this.shadowColor = oldShadowColor;
        this.fillStyle = oldFillStyle;

        return result;
      };

      if (originalStrokeText) {
        proto.strokeText = function patchedStrokeText(text, x, y, maxWidth) {
          if (!mostlyEmoji(text)) {
            return originalStrokeText.apply(this, arguments);
          }

          const oldFont = this.font;
          const oldShadowBlur = this.shadowBlur;
          const oldShadowColor = this.shadowColor;

          this.font = emojiFontFrom(oldFont);

          if (isiPhoneLike) {
            this.shadowBlur = 0;
            this.shadowColor = "transparent";
          }

          let result;
          if (typeof maxWidth === "number") {
            result = originalStrokeText.call(this, text, x, y, maxWidth);
          } else {
            result = originalStrokeText.call(this, text, x, y);
          }

          this.font = oldFont;
          this.shadowBlur = oldShadowBlur;
          this.shadowColor = oldShadowColor;

          return result;
        };
      }
    })();
  </script>


  <script src="script.js"></script>

  <script>
    /*
      Mobile arcade helper v2:
      - START button reliably starts the game.
      - SELECT toggles Fit/Desktop mobile view.
      - Compact D-pad simulates the existing keyboard controls.
      - Canvas is refreshed/resized after START and after toggling view.
      - Touch-drag on the game screen no longer scrolls the page.
    */
    (function () {
      const body = document.body;
      const viewToggle = document.getElementById("arcadeViewToggle");
      const startBtn = document.getElementById("startGame");
      const canvas = document.getElementById("gameCanvas");
      const screen = document.querySelector(".arcade-screen");
      const mobileButtons = document.querySelectorAll("[data-arcade-key]");

      function isSmallScreen() {
        return window.matchMedia("(max-width: 760px)").matches;
      }

      function forceCanvasRefresh() {
        /*
          The existing script.js already owns the game logic.
          This simply nudges it to resize/redraw after mobile layout changes.
        */
        requestAnimationFrame(function () {
          window.dispatchEvent(new Event("resize"));
        });

        setTimeout(function () {
          window.dispatchEvent(new Event("resize"));
        }, 120);

        setTimeout(function () {
          window.dispatchEvent(new Event("resize"));
        }, 360);
      }

      function updateSelectLabels() {
        const desktop = body.classList.contains("arcade-desktop-mode");
        const label = desktop ? "FIT" : "SELECT";

        if (viewToggle) {
          viewToggle.textContent = desktop ? "FIT SCREEN" : "SELECT";
        }
}

      function setViewMode(mode) {
        if (mode === "desktop") {
          body.classList.add("arcade-desktop-mode");
          localStorage.setItem("teddyArcadeViewMode", "desktop");
        } else {
          body.classList.remove("arcade-desktop-mode");
          localStorage.setItem("teddyArcadeViewMode", "fit");
        }

        updateSelectLabels();
        forceCanvasRefresh();
      }

      function toggleViewMode() {
        const isDesktop = body.classList.contains("arcade-desktop-mode");
        setViewMode(isDesktop ? "fit" : "desktop");
      }

      function applyInitialViewMode() {
        const saved = localStorage.getItem("teddyArcadeViewMode");

        if (isSmallScreen()) {
          setViewMode(saved === "desktop" ? "desktop" : "fit");
        } else {
          body.classList.remove("arcade-desktop-mode");
          updateSelectLabels();
          forceCanvasRefresh();
        }
      }

      function startArcadeGame() {
        forceCanvasRefresh();

        /*
          Prefer the game's own public function if script.js exposes it.
          Otherwise, trigger the real START button normally.
        */
        if (typeof window.startGame === "function") {
          window.startGame();
        } else if (startBtn) {
          startBtn.click();
        }

        forceCanvasRefresh();
      }

      if (viewToggle) {
        viewToggle.addEventListener("click", function (event) {
          event.preventDefault();
          event.stopPropagation();
          toggleViewMode();
        });
      }
if (startBtn) {
        /*
          Capture-phase listener makes START reliable even if another script
          misses the first tap on mobile.
        */
        startBtn.addEventListener("click", function () {
          forceCanvasRefresh();
          setTimeout(forceCanvasRefresh, 200);
        }, true);
      }

      function fireKey(type, key) {
        const event = new KeyboardEvent(type, {
          key,
          code: key,
          bubbles: true,
          cancelable: true
        });

        window.dispatchEvent(event);
        document.dispatchEvent(event);
      }

      const activeKeys = new Set();

      function startKey(key, button) {
        if (!key) return;
        activeKeys.add(key);
        button.classList.add("active");
        fireKey("keydown", key);
      }

      function stopKey(key, button) {
        if (!key) return;
        activeKeys.delete(key);
        button.classList.remove("active");
        fireKey("keyup", key);
      }

      mobileButtons.forEach(function (button) {
        const key = button.dataset.arcadeKey;

        button.addEventListener("pointerdown", function (event) {
          event.preventDefault();
          try { button.setPointerCapture(event.pointerId); } catch {}
          startKey(key, button);
        });

        ["pointerup", "pointercancel", "pointerleave"].forEach(function (eventName) {
          button.addEventListener(eventName, function (event) {
            event.preventDefault();
            stopKey(key, button);
          });
        });

        button.addEventListener("contextmenu", function (event) {
          event.preventDefault();
        });
      });

      window.addEventListener("blur", function () {
        activeKeys.forEach(function (key) {
          fireKey("keyup", key);
        });

        activeKeys.clear();
        mobileButtons.forEach(function (button) {
          button.classList.remove("active");
        });
      });

      /*
        Prevent the phone from scrolling while dragging Teddy.
      */
      [canvas, screen].forEach(function (el) {
        if (!el) return;

        el.addEventListener("touchstart", function (event) {
          event.preventDefault();
        }, { passive: false });

        el.addEventListener("touchmove", function (event) {
          event.preventDefault();
        }, { passive: false });

        el.addEventListener("pointerdown", function () {
          forceCanvasRefresh();
        });
      });

      applyInitialViewMode();
      window.addEventListener("resize", updateSelectLabels);
      window.addEventListener("orientationchange", function () {
        setTimeout(forceCanvasRefresh, 260);
      });

      setTimeout(forceCanvasRefresh, 80);
      setTimeout(forceCanvasRefresh, 500);
    })();
  </script>



  <script>
    /*
      Second pass after script.js loads:
      If script.js rewrites the href back to hq.html, this changes it back.
    */
    (function () {
      const enterLink = document.querySelector(".arcade-btn.enter, #enterSite, #enterWebsite");
      if (!enterLink) return;

      enterLink.setAttribute("href", "teddy.html");
      enterLink.onclick = function (event) {
        event.preventDefault();
        event.stopPropagation();
        window.location.href = "teddy.html";
        return false;
      };
    })();
  </script>

  <script>
    /*
      Actual cabinet START / SELECT hotspots.
      START = start the game.
      SELECT = toggle Fit/Desktop view.
      Add ?showbuttons=1 to the URL if you ever want to see the invisible hit areas.
    */
    (function () {
      const body = document.body;
      const cabinetStartBtn = document.getElementById("cabinetStartBtn");
      const cabinetSelectBtn = document.getElementById("cabinetSelectBtn");
      const topStartBtn = document.getElementById("startGame");
      const topSelectBtn = document.getElementById("arcadeViewToggle");

      if (new URLSearchParams(window.location.search).has("showbuttons")) {
        body.classList.add("arcade-show-cabinet-buttons");
      }

      function forceCanvasRefresh() {
        requestAnimationFrame(function () {
          window.dispatchEvent(new Event("resize"));
        });
        setTimeout(function () {
          window.dispatchEvent(new Event("resize"));
        }, 120);
        setTimeout(function () {
          window.dispatchEvent(new Event("resize"));
        }, 360);
      }

      function startGameFromCabinet(event) {
        if (event) {
          event.preventDefault();
          event.stopPropagation();
        }

        forceCanvasRefresh();

        if (typeof window.startGame === "function") {
          window.startGame();
        } else if (topStartBtn) {
          topStartBtn.click();
        }

        forceCanvasRefresh();
      }

      function toggleViewFromCabinet(event) {
        if (event) {
          event.preventDefault();
          event.stopPropagation();
        }

        if (topSelectBtn) {
          topSelectBtn.click();
        } else {
          body.classList.toggle("arcade-desktop-mode");
        }

        forceCanvasRefresh();
      }

      if (cabinetStartBtn) {
        cabinetStartBtn.addEventListener("click", startGameFromCabinet);
        cabinetStartBtn.addEventListener("pointerdown", function (event) {
          event.preventDefault();
        });
      }

      if (cabinetSelectBtn) {
        cabinetSelectBtn.addEventListener("click", toggleViewFromCabinet);
        cabinetSelectBtn.addEventListener("pointerdown", function (event) {
          event.preventDefault();
        });
      }
    })();
  </script>

</body>
