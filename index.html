<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>$TEDDY | Insert Coin</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    :root {
      --pink: #ff2aa3;
      --blue: #00f5ff;
      --yellow: #ffea00;
      --bg: #030306;

      /* Original clean cabinet gameplay placement */
      --screen-left: 22.6%;
      --screen-top: 19.2%;
      --screen-width: 54.8%;
      --screen-height: 33.8%;

      /* Your copied cabinet START / SELECT zones */
      --start-left: 43.24%;
      --start-top: 84.91%;
      --start-width: 5.2%;
      --start-height: 5.6%;

      --select-left: 50.38%;
      --select-top: 85.01%;
      --select-width: 5.2%;
      --select-height: 5.6%;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 50% 0%, rgba(0,245,255,.16), transparent 34%),
        radial-gradient(circle at 20% 20%, rgba(255,42,163,.18), transparent 28%),
        var(--bg);
      color: white;
      overflow-x: hidden;
      overscroll-behavior: none;
      font-family: Arial, Helvetica, sans-serif;
    }

    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10000;
      opacity: .5;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.045) 0,
        rgba(255,255,255,.045) 1px,
        transparent 2px,
        transparent 5px
      );
      mix-blend-mode: overlay;
    }

    .arcade-page {
      min-height: 100svh;
      padding: 14px 14px 28px;
      overflow-x: hidden;
    }

    .arcade-top-panel {
      width: min(99vw, 1180px);
      margin: 0 auto 12px;
      padding: 12px 16px;
      border: 2px solid rgba(0,245,255,.5);
      border-radius: 18px;
      background:
        linear-gradient(90deg, rgba(255,42,163,.18), rgba(0,245,255,.14)),
        rgba(0,0,0,.72);
      box-shadow:
        0 0 18px rgba(0,245,255,.35),
        0 0 24px rgba(255,42,163,.22);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .arcade-instructions {
      flex: 1 1 420px;
      font-size: clamp(11px, 1vw, 14px);
      line-height: 1.45;
      color: #dffcff;
      text-shadow: 0 0 8px rgba(0,0,0,.9);
    }

    .arcade-instructions strong { color: var(--yellow); }

    .arcade-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .arcade-btn,
    .footer-links a {
      border: 0;
      border-radius: 999px;
      padding: 13px 20px;
      color: white;
      font-weight: 900;
      letter-spacing: 1px;
      cursor: pointer;
      background: var(--pink);
      box-shadow:
        0 0 14px rgba(255,42,163,.88),
        inset 0 -3px 0 rgba(0,0,0,.25);
      font-size: clamp(12px, 1.1vw, 16px);
      text-transform: uppercase;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .arcade-btn:hover,
    .footer-links a:hover {
      transform: translateY(-2px);
      background: #00aaff;
      box-shadow: 0 0 18px rgba(0,245,255,.95);
    }

    .arcade-btn.enter {
      background: #00aaff;
      box-shadow:
        0 0 14px rgba(0,245,255,.92),
        inset 0 -3px 0 rgba(0,0,0,.25);
    }

    .arcade-btn.enter:hover {
      background: var(--pink);
      box-shadow: 0 0 18px rgba(255,42,163,.95);
    }

    .arcade-shell {
      position: relative;
      width: min(99vw, 1180px);
      margin: 0 auto;
    }

    .arcade-cabinet-img {
      width: 100%;
      height: auto;
      display: block;
      filter:
        drop-shadow(0 0 24px rgba(255,42,163,.75))
        drop-shadow(0 0 42px rgba(0,245,255,.45));
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .arcade-screen {
      position: absolute;
      left: var(--screen-left);
      top: var(--screen-top);
      width: var(--screen-width);
      height: var(--screen-height);
      border-radius: 12px;
      overflow: hidden;
      background: #050510;
      box-shadow:
        inset 0 0 22px rgba(0,245,255,.5),
        0 0 18px rgba(0,245,255,.55);
      touch-action: none;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #050510;
      cursor: crosshair;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .cabinet-hotspot {
      position: absolute;
      z-index: 90;
      border: 0;
      background: transparent;
      border-radius: 999px;
      transform: translate(-50%, -50%);
      padding: 0;
      margin: 0;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .cabinet-hotspot span {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    #cabinetStart {
      left: var(--start-left);
      top: var(--start-top);
      width: var(--start-width);
      height: var(--start-height);
    }

    #cabinetSelect {
      left: var(--select-left);
      top: var(--select-top);
      width: var(--select-width);
      height: var(--select-height);
    }

    body.show-layout .arcade-screen {
      outline: 3px solid rgba(255,234,0,.95);
      outline-offset: 2px;
    }

    body.show-layout .cabinet-hotspot {
      background: rgba(0,245,255,.24);
      border: 2px solid rgba(0,245,255,.95);
      box-shadow: 0 0 18px rgba(0,245,255,.8);
    }

    body.show-layout .cabinet-hotspot span {
      position: static;
      width: auto;
      height: auto;
      clip: auto;
      display: grid;
      place-items: center;
      color: white;
      font-weight: 900;
      font-size: 10px;
      text-shadow: 0 2px 4px black;
    }

    .mobile-gamepad {
      display: none;
      width: min(214px, calc(100vw - 16px));
      margin: 8px auto 0;
      padding: 5px;
      border: 2px solid rgba(0,245,255,.5);
      border-radius: 14px;
      background:
        linear-gradient(180deg, rgba(255,42,163,.12), rgba(0,245,255,.08)),
        rgba(0,0,0,.78);
      box-shadow:
        0 0 12px rgba(0,245,255,.22),
        0 0 14px rgba(255,42,163,.18);
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .mobile-grid {
      display: grid;
      grid-template-columns: 34px 34px 34px;
      grid-template-rows: 31px 31px 31px;
      gap: 4px;
      justify-content: center;
      grid-template-areas:
        ". up ."
        "left center right"
        ". down .";
    }

    .mobile-pad {
      border: 0;
      border-radius: 9px;
      background: var(--pink);
      color: white;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      box-shadow:
        0 0 8px rgba(255,42,163,.62),
        inset 0 -2px 0 rgba(0,0,0,.26);
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    .mobile-pad:active,
    .mobile-pad.active {
      transform: translateY(2px);
      background: #00aaff;
      box-shadow:
        0 0 14px rgba(0,245,255,.9),
        inset 0 -1px 0 rgba(0,0,0,.24);
    }

    .pad-up { grid-area: up; }
    .pad-left { grid-area: left; }
    .pad-right { grid-area: right; }
    .pad-down { grid-area: down; }

    .pad-center {
      grid-area: center;
      display: grid;
      place-items: center;
      color: #dffcff;
      font-size: 7px;
      text-align: center;
      line-height: 1.05;
      padding: 2px;
      border-radius: 9px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.52);
    }

    .footer-links {
      width: min(99vw, 1180px);
      margin: 14px auto 0;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 9px;
    }

    .footer-links a {
      padding: 10px 14px;
      font-size: 11px;
      background: rgba(0,170,255,.92);
    }

    @media (max-width: 760px) {
      body { overflow-x: hidden; }

      .arcade-page {
        padding: 6px 4px 74px;
        overflow-x: hidden;
      }

      .arcade-top-panel {
        width: min(100%, 500px);
        max-width: 100%;
        margin: 0 auto 4px;
        padding: 7px 8px;
        border-radius: 14px;
        gap: 7px;
      }

      .arcade-instructions {
        flex-basis: 100%;
        font-size: 9.5px;
        line-height: 1.22;
        text-align: center;
      }

      .arcade-controls {
        width: 100%;
        justify-content: center;
        gap: 7px;
      }

      .arcade-btn {
        padding: 9px 11px;
        font-size: 10.5px;
      }

      /*
        Phone fit mode: modestly larger than viewport, not aggressive.
        This keeps screen placement locked to the cabinet art.
      */
      .arcade-shell {
        width: min(122vw, 590px);
        max-width: none;
        margin-left: 50%;
        transform: translateX(-50%);
      }

      .arcade-screen {
        border-radius: 8px;
      }

      .mobile-gamepad {
        display: block;
        position: fixed;
        left: 50%;
        bottom: max(6px, env(safe-area-inset-bottom));
        transform: translateX(-50%);
        z-index: 5000;
      }

      .footer-links {
        margin-top: 10px;
        padding-bottom: 12px;
        gap: 7px;
      }

      .footer-links a {
        padding: 8px 10px;
        font-size: 9px;
      }

      body.arcade-desktop-mode {
        overflow-x: auto;
      }

      body.arcade-desktop-mode .arcade-page {
        overflow-x: auto;
      }

      body.arcade-desktop-mode .arcade-top-panel,
      body.arcade-desktop-mode .arcade-shell,
      body.arcade-desktop-mode .footer-links {
        width: 1180px;
        max-width: none;
        margin-left: 0;
        margin-right: 0;
        transform: none;
      }

      body.arcade-desktop-mode .footer-links {
        justify-content: flex-start;
      }
    }
  
    /* ======================================================
       MOBILE DESKTOP-MODE ESCAPE + DEEP FALLBACK LINKS V11
    ====================================================== */

    .mobile-fit-return {
      display: none;
      position: fixed;
      right: max(10px, env(safe-area-inset-right));
      bottom: max(10px, env(safe-area-inset-bottom));
      z-index: 6500;
      border: 0;
      border-radius: 999px;
      padding: 10px 13px;
      background: #00aaff;
      color: white;
      font-weight: 900;
      font-size: 11px;
      letter-spacing: .08em;
      box-shadow:
        0 0 16px rgba(0,245,255,.86),
        inset 0 -3px 0 rgba(0,0,0,.25);
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .mobile-fit-return:active {
      transform: translateY(2px);
      background: #ff2aa3;
      box-shadow:
        0 0 18px rgba(255,42,163,.9),
        inset 0 -1px 0 rgba(0,0,0,.25);
    }

    /*
      Fallback links stay available, but they are intentionally pushed
      far below the arcade so ENTER SITE is the obvious path.
    */
    .footer-links {
      margin-top: 95vh !important;
      opacity: .45;
      transform: scale(.94);
      transform-origin: center top;
    }

    .footer-links:hover,
    .footer-links:focus-within {
      opacity: .92;
    }

    @media (max-width: 760px) {
      body.arcade-desktop-mode .mobile-fit-return {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      /*
        In desktop/wide mode, keep the little escape button visible and
        move the arrow pad slightly left so the two controls do not overlap.
      */
      body.arcade-desktop-mode .mobile-gamepad {
        left: 42%;
      }

      body.arcade-desktop-mode .arcade-page {
        padding-bottom: 90px;
      }

      .footer-links {
        margin-top: 125vh !important;
        padding-bottom: 140px !important;
        opacity: .34;
      }
    }

  </style>
</head>

<body>
  <div class="scanlines"></div>

  <main class="arcade-page">
    <div class="arcade-top-panel">
      <div class="arcade-instructions">
        <strong>HOW TO PLAY:</strong>
        Move Teddy with arrows, WASD, phone pad, or drag/touch.
        Collect RK’s emoji timeline. Avoid the flashing <strong>SHORT</strong> skulls.
      </div>

      <div class="arcade-controls">
        <button id="startGame" class="arcade-btn" type="button">START</button>
        <a id="enterSite" class="arcade-btn enter" href="teddy.html">ENTER SITE</a>
      </div>
    </div>

    <div class="arcade-shell">
      <img
        src="teddy-arcade-cabinet.png"
        alt="$TEDDY Arcade Cabinet"
        class="arcade-cabinet-img"
      />

      <div class="arcade-screen">
        <canvas id="gameCanvas"></canvas>
      </div>

      <button id="cabinetStart" class="cabinet-hotspot" type="button" aria-label="Start arcade game">
        <span>START</span>
      </button>

      <button id="cabinetSelect" class="cabinet-hotspot" type="button" aria-label="Toggle mobile and desktop view">
        <span>SELECT</span>
      </button>
    </div>

    <div class="mobile-gamepad" aria-label="Mobile Teddy controls">
      <div class="mobile-grid">
        <button class="mobile-pad pad-up" type="button" data-key="ArrowUp">▲</button>
        <button class="mobile-pad pad-left" type="button" data-key="ArrowLeft">◀</button>
        <div class="pad-center">HOLD<br>TO<br>MOVE</div>
        <button class="mobile-pad pad-right" type="button" data-key="ArrowRight">▶</button>
        <button class="mobile-pad pad-down" type="button" data-key="ArrowDown">▼</button>
      </div>
    </div>


    <button id="mobileFitReturn" class="mobile-fit-return" type="button" aria-label="Return to mobile fit screen">
      FIT SCREEN
    </button>

    <nav class="footer-links" aria-label="Site links">
      <a href="teddy.html">Rainy Teddy</a>
      <a href="hq.html">Rabbit Hole</a>
      <a href="kitty.html">Kitty Files</a>
      <a href="emoji.html">Emoji Timeline</a>
      <a href="gmebay.html">GMEBAY</a>
    </nav>
  </main>

  <script>
    /* ======================================================
       SELF-CONTAINED $TEDDY ARCADE
       This page does NOT depend on script.js.
    ====================================================== */

    (function () {
      const params = new URLSearchParams(window.location.search);
      if (params.has("showlayout")) document.body.classList.add("show-layout");

      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const startBtn = document.getElementById("startGame");
      const enterSite = document.getElementById("enterSite");
      const cabinetStart = document.getElementById("cabinetStart");
      const cabinetSelect = document.getElementById("cabinetSelect");
      const mobileFitReturn = document.getElementById("mobileFitReturn");
      const mobilePads = document.querySelectorAll("[data-key]");

      const isiPhoneLike =
        /iPhone|iPad|iPod/i.test(navigator.userAgent) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

      const ENTER_URL = "teddy.html";

      let animationFrame = null;
      let running = false;
      let won = false;
      let lost = false;
      let frame = 0;
      let keys = {};
      let pointerActive = false;
      let score = 0;
      let lives = 3;
      let nextEmojiIndex = 0;
      let collectibles = [];
      let enemies = [];
      let particles = [];

      const player = {
        x: 130,
        y: 250,
        targetX: 130,
        targetY: 250,
        size: 42,
        speed: 5.2,
        invincible: 0
      };

      const emojiTimeline = [
        "😳", "💩", "😿", "🥜", "🐸",
        "🍦", "🤢", "👍", "👊", "💀",
        "🤓", "👀", "🤩", "⚡", "🎮",
        "🚀", "🍄", "💥", "🍏", "🤔",
        "🥴", "💜", "👥", "👌", "🤝",
        "⛺", "😿", "🎯", "👀", "🐶",
        "🇺🇸🎤🎶", "👀", "🔥", "💥", "🍻"
      ];

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function gameWidth() {
        return Math.max(320, canvas.clientWidth || 640);
      }

      function gameHeight() {
        return Math.max(180, canvas.clientHeight || 360);
      }

      function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const cssW = Math.max(320, Math.floor(rect.width || 900));
        const cssH = Math.max(180, Math.floor(rect.height || cssW * 0.5625));

        canvas.width = Math.floor(cssW * dpr);
        canvas.height = Math.floor(cssH * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        player.x = clamp(player.x, 35, cssW - 35);
        player.y = clamp(player.y, 54, cssH - 35);
        player.targetX = clamp(player.targetX, 35, cssW - 35);
        player.targetY = clamp(player.targetY, 54, cssH - 35);

        if (!running && !won && !lost) drawStartScreen();
      }

      function emojiFont(size, weight = "") {
        const prefix = weight ? weight + " " : "";
        return prefix + size + 'px "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", Arial, sans-serif';
      }

      function drawEmoji(text, x, y, size, shadow = "#00f5ff") {
        ctx.save();
        ctx.font = emojiFont(size);
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#fff";
        ctx.shadowColor = isiPhoneLike ? "transparent" : shadow;
        ctx.shadowBlur = isiPhoneLike ? 0 : 14;
        ctx.fillText(text, x, y);
        ctx.restore();
      }

      function makeCollectible(emoji, index) {
        const w = gameWidth();
        const h = gameHeight();
        return {
          emoji,
          x: 80 + Math.random() * Math.max(40, w - 160),
          y: 70 + Math.random() * Math.max(40, h - 120),
          size: emoji.length > 3 ? 26 : 32,
          pulse: index * 0.4,
          collected: false
        };
      }

      function makeEnemy() {
        const w = gameWidth();
        const h = gameHeight();
        const speed = 1.2 + Math.random() * 1.8;
        return {
          x: 60 + Math.random() * Math.max(40, w - 120),
          y: 70 + Math.random() * Math.max(40, h - 120),
          vx: (Math.random() > 0.5 ? 1 : -1) * speed,
          vy: (Math.random() > 0.5 ? 1 : -1) * speed,
          size: 34,
          wobble: Math.random() * Math.PI * 2
        };
      }

      function resetGame(event) {
        if (event) {
          event.preventDefault();
          event.stopPropagation();
        }

        resizeCanvas();

        running = true;
        won = false;
        lost = false;
        frame = 0;
        score = 0;
        lives = 3;
        nextEmojiIndex = 0;
        collectibles = emojiTimeline.map((emoji, index) => makeCollectible(emoji, index));
        enemies = Array.from({ length: 5 }, makeEnemy);
        particles = [];

        player.x = gameWidth() * 0.15;
        player.y = gameHeight() * 0.5;
        player.targetX = player.x;
        player.targetY = player.y;
        player.invincible = 0;

        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(loop);
      }

      function spawnParticles(x, y, color, amount = 16) {
        for (let i = 0; i < amount; i++) {
          particles.push({
            x,
            y,
            vx: -2.5 + Math.random() * 5,
            vy: -2.5 + Math.random() * 5,
            life: 22 + Math.random() * 22,
            color,
            size: 1.5 + Math.random() * 3
          });
        }
      }

      function distance(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      function updatePlayer() {
        const w = gameWidth();
        const h = gameHeight();

        if (keys.ArrowLeft || keys.a || keys.A) player.targetX -= player.speed;
        if (keys.ArrowRight || keys.d || keys.D) player.targetX += player.speed;
        if (keys.ArrowUp || keys.w || keys.W) player.targetY -= player.speed;
        if (keys.ArrowDown || keys.s || keys.S) player.targetY += player.speed;

        player.targetX = clamp(player.targetX, 35, w - 35);
        player.targetY = clamp(player.targetY, 54, h - 35);

        player.x += (player.targetX - player.x) * (pointerActive ? 0.22 : 0.16);
        player.y += (player.targetY - player.y) * (pointerActive ? 0.22 : 0.16);

        if (player.invincible > 0) player.invincible--;
      }

      function updateEnemies() {
        const w = gameWidth();
        const h = gameHeight();

        enemies.forEach((enemy) => {
          enemy.x += enemy.vx;
          enemy.y += enemy.vy;
          enemy.wobble += 0.05;

          if (enemy.x < 34 || enemy.x > w - 34) enemy.vx *= -1;
          if (enemy.y < 58 || enemy.y > h - 34) enemy.vy *= -1;

          if (player.invincible <= 0 && distance(player, enemy) < (player.size + enemy.size) * 0.46) {
            lives--;
            player.invincible = 115;
            spawnParticles(player.x, player.y, "#ff2aa3", 22);

            if (lives <= 0) endGame(false);
          }
        });
      }

      function updateParticles() {
        particles.forEach((p) => {
          p.x += p.vx;
          p.y += p.vy;
          p.vx *= 0.96;
          p.vy *= 0.96;
          p.life -= 1;
        });

        particles = particles.filter((p) => p.life > 0);
      }

      function checkCollectibles() {
        collectibles.forEach((item) => {
          if (item.collected) return;

          const itemPoint = { x: item.x, y: item.y };

          if (distance(player, itemPoint) < (player.size + item.size) * 0.44) {
            item.collected = true;
            score++;
            spawnParticles(item.x, item.y, "#00f5ff", 18);
          }
        });

        if (score >= emojiTimeline.length) {
          endGame(true);
        }
      }

      function drawBackground() {
        const w = gameWidth();
        const h = gameHeight();

        ctx.clearRect(0, 0, w, h);

        const grad = ctx.createLinearGradient(0, 0, 0, h);
        grad.addColorStop(0, "#090024");
        grad.addColorStop(0.52, "#150031");
        grad.addColorStop(1, "#02020a");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);

        ctx.save();
        ctx.strokeStyle = "rgba(0,255,255,0.18)";
        ctx.lineWidth = 1;

        for (let y = 40; y < h; y += 34) {
          ctx.beginPath();
          ctx.moveTo(0, y + Math.sin((frame + y) * 0.04) * 2);
          ctx.lineTo(w, y + Math.sin((frame + y) * 0.04) * 2);
          ctx.stroke();
        }

        for (let x = 0; x < w; x += 42) {
          ctx.beginPath();
          ctx.moveTo(x + Math.sin((frame + x) * 0.03) * 2, 0);
          ctx.lineTo(x + Math.sin((frame + x) * 0.03) * 2, h);
          ctx.stroke();
        }

        ctx.restore();
      }

      function drawPlayer() {
        if (player.invincible > 0 && Math.floor(frame / 5) % 2 === 0) return;
        drawEmoji("🧸", player.x, player.y, player.size, "#ff2aa3");
      }

      function drawCollectibles() {
        collectibles.forEach((item) => {
          if (item.collected) return;

          item.pulse += 0.08;
          const bob = Math.sin(item.pulse) * 3;
          drawEmoji(item.emoji, item.x, item.y + bob, item.size, "#00f5ff");
        });
      }

      function drawEnemies() {
        enemies.forEach((enemy) => {
          const wobble = Math.sin(enemy.wobble) * 3;
          drawEmoji("☠️", enemy.x, enemy.y + wobble, enemy.size, "#ff2aa3");

          if (Math.floor(frame / 14) % 2 === 0) {
            ctx.save();
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.font = "900 11px Arial, sans-serif";
            ctx.fillStyle = "#ffea00";
            ctx.shadowColor = "#ffea00";
            ctx.shadowBlur = 8;
            ctx.fillText("SHORT", enemy.x, enemy.y + enemy.size * 0.78 + wobble);
            ctx.restore();
          }
        });
      }

      function drawParticles() {
        particles.forEach((p) => {
          ctx.save();
          ctx.globalAlpha = Math.max(0, p.life / 44);
          ctx.fillStyle = p.color;
          ctx.shadowColor = p.color;
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        });
      }

      function drawText() {
        const w = gameWidth();
        const h = gameHeight();

        ctx.save();
        ctx.font = "900 15px Arial, sans-serif";
        ctx.textBaseline = "top";
        ctx.textAlign = "left";
        ctx.fillStyle = "#00f5ff";
        ctx.shadowColor = "#00f5ff";
        ctx.shadowBlur = 10;
        ctx.fillText(`EMOJIS ${score}/${emojiTimeline.length}`, 16, 14);

        ctx.textAlign = "right";
        ctx.fillStyle = "#ffea00";
        ctx.shadowColor = "#ffea00";
        ctx.fillText(`LIVES ${"♥".repeat(lives)}`, w - 16, 14);

        ctx.font = "900 12px Arial, sans-serif";
        ctx.fillStyle = "rgba(255,255,255,.82)";
        ctx.shadowBlur = 0;
        ctx.textAlign = "center";
        ctx.fillText("COLLECT THE TIMELINE. AVOID THE SHORTS.", w / 2, h - 22);
        ctx.restore();
      }

      function drawStartScreen() {
        const w = gameWidth();
        const h = gameHeight();

        drawBackground();

        ctx.save();
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = "900 30px Arial, sans-serif";
        ctx.fillStyle = "#00f5ff";
        ctx.shadowColor = "#00f5ff";
        ctx.shadowBlur = 18;
        ctx.fillText("INSERT COIN", w / 2, h / 2 - 46);

        drawEmoji("🧸", w / 2, h / 2 + 1, 46, "#ff2aa3");

        ctx.font = "700 15px Arial, sans-serif";
        ctx.fillStyle = "#fff";
        ctx.shadowBlur = 0;
        ctx.fillText("Collect emojis. Avoid the SHORT skulls.", w / 2, h / 2 + 52);

        ctx.fillStyle = "#ffea00";
        ctx.font = "900 15px Arial, sans-serif";
        ctx.fillText("PRESS START", w / 2, h / 2 + 80);
        ctx.restore();
      }

      function drawEndScreen(success) {
        const w = gameWidth();
        const h = gameHeight();

        drawBackground();

        ctx.save();
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";

        ctx.font = "900 28px Arial, sans-serif";
        ctx.fillStyle = success ? "#00f5ff" : "#ff2aa3";
        ctx.shadowColor = success ? "#00f5ff" : "#ff2aa3";
        ctx.shadowBlur = 18;
        ctx.fillText(success ? "TIMELINE COMPLETE" : "GAME OVER", w / 2, h / 2 - 36);

        drawEmoji(success ? "🧸🚀" : "☠️", w / 2, h / 2 + 5, 45, success ? "#00f5ff" : "#ff2aa3");

        ctx.font = "800 15px Arial, sans-serif";
        ctx.fillStyle = "#ffea00";
        ctx.shadowColor = "#ffea00";
        ctx.shadowBlur = 10;
        ctx.fillText(success ? "ENTER SITE unlocked." : "Press START to try again.", w / 2, h / 2 + 54);

        ctx.restore();
      }

      function endGame(success) {
        running = false;
        won = success;
        lost = !success;

        if (animationFrame) {
          cancelAnimationFrame(animationFrame);
          animationFrame = null;
        }

        drawEndScreen(success);
      }

      function loop() {
        if (!running) return;

        frame++;

        drawBackground();
        updatePlayer();
        updateEnemies();
        updateParticles();
        checkCollectibles();

        drawCollectibles();
        drawEnemies();
        drawParticles();
        drawPlayer();
        drawText();

        animationFrame = requestAnimationFrame(loop);
      }

      function pointerToCanvas(event) {
        const rect = canvas.getBoundingClientRect();
        const w = gameWidth();
        const h = gameHeight();

        player.targetX = clamp(((event.clientX - rect.left) / rect.width) * w, 35, w - 35);
        player.targetY = clamp(((event.clientY - rect.top) / rect.height) * h, 54, h - 35);
        pointerActive = true;
      }

      function fireKey(type, key) {
        const event = new KeyboardEvent(type, {
          key,
          code: key,
          bubbles: true,
          cancelable: true
        });
        window.dispatchEvent(event);
        document.dispatchEvent(event);
      }

      function setFitMode(event) {
        if (event) {
          event.preventDefault();
          event.stopPropagation();
        }

        document.body.classList.remove("arcade-desktop-mode");

        /*
          Return to the top-left/normal phone position so the user is not
          stranded inside the wide desktop cabinet view.
        */
        requestAnimationFrame(() => {
          window.scrollTo({ left: 0, top: 0, behavior: "smooth" });
        });

        setTimeout(resizeCanvas, 80);
        setTimeout(resizeCanvas, 260);
      }

      function toggleView(event) {
        if (event) {
          event.preventDefault();
          event.stopPropagation();
        }

        const goingDesktop = !document.body.classList.contains("arcade-desktop-mode");
        document.body.classList.toggle("arcade-desktop-mode");

        /*
          If SELECT opens desktop/wide mode on a phone, keep the page at the
          top and give the user a fixed FIT SCREEN button to escape back.
        */
        requestAnimationFrame(() => {
          window.scrollTo({ left: 0, top: 0, behavior: "smooth" });
        });

        setTimeout(resizeCanvas, 80);
        setTimeout(resizeCanvas, 260);
      }

      startBtn.addEventListener("click", resetGame);
      cabinetStart.addEventListener("click", resetGame);

      cabinetSelect.addEventListener("click", toggleView);
      if (mobileFitReturn) mobileFitReturn.addEventListener("click", setFitMode);

      enterSite.addEventListener("click", function (event) {
        event.preventDefault();
        window.location.href = ENTER_URL;
      });

      window.addEventListener("keydown", function (event) {
        keys[event.key] = true;
        if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", " "].includes(event.key)) {
          event.preventDefault();
        }

        if (event.key === "Enter" && (won || lost)) {
          if (won) window.location.href = ENTER_URL;
          else resetGame();
        }
      });

      window.addEventListener("keyup", function (event) {
        keys[event.key] = false;
      });

      canvas.addEventListener("pointerdown", function (event) {
        if (!running) {
          if (lost) resetGame();
          return;
        }

        event.preventDefault();
        pointerToCanvas(event);
        try { canvas.setPointerCapture(event.pointerId); } catch {}
      });

      canvas.addEventListener("pointermove", function (event) {
        if (!running) return;
        if (!pointerActive && event.pointerType === "mouse") return;
        event.preventDefault();
        pointerToCanvas(event);
      });

      canvas.addEventListener("pointerup", function (event) {
        pointerActive = false;
        try { canvas.releasePointerCapture(event.pointerId); } catch {}
      });

      canvas.addEventListener("pointercancel", function () {
        pointerActive = false;
      });

      canvas.addEventListener("touchstart", function (event) {
        event.preventDefault();
      }, { passive: false });

      canvas.addEventListener("touchmove", function (event) {
        event.preventDefault();
      }, { passive: false });

      mobilePads.forEach((button) => {
        const key = button.dataset.key;

        button.addEventListener("pointerdown", function (event) {
          event.preventDefault();
          try { button.setPointerCapture(event.pointerId); } catch {}
          button.classList.add("active");
          fireKey("keydown", key);
        });

        ["pointerup", "pointercancel", "pointerleave"].forEach((name) => {
          button.addEventListener(name, function (event) {
            event.preventDefault();
            button.classList.remove("active");
            fireKey("keyup", key);
          });
        });
      });

      window.addEventListener("resize", resizeCanvas);
      window.addEventListener("orientationchange", function () {
        setTimeout(resizeCanvas, 260);
      });

      resizeCanvas();
      drawStartScreen();

      setTimeout(resizeCanvas, 100);
      setTimeout(resizeCanvas, 500);
    })();
  </script>
</body>
</html>
