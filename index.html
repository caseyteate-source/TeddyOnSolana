<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>$TEDDY | Insert Coin</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    :root {
      --neon-pink: #ff2aa3;
      --neon-blue: #00f5ff;
      --neon-yellow: #ffea00;
      --deep-bg: #030306;

      /* Gameplay screen placement inside teddy-arcade-cabinet.png */
      --screen-left: 22.6%;
      --screen-top: 19.2%;
      --screen-width: 54.8%;
      --screen-height: 33.8%;
      --screen-radius: 12px;

      /* Final cabinet button positions copied from edit mode */
      --start-left: 43.24%;
      --start-top: 84.91%;
      --start-width: 5.2%;
      --start-height: 5.6%;

      --select-left: 50.38%;
      --select-top: 85.01%;
      --select-width: 5.2%;
      --select-height: 5.6%;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 50% 0%, rgba(0,245,255,.16), transparent 34%),
        radial-gradient(circle at 20% 20%, rgba(255,42,163,.18), transparent 28%),
        var(--deep-bg);
      color: white;
      overflow-x: hidden;
      overscroll-behavior: none;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
    }

    .scanlines {
      pointer-events: none;
    }

    .arcade-page {
      min-height: 100svh;
      padding: 14px 14px 28px;
    }

    .arcade-top-panel {
      width: min(99vw, 1180px);
      margin: 0 auto 12px;
      padding: 12px 16px;
      border: 2px solid rgba(0,245,255,.5);
      border-radius: 18px;
      background:
        linear-gradient(90deg, rgba(255,42,163,.18), rgba(0,245,255,.14)),
        rgba(0,0,0,.72);
      box-shadow:
        0 0 18px rgba(0,245,255,.35),
        0 0 24px rgba(255,42,163,.22);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .arcade-instructions {
      flex: 1 1 420px;
      font-size: clamp(11px, 1vw, 14px);
      line-height: 1.45;
      color: #dffcff;
      text-shadow: 0 0 8px rgba(0,0,0,.9);
    }

    .arcade-instructions strong {
      color: var(--neon-yellow);
    }

    .arcade-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .arcade-btn {
      border: 0;
      border-radius: 999px;
      padding: 13px 22px;
      color: white;
      font-weight: 900;
      letter-spacing: 1px;
      cursor: pointer;
      background: var(--neon-pink);
      box-shadow:
        0 0 14px rgba(255,42,163,.95),
        inset 0 -3px 0 rgba(0,0,0,.25);
      font-size: clamp(12px, 1.1vw, 16px);
      text-transform: uppercase;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .arcade-btn:hover {
      transform: translateY(-2px);
      background: #00aaff;
      box-shadow: 0 0 18px rgba(0,245,255,.95);
    }

    .arcade-btn.enter {
      background: #00aaff;
      box-shadow:
        0 0 14px rgba(0,245,255,.95),
        inset 0 -3px 0 rgba(0,0,0,.25);
    }

    .arcade-btn.enter:hover {
      background: var(--neon-pink);
      box-shadow: 0 0 18px rgba(255,42,163,.95);
    }

    .arcade-shell {
      position: relative;
      width: min(99vw, 1180px);
      margin: 0 auto;
      max-width: 1180px;
    }

    .arcade-cabinet-img {
      width: 100%;
      height: auto;
      display: block;
      filter:
        drop-shadow(0 0 24px rgba(255,42,163,.75))
        drop-shadow(0 0 42px rgba(0,245,255,.45));
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .arcade-screen {
      position: absolute;
      left: var(--screen-left);
      top: var(--screen-top);
      width: var(--screen-width);
      height: var(--screen-height);
      border-radius: var(--screen-radius);
      overflow: hidden;
      background: #050510;
      box-shadow:
        inset 0 0 22px rgba(0,245,255,.5),
        0 0 18px rgba(0,245,255,.55);
      touch-action: none;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #050510;
      cursor: crosshair;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .cabinet-button-hotspot {
      position: absolute;
      z-index: 90;
      border: 0;
      padding: 0;
      margin: 0;
      background: transparent;
      border-radius: 999px;
      cursor: pointer;
      transform: translate(-50%, -50%);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .cabinet-button-hotspot span {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    #cabinetStartBtn {
      left: var(--start-left);
      top: var(--start-top);
      width: var(--start-width);
      height: var(--start-height);
    }

    #cabinetSelectBtn {
      left: var(--select-left);
      top: var(--select-top);
      width: var(--select-width);
      height: var(--select-height);
    }

    body.show-layout .arcade-screen,
    body.edit-screen .arcade-screen {
      outline: 3px solid rgba(255,234,0,.95);
      outline-offset: 2px;
      box-shadow:
        inset 0 0 18px rgba(255,234,0,.6),
        0 0 24px rgba(255,234,0,.8);
    }

    body.show-layout .cabinet-button-hotspot,
    body.edit-screen .cabinet-button-hotspot {
      background: rgba(0,245,255,.22);
      border: 2px solid rgba(0,245,255,.92);
      box-shadow:
        0 0 20px rgba(0,245,255,.75),
        inset 0 0 14px rgba(255,42,163,.35);
    }

    body.show-layout .cabinet-button-hotspot span,
    body.edit-screen .cabinet-button-hotspot span {
      position: static;
      width: auto;
      height: auto;
      clip: auto;
      display: grid;
      place-items: center;
      color: white;
      font-size: 10px;
      font-weight: 900;
      text-shadow: 0 2px 4px black;
      pointer-events: none;
    }

    .mobile-gamepad {
      display: none;
      width: min(214px, calc(100vw - 16px));
      margin: 8px auto 0;
      padding: 5px;
      border: 2px solid rgba(0,245,255,.5);
      border-radius: 14px;
      background:
        linear-gradient(180deg, rgba(255,42,163,.12), rgba(0,245,255,.08)),
        rgba(0,0,0,.78);
      box-shadow:
        0 0 12px rgba(0,245,255,.22),
        0 0 14px rgba(255,42,163,.18);
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .mobile-gamepad-grid {
      display: grid;
      grid-template-columns: 34px 34px 34px;
      grid-template-rows: 31px 31px 31px;
      gap: 4px;
      justify-content: center;
      grid-template-areas:
        ". up ."
        "left center right"
        ". down .";
    }

    .mobile-pad-btn {
      border: 0;
      border-radius: 9px;
      background: var(--neon-pink);
      color: white;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      box-shadow:
        0 0 8px rgba(255,42,163,.62),
        inset 0 -2px 0 rgba(0,0,0,.26);
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    .mobile-pad-btn:active,
    .mobile-pad-btn.active {
      transform: translateY(2px);
      background: #00aaff;
      box-shadow:
        0 0 14px rgba(0,245,255,.9),
        inset 0 -1px 0 rgba(0,0,0,.24);
    }

    .mobile-pad-up { grid-area: up; }
    .mobile-pad-left { grid-area: left; }
    .mobile-pad-right { grid-area: right; }
    .mobile-pad-down { grid-area: down; }

    .mobile-pad-center {
      grid-area: center;
      display: grid;
      place-items: center;
      color: #dffcff;
      font-size: 7px;
      text-align: center;
      line-height: 1.05;
      padding: 2px;
      border-radius: 9px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(0,0,0,.52);
    }

    .editor-panel {
      position: fixed;
      left: 10px;
      right: 10px;
      bottom: 10px;
      z-index: 9000;
      max-width: 580px;
      margin: 0 auto;
      padding: 12px;
      border: 2px solid var(--neon-blue);
      border-radius: 14px;
      background: rgba(0,0,0,.94);
      color: white;
      box-shadow: 0 0 22px rgba(0,245,255,.65);
      font-family: Arial, Helvetica, sans-serif;
    }

    .editor-drag-handle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      cursor: move;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      margin-bottom: 6px;
      padding: 4px 2px 6px;
      border-bottom: 1px solid rgba(0,245,255,.28);
    }

    .editor-drag-handle strong {
      color: var(--neon-blue);
    }

    .editor-drag-handle span {
      color: var(--neon-yellow);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .05em;
      white-space: nowrap;
    }

    .editor-panel p {
      margin: 7px 0;
      font-size: 12px;
      line-height: 1.35;
      color: #dffcff;
    }

    .editor-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
      margin-top: 8px;
    }

    .editor-panel button {
      border: 0;
      border-radius: 10px;
      background: var(--neon-pink);
      color: white;
      font-weight: 900;
      cursor: pointer;
      padding: 9px;
      font-size: 11px;
    }

    .editor-panel button.secondary {
      background: #00aaff;
    }

    .editor-panel textarea {
      width: 100%;
      height: 132px;
      margin-top: 8px;
      padding: 9px;
      border: 1px solid var(--neon-blue);
      border-radius: 10px;
      background: #050510;
      color: #dffcff;
      font-family: monospace;
      font-size: 11px;
      box-sizing: border-box;
    }

    #siteContent {
      display: none;
    }

    @media (max-width: 760px) {
      .arcade-page {
        min-height: 100svh;
        padding: 5px 3px 74px;
        overflow-x: hidden;
      }

      .arcade-top-panel {
        width: min(100%, 500px);
        max-width: 100%;
        margin: 0 auto 4px;
        padding: 7px 8px;
        border-radius: 14px;
        gap: 7px;
      }

      .arcade-instructions {
        flex-basis: 100%;
        font-size: 9.5px;
        line-height: 1.22;
        text-align: center;
      }

      .arcade-controls {
        width: 100%;
        justify-content: center;
        gap: 7px;
      }

      .arcade-btn {
        padding: 9px 11px;
        font-size: 10.5px;
        border-radius: 999px;
      }

      /*
        Bigger than the viewport, but not extreme.
        This keeps the cabinet aligned while making the playfield readable.
      */
      .arcade-shell {
        width: min(132vw, 620px);
        max-width: none;
        margin-left: 50%;
        margin-right: 0;
        transform: translateX(-50%);
      }

      .arcade-screen {
        border-radius: 8px;
      }

      .mobile-gamepad {
        display: block;
        position: fixed;
        left: 50%;
        bottom: max(6px, env(safe-area-inset-bottom));
        transform: translateX(-50%);
        z-index: 5000;
      }

      body.arcade-desktop-mode {
        overflow-x: auto;
      }

      body.arcade-desktop-mode .arcade-page {
        overflow-x: auto;
        padding-bottom: 78px;
      }

      body.arcade-desktop-mode .arcade-shell {
        width: 1180px;
        max-width: none;
        margin-left: 0;
        margin-right: 0;
        transform: none;
      }

      body.arcade-desktop-mode .arcade-top-panel {
        width: 1180px;
        max-width: none;
        margin-left: 0;
        margin-right: 0;
      }
    }

    @media (max-width: 390px) {
      .arcade-shell {
        width: min(138vw, 620px);
      }

      .arcade-instructions {
        font-size: 9px;
      }

      .arcade-btn {
        padding: 8px 10px;
        font-size: 10px;
      }
    }
  </style>
</head>

<body>
  <div class="scanlines"></div>

  <main id="startScreen" class="arcade-page">
    <div class="arcade-top-panel">
      <div class="arcade-instructions">
        <strong>HOW TO PLAY:</strong>
        Move Teddy with arrows, WASD, the phone pad, or drag/touch.
        Collect RK’s emoji timeline. Avoid the flashing <strong>SHORT</strong> skulls.
      </div>

      <div class="arcade-controls">
        <button id="startGame" class="arcade-btn" type="button">START</button>

        <a
          id="enterSite"
          class="arcade-btn enter"
          href="teddy.html"
        >
          ENTER SITE
        </a>
      </div>
    </div>

    <div class="arcade-shell" id="arcadeShell">
      <img
        src="teddy-arcade-cabinet.png"
        alt="$TEDDY Arcade Cabinet"
        class="arcade-cabinet-img"
      />

      <div class="arcade-screen" id="arcadeScreen">
        <canvas id="gameCanvas"></canvas>
      </div>

      <button id="cabinetStartBtn" class="cabinet-button-hotspot" type="button" aria-label="Start the arcade game">
        <span>START</span>
      </button>

      <button id="cabinetSelectBtn" class="cabinet-button-hotspot" type="button" aria-label="Toggle fit and desktop view">
        <span>SELECT</span>
      </button>
    </div>

    <div id="mobileGamepad" class="mobile-gamepad" aria-label="Mobile arcade controls">
      <div class="mobile-gamepad-grid">
        <button class="mobile-pad-btn mobile-pad-up" type="button" data-arcade-key="ArrowUp" aria-label="Move up">▲</button>
        <button class="mobile-pad-btn mobile-pad-left" type="button" data-arcade-key="ArrowLeft" aria-label="Move left">◀</button>
        <div class="mobile-pad-center">HOLD<br>TO<br>MOVE</div>
        <button class="mobile-pad-btn mobile-pad-right" type="button" data-arcade-key="ArrowRight" aria-label="Move right">▶</button>
        <button class="mobile-pad-btn mobile-pad-down" type="button" data-arcade-key="ArrowDown" aria-label="Move down">▼</button>
      </div>
    </div>
  </main>

  <section id="siteContent" class="hidden"></section>

  <script>
    window.TEDDY_ENTER_SITE_URL = "teddy.html";
  </script>
  <script src="script.js"></script>

  <script>
    /*
      Cabinet/mobile helper:
      - printed START starts game
      - printed SELECT toggles Fit/Desktop
      - phone arrows simulate keyboard input
      - showlayout/edit modes for screen + button alignment
    */
    (function () {
      const params = new URLSearchParams(window.location.search);
      const root = document.documentElement;
      const body = document.body;

      const startTop = document.getElementById("startGame");
      const enterSite = document.getElementById("enterSite");
      const startCab = document.getElementById("cabinetStartBtn");
      const selectCab = document.getElementById("cabinetSelectBtn");
      const canvas = document.getElementById("gameCanvas");
      const screen = document.getElementById("arcadeScreen");
      const mobileButtons = document.querySelectorAll("[data-arcade-key]");

      if (params.has("showlayout")) body.classList.add("show-layout");
      if (params.has("editscreen") || params.has("editbuttons")) {
        body.classList.add("show-layout", "edit-screen");
      }

      const values = {
        screen: {
          left: 22.6,
          top: 19.2,
          width: 54.8,
          height: 33.8
        },
        start: {
          left: 43.24,
          top: 84.91,
          width: 5.2,
          height: 5.6
        },
        select: {
          left: 50.38,
          top: 85.01,
          width: 5.2,
          height: 5.6
        }
      };

      function applyValues() {
        root.style.setProperty("--screen-left", values.screen.left + "%");
        root.style.setProperty("--screen-top", values.screen.top + "%");
        root.style.setProperty("--screen-width", values.screen.width + "%");
        root.style.setProperty("--screen-height", values.screen.height + "%");

        root.style.setProperty("--start-left", values.start.left + "%");
        root.style.setProperty("--start-top", values.start.top + "%");
        root.style.setProperty("--start-width", values.start.width + "%");
        root.style.setProperty("--start-height", values.start.height + "%");

        root.style.setProperty("--select-left", values.select.left + "%");
        root.style.setProperty("--select-top", values.select.top + "%");
        root.style.setProperty("--select-width", values.select.width + "%");
        root.style.setProperty("--select-height", values.select.height + "%");
      }

      function refresh() {
        requestAnimationFrame(function () {
          window.dispatchEvent(new Event("resize"));
        });
        setTimeout(function () { window.dispatchEvent(new Event("resize")); }, 100);
        setTimeout(function () { window.dispatchEvent(new Event("resize")); }, 300);
      }

      function startGameClean(event) {
        if (event) {
          event.preventDefault();
          event.stopPropagation();
        }

        refresh();

        if (typeof window.startGame === "function") {
          window.startGame();
        } else if (startTop) {
          startTop.click();
        }

        refresh();
      }

      function toggleView(event) {
        if (event) {
          event.preventDefault();
          event.stopPropagation();
        }

        body.classList.toggle("arcade-desktop-mode");
        localStorage.setItem(
          "teddyArcadeViewMode",
          body.classList.contains("arcade-desktop-mode") ? "desktop" : "fit"
        );
        refresh();
      }

      function loadViewMode() {
        const small = window.matchMedia("(max-width: 760px)").matches;
        const saved = localStorage.getItem("teddyArcadeViewMode");

        if (small && saved === "desktop") {
          body.classList.add("arcade-desktop-mode");
        } else {
          body.classList.remove("arcade-desktop-mode");
        }

        refresh();
      }

      function fireKey(type, key) {
        const event = new KeyboardEvent(type, {
          key,
          code: key,
          bubbles: true,
          cancelable: true
        });

        window.dispatchEvent(event);
        document.dispatchEvent(event);
      }

      mobileButtons.forEach(function (button) {
        const key = button.dataset.arcadeKey;

        button.addEventListener("pointerdown", function (event) {
          event.preventDefault();
          try { button.setPointerCapture(event.pointerId); } catch {}
          button.classList.add("active");
          fireKey("keydown", key);
        });

        ["pointerup", "pointercancel", "pointerleave"].forEach(function (eventName) {
          button.addEventListener(eventName, function (event) {
            event.preventDefault();
            button.classList.remove("active");
            fireKey("keyup", key);
          });
        });
      });

      [canvas, screen].forEach(function (el) {
        if (!el) return;

        el.addEventListener("touchstart", function (event) {
          event.preventDefault();
        }, { passive: false });

        el.addEventListener("touchmove", function (event) {
          event.preventDefault();
        }, { passive: false });
      });

      if (startCab) startCab.addEventListener("click", startGameClean);
      if (selectCab) selectCab.addEventListener("click", toggleView);

      if (enterSite) {
        enterSite.addEventListener("click", function (event) {
          event.preventDefault();
          window.location.href = window.TEDDY_ENTER_SITE_URL || "teddy.html";
        });
      }

      function createEditor() {
        if (!(params.has("editscreen") || params.has("editbuttons"))) return;
        if (document.getElementById("editorPanel")) return;

        const panel = document.createElement("div");
        panel.id = "editorPanel";
        panel.className = "editor-panel";
        panel.innerHTML = `
          <div id="editorDragHandle" class="editor-drag-handle">
            <strong>Arcade Layout Editor</strong>
            <span>DRAG BOX</span>
          </div>

          <p>
            Use SCREEN buttons to fit the gameplay box. Use START/SELECT buttons only if cabinet button zones need nudging.
          </p>

          <div class="editor-grid">
            <button type="button" data-move="screen:-.25:0">SCREEN ←</button>
            <button type="button" data-move="screen:.25:0">SCREEN →</button>
            <button type="button" data-move="screen:0:-.25">SCREEN ↑</button>
            <button type="button" data-move="screen:0:.25">SCREEN ↓</button>
            <button type="button" data-size="screen:.25:0">SCREEN WIDER</button>
            <button type="button" data-size="screen:-.25:0">SCREEN NARROWER</button>
            <button type="button" data-size="screen:0:.25">SCREEN TALLER</button>
            <button type="button" data-size="screen:0:-.25">SCREEN SHORTER</button>
          </div>

          <div class="editor-grid">
            <button type="button" data-move="start:-.25:0">START ←</button>
            <button type="button" data-move="select:-.25:0">SELECT ←</button>
            <button type="button" data-move="start:.25:0">START →</button>
            <button type="button" data-move="select:.25:0">SELECT →</button>
            <button type="button" data-move="start:0:-.25">START ↑</button>
            <button type="button" data-move="select:0:-.25">SELECT ↑</button>
            <button type="button" data-move="start:0:.25">START ↓</button>
            <button type="button" data-move="select:0:.25">SELECT ↓</button>
          </div>

          <div class="editor-grid">
            <button type="button" id="swapButtons" class="secondary">SWAP START / SELECT</button>
            <button type="button" id="copyLayout" class="secondary">COPY LAYOUT</button>
          </div>

          <textarea id="layoutOutput" readonly></textarea>
        `;

        document.body.appendChild(panel);

        panel.querySelectorAll("[data-move]").forEach(function (btn) {
          btn.addEventListener("click", function () {
            const [target, dx, dy] = btn.dataset.move.split(":");
            values[target].left = Number((values[target].left + Number(dx)).toFixed(2));
            values[target].top = Number((values[target].top + Number(dy)).toFixed(2));
            applyValues();
            updateOutput();
            refresh();
          });
        });

        panel.querySelectorAll("[data-size]").forEach(function (btn) {
          btn.addEventListener("click", function () {
            const [target, dw, dh] = btn.dataset.size.split(":");
            values[target].width = Number(Math.max(1, values[target].width + Number(dw)).toFixed(2));
            values[target].height = Number(Math.max(1, values[target].height + Number(dh)).toFixed(2));
            applyValues();
            updateOutput();
            refresh();
          });
        });

        document.getElementById("swapButtons").addEventListener("click", function () {
          const oldStart = { ...values.start };
          values.start = { ...values.select };
          values.select = oldStart;
          applyValues();
          updateOutput();
        });

        document.getElementById("copyLayout").addEventListener("click", async function () {
          updateOutput();
          const box = document.getElementById("layoutOutput");
          try {
            await navigator.clipboard.writeText(box.value);
            this.textContent = "COPIED!";
            setTimeout(() => { this.textContent = "COPY LAYOUT"; }, 1200);
          } catch {
            alert("Could not auto-copy. Select the text box and copy manually.");
          }
        });

        makePanelMoveable(panel, document.getElementById("editorDragHandle"));
        updateOutput();
      }

      function updateOutput() {
        const box = document.getElementById("layoutOutput");
        if (!box) return;

        box.value =
`const arcadeLayout = {
  screen: { left: ${values.screen.left}, top: ${values.screen.top}, width: ${values.screen.width}, height: ${values.screen.height} },
  start: { left: ${values.start.left}, top: ${values.start.top}, width: ${values.start.width}, height: ${values.start.height} },
  select: { left: ${values.select.left}, top: ${values.select.top}, width: ${values.select.width}, height: ${values.select.height} }
};`;
      }

      function makePanelMoveable(panel, handle) {
        if (!panel || !handle) return;

        handle.addEventListener("pointerdown", function (event) {
          event.preventDefault();
          event.stopPropagation();

          const rect = panel.getBoundingClientRect();
          const startX = event.clientX;
          const startY = event.clientY;
          const startLeft = rect.left;
          const startTop = rect.top;

          panel.style.left = startLeft + "px";
          panel.style.top = startTop + "px";
          panel.style.right = "auto";
          panel.style.bottom = "auto";
          panel.style.margin = "0";

          try { handle.setPointerCapture(event.pointerId); } catch {}

          function clamp(value, min, max) {
            return Math.max(min, Math.min(max, value));
          }

          function move(e) {
            panel.style.left = clamp(startLeft + e.clientX - startX, 4, window.innerWidth - panel.offsetWidth - 4) + "px";
            panel.style.top = clamp(startTop + e.clientY - startY, 4, window.innerHeight - panel.offsetHeight - 4) + "px";
          }

          function stop() {
            try { handle.releasePointerCapture(event.pointerId); } catch {}
            handle.removeEventListener("pointermove", move);
            handle.removeEventListener("pointerup", stop);
            handle.removeEventListener("pointercancel", stop);
          }

          handle.addEventListener("pointermove", move);
          handle.addEventListener("pointerup", stop);
          handle.addEventListener("pointercancel", stop);
        });
      }

      applyValues();
      loadViewMode();
      createEditor();

      window.addEventListener("resize", refresh);
      window.addEventListener("orientationchange", function () {
        setTimeout(refresh, 260);
      });

      setTimeout(refresh, 80);
      setTimeout(refresh, 400);
    })();
  </script>
</body>
</html>
