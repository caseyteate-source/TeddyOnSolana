<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>$TEDDY | Insert Coin</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    body {
      margin: 0;
      background:
        radial-gradient(circle at 50% 0%, rgba(0,245,255,.16), transparent 34%),
        radial-gradient(circle at 20% 20%, rgba(255,42,163,.18), transparent 28%),
        #030306;
      color: white;
      overflow-x: hidden;
    }

    .arcade-page {
      min-height: 100vh;
      padding: 14px 14px 28px;
      box-sizing: border-box;
    }

    .arcade-top-panel {
      width: min(99vw, 1180px);
      margin: 0 auto 12px;
      padding: 12px 16px;
      box-sizing: border-box;
      border: 2px solid rgba(0,245,255,.5);
      border-radius: 18px;
      background:
        linear-gradient(90deg, rgba(255,42,163,.18), rgba(0,245,255,.14)),
        rgba(0,0,0,.72);
      box-shadow:
        0 0 18px rgba(0,245,255,.35),
        0 0 24px rgba(255,42,163,.22);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .arcade-instructions {
      flex: 1 1 420px;
      font-size: clamp(11px, 1vw, 14px);
      line-height: 1.45;
      color: #dffcff;
      text-shadow: 0 0 8px rgba(0,0,0,.9);
    }

    .arcade-instructions strong {
      color: #ffea00;
    }

    .arcade-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .arcade-btn {
      border: 0;
      border-radius: 999px;
      padding: 13px 22px;
      color: white;
      font-weight: 900;
      letter-spacing: 1px;
      cursor: pointer;
      background: #ff2aa3;
      box-shadow:
        0 0 14px rgba(255,42,163,.95),
        inset 0 -3px 0 rgba(0,0,0,.25);
      font-size: clamp(12px, 1.1vw, 16px);
      text-transform: uppercase;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .arcade-btn:hover {
      transform: translateY(-2px);
      background: #00aaff;
      box-shadow: 0 0 18px rgba(0,245,255,.95);
    }

    .arcade-btn.enter {
      background: #00aaff;
      box-shadow:
        0 0 14px rgba(0,245,255,.95),
        inset 0 -3px 0 rgba(0,0,0,.25);
    }

    .arcade-btn.enter:hover {
      background: #ff2aa3;
      box-shadow: 0 0 18px rgba(255,42,163,.95);
    }

    .arcade-shell {
      position: relative;
      width: min(99vw, 1180px);
      margin: 0 auto;
    }

    .arcade-cabinet-img {
      width: 100%;
      height: auto;
      display: block;
      filter:
        drop-shadow(0 0 24px rgba(255,42,163,.75))
        drop-shadow(0 0 42px rgba(0,245,255,.45));
      user-select: none;
      -webkit-user-drag: none;
    }

    /*
      Game screen placement inside the cabinet.
      If the screen is slightly off later, only adjust these 4 values.
    */
    .arcade-screen {
      position: absolute;
      left: 22.6%;
      top: 19.2%;
      width: 54.8%;
      height: 33.8%;
      border-radius: 12px;
      overflow: hidden;
      background: #050510;
      box-shadow:
        inset 0 0 22px rgba(0,245,255,.5),
        0 0 18px rgba(0,245,255,.55);
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #050510;
      cursor: crosshair;
    }

    #siteContent {
      display: none;
    }

    @media (max-width: 700px) {
      .arcade-page {
        padding: 10px 8px 30px;
        overflow-x: auto;
      }

      .arcade-top-panel {
        width: 1180px;
        max-width: none;
        margin-left: 0;
        margin-right: 0;
      }

      .arcade-shell {
        width: 1180px;
        max-width: none;
        margin-left: 0;
        margin-right: 0;
      }

      body {
        overflow-x: auto;
      }

      .arcade-top-panel {
        justify-content: flex-start;
      }

      .arcade-instructions {
        flex-basis: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="scanlines"></div>

  <main id="startScreen" class="arcade-page">
    <div class="arcade-top-panel">
      <div class="arcade-instructions">
        <strong>HOW TO PLAY:</strong>
        Move Teddy with arrows, WASD, or drag/touch.
        Collect RK’s emoji timeline. Avoid the flashing <strong>SHORT</strong> skulls.
      </div>

      <div class="arcade-controls">
        <button id="startGame" class="arcade-btn" type="button">
          START GAME
        </button>

        <a class="arcade-btn enter" href="hq.html">
          ENTER SITE
        </a>
      </div>
    </div>

    <div class="arcade-shell">
      <img
        src="teddy-arcade-cabinet.png"
        alt="$TEDDY Arcade Cabinet"
        class="arcade-cabinet-img"
      />

      <div class="arcade-screen">
        <canvas id="gameCanvas"></canvas>
      </div>
    </div>
  </main>

  <section id="siteContent" class="hidden"></section>

  <script src="script.js"></script>
</body>
</html>
