<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$TEDDY Arcade Test</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background:
        radial-gradient(circle at top,
          rgba(255,42,163,.3),
          transparent 35%),
        radial-gradient(circle at bottom,
          rgba(0,245,255,.25),
          transparent 45%),
        #050510;
      font-family: Arial, sans-serif;
    }

    .container {
      width: min(1200px, 95vw);
      text-align: center;
    }

    img {
      width: 100%;
      display: block;
      margin: 0 auto;
      border-radius: 20px;
      box-shadow:
        0 0 40px rgba(255,42,163,.4),
        0 0 80px rgba(0,245,255,.25);
    }

    h1 {
      color: white;
      margin-bottom: 30px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>$TEDDY ARCADE TEST</h1>

    <img
      src="https://raw.githubusercontent.com/caseyteate-source/TeddyOnSolana/main/teddy-arcade-cabinet.png"
      alt="$TEDDY Arcade Cabinet"
    >
  </div>

</body>
</html>
