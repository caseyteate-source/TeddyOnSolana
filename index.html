<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>$TEDDY | Insert Coin</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    body {
      margin: 0;
      background:
        radial-gradient(circle at 50% 0%, rgba(0,245,255,.16), transparent 34%),
        radial-gradient(circle at 20% 20%, rgba(255,42,163,.18), transparent 28%),
        #030306;
      color: white;
      overflow-x: hidden;
    }

    .arcade-page {
      min-height: 100vh;
      padding: 14px 14px 28px;
      box-sizing: border-box;
    }

    .arcade-top-panel {
      width: min(99vw, 1180px);
      margin: 0 auto 12px;
      padding: 12px 16px;
      box-sizing: border-box;
      border: 2px solid rgba(0,245,255,.5);
      border-radius: 18px;
      background:
        linear-gradient(90deg, rgba(255,42,163,.18), rgba(0,245,255,.14)),
        rgba(0,0,0,.72);
      box-shadow:
        0 0 18px rgba(0,245,255,.35),
        0 0 24px rgba(255,42,163,.22);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .arcade-instructions {
      flex: 1 1 420px;
      font-size: clamp(11px, 1vw, 14px);
      line-height: 1.45;
      color: #dffcff;
      text-shadow: 0 0 8px rgba(0,0,0,.9);
    }

    .arcade-instructions strong {
      color: #ffea00;
    }

    .arcade-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .arcade-btn {
      border: 0;
      border-radius: 999px;
      padding: 13px 22px;
      color: white;
      font-weight: 900;
      letter-spacing: 1px;
      cursor: pointer;
      background: #ff2aa3;
      box-shadow:
        0 0 14px rgba(255,42,163,.95),
        inset 0 -3px 0 rgba(0,0,0,.25);
      font-size: clamp(12px, 1.1vw, 16px);
      text-transform: uppercase;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .arcade-btn:hover {
      transform: translateY(-2px);
      background: #00aaff;
      box-shadow: 0 0 18px rgba(0,245,255,.95);
    }

    .arcade-btn.enter {
      background: #00aaff;
      box-shadow:
        0 0 14px rgba(0,245,255,.95),
        inset 0 -3px 0 rgba(0,0,0,.25);
    }

    .arcade-btn.enter:hover {
      background: #ff2aa3;
      box-shadow: 0 0 18px rgba(255,42,163,.95);
    }

    .arcade-shell {
      position: relative;
      width: min(99vw, 1180px);
      margin: 0 auto;
    }

    .arcade-cabinet-img {
      width: 100%;
      height: auto;
      display: block;
      filter:
        drop-shadow(0 0 24px rgba(255,42,163,.75))
        drop-shadow(0 0 42px rgba(0,245,255,.45));
      user-select: none;
      -webkit-user-drag: none;
    }

    /*
      Game screen placement inside the cabinet.
      If the screen is slightly off later, only adjust these 4 values.
    */
    .arcade-screen {
      position: absolute;
      left: 22.6%;
      top: 19.2%;
      width: 54.8%;
      height: 33.8%;
      border-radius: 12px;
      overflow: hidden;
      background: #050510;
      box-shadow:
        inset 0 0 22px rgba(0,245,255,.5),
        0 0 18px rgba(0,245,255,.55);
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #050510;
      cursor: crosshair;
    }

    #siteContent {
      display: none;
    }

    @media (max-width: 700px) {
      .arcade-page {
        padding: 10px 8px 30px;
        overflow-x: auto;
      }

      .arcade-top-panel {
        width: 1180px;
        max-width: none;
        margin-left: 0;
        margin-right: 0;
      }

      .arcade-shell {
        width: 1180px;
        max-width: none;
        margin-left: 0;
        margin-right: 0;
      }

      body {
        overflow-x: auto;
      }

      .arcade-top-panel {
        justify-content: flex-start;
      }

      .arcade-instructions {
        flex-basis: 100%;
      }
    }
  
    /* ======================================================
       MOBILE ARCADE FIT MODE + PHONE GAME CONTROLS
    ====================================================== */

    #gameCanvas,
    .arcade-screen {
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .arcade-view-toggle {
      background: #7b2cff;
      box-shadow:
        0 0 14px rgba(123,44,255,.92),
        inset 0 -3px 0 rgba(0,0,0,.25);
    }

    .mobile-gamepad {
      display: none;
      width: min(360px, calc(100vw - 24px));
      margin: 14px auto 0;
      padding: 12px;
      border: 2px solid rgba(0,245,255,.55);
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255,42,163,.14), rgba(0,245,255,.10)),
        rgba(0,0,0,.78);
      box-shadow:
        0 0 18px rgba(0,245,255,.28),
        0 0 22px rgba(255,42,163,.22);
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .mobile-gamepad-title {
      text-align: center;
      color: #ffea00;
      font-weight: 900;
      font-size: 12px;
      letter-spacing: .08em;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .mobile-gamepad-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 58px 58px 58px;
      gap: 8px;
      grid-template-areas:
        ". up ."
        "left center right"
        ". down .";
    }

    .mobile-pad-btn {
      border: 0;
      border-radius: 16px;
      background: #ff2aa3;
      color: white;
      font-size: 28px;
      font-weight: 900;
      cursor: pointer;
      box-shadow:
        0 0 14px rgba(255,42,163,.75),
        inset 0 -4px 0 rgba(0,0,0,.28);
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    .mobile-pad-btn:active,
    .mobile-pad-btn.active {
      transform: translateY(2px);
      background: #00aaff;
      box-shadow:
        0 0 18px rgba(0,245,255,.9),
        inset 0 -2px 0 rgba(0,0,0,.24);
    }

    .mobile-pad-up { grid-area: up; }
    .mobile-pad-left { grid-area: left; }
    .mobile-pad-right { grid-area: right; }
    .mobile-pad-down { grid-area: down; }

    .mobile-pad-center {
      grid-area: center;
      display: grid;
      place-items: center;
      color: #dffcff;
      font-size: 11px;
      text-align: center;
      line-height: 1.25;
      padding: 6px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.52);
    }

    .mobile-gamepad-hint {
      text-align: center;
      margin-top: 9px;
      font-size: 11px;
      line-height: 1.35;
      color: #dffcff;
    }

    @media (max-width: 760px) {
      body {
        overflow-x: hidden;
      }

      .arcade-page {
        padding: 8px 6px 118px;
        overflow-x: hidden;
      }

      .arcade-top-panel {
        width: 100%;
        max-width: 100%;
        margin-left: auto;
        margin-right: auto;
        padding: 10px;
        border-radius: 16px;
      }

      .arcade-shell {
        width: 100%;
        max-width: 100%;
        margin-left: auto;
        margin-right: auto;
      }

      .arcade-screen {
        border-radius: 7px;
      }

      .arcade-controls {
        width: 100%;
        justify-content: center;
        gap: 8px;
      }

      .arcade-btn {
        padding: 12px 14px;
        font-size: 12px;
      }

      .mobile-gamepad {
        display: block;
        position: sticky;
        bottom: 8px;
        z-index: 5000;
      }

      body.arcade-desktop-mode {
        overflow-x: auto;
      }

      body.arcade-desktop-mode .arcade-page {
        overflow-x: auto;
      }

      body.arcade-desktop-mode .arcade-top-panel {
        width: 1180px;
        max-width: none;
        margin-left: 0;
        margin-right: 0;
      }

      body.arcade-desktop-mode .arcade-shell {
        width: 1180px;
        max-width: none;
        margin-left: 0;
        margin-right: 0;
      }

      body.arcade-desktop-mode .mobile-gamepad {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        bottom: 8px;
      }
    }

  </style>

  <script>
    /*
      Hard override:
      Keeps the arcade page/game the same, but forces ENTER SITE to teddy.html
      even if script.js still has older hq.html routing inside it.
    */
    document.addEventListener("click", function (event) {
      const enterLink = event.target.closest(".arcade-btn.enter, #enterSite, #enterWebsite");
      if (!enterLink) return;

      event.preventDefault();
      event.stopPropagation();
      event.stopImmediatePropagation();

      window.location.href = "teddy.html";
    }, true);

    window.TEDDY_ENTER_SITE_URL = "teddy.html";
  </script>
</head>

<body>
  <div class="scanlines"></div>

  <main id="startScreen" class="arcade-page">
    <div class="arcade-top-panel">
      <div class="arcade-instructions">
        <strong>HOW TO PLAY:</strong>
        Move Teddy with arrows, WASD, or drag/touch.
        Collect RK’s emoji timeline. Avoid the flashing <strong>SHORT</strong> skulls.
      </div>

      <div class="arcade-controls">
        <button id="startGame" class="arcade-btn" type="button">
          START GAME
        </button>

        <a
          id="enterSite"
          class="arcade-btn enter"
          href="teddy.html"
          onclick="event.preventDefault(); event.stopPropagation(); window.location.href='teddy.html'; return false;"
        >
          ENTER SITE
        </a>

        <button id="arcadeViewToggle" class="arcade-btn arcade-view-toggle" type="button">
          DESKTOP VIEW
        </button>
      </div>
    </div>

    <div class="arcade-shell">
      <img
        src="teddy-arcade-cabinet.png"
        alt="$TEDDY Arcade Cabinet"
        class="arcade-cabinet-img"
      />

      <div class="arcade-screen">
        <canvas id="gameCanvas"></canvas>
      </div>
    </div>

    <div id="mobileGamepad" class="mobile-gamepad" aria-label="Mobile arcade controls">
      <div class="mobile-gamepad-title">Mobile Teddy Controls</div>

      <div class="mobile-gamepad-grid">
        <button class="mobile-pad-btn mobile-pad-up" type="button" data-arcade-key="ArrowUp" aria-label="Move up">▲</button>
        <button class="mobile-pad-btn mobile-pad-left" type="button" data-arcade-key="ArrowLeft" aria-label="Move left">◀</button>
        <div class="mobile-pad-center">HOLD<br>TO<br>MOVE</div>
        <button class="mobile-pad-btn mobile-pad-right" type="button" data-arcade-key="ArrowRight" aria-label="Move right">▶</button>
        <button class="mobile-pad-btn mobile-pad-down" type="button" data-arcade-key="ArrowDown" aria-label="Move down">▼</button>
      </div>

      <div class="mobile-gamepad-hint">
        You can also drag directly on the game screen. Use DESKTOP VIEW if the cabinet feels too small.
      </div>
    </div>

  </main>

  <section id="siteContent" class="hidden"></section>

  <script src="script.js"></script>

  <script>
    /*
      Mobile arcade helper:
      - Adds Fit/Desktop view toggle on small screens.
      - Makes the canvas accept touch/drag without the page stealing the gesture.
      - Adds D-pad buttons that simulate keyboard movement for the existing game script.
      This does not replace script.js or the game logic.
    */
    (function () {
      const body = document.body;
      const viewToggle = document.getElementById("arcadeViewToggle");
      const canvas = document.getElementById("gameCanvas");
      const screen = document.querySelector(".arcade-screen");
      const mobileButtons = document.querySelectorAll("[data-arcade-key]");

      function isSmallScreen() {
        return window.matchMedia("(max-width: 760px)").matches;
      }

      function setViewMode(mode) {
        if (mode === "desktop") {
          body.classList.add("arcade-desktop-mode");
          localStorage.setItem("teddyArcadeViewMode", "desktop");
          if (viewToggle) viewToggle.textContent = "FIT SCREEN";
        } else {
          body.classList.remove("arcade-desktop-mode");
          localStorage.setItem("teddyArcadeViewMode", "fit");
          if (viewToggle) viewToggle.textContent = "DESKTOP VIEW";
        }
      }

      function applyInitialViewMode() {
        const saved = localStorage.getItem("teddyArcadeViewMode");

        if (isSmallScreen()) {
          setViewMode(saved === "desktop" ? "desktop" : "fit");
        } else {
          body.classList.remove("arcade-desktop-mode");
          if (viewToggle) viewToggle.textContent = "DESKTOP VIEW";
        }
      }

      if (viewToggle) {
        viewToggle.addEventListener("click", function () {
          const isDesktop = body.classList.contains("arcade-desktop-mode");
          setViewMode(isDesktop ? "fit" : "desktop");
        });
      }

      function fireKey(type, key) {
        const event = new KeyboardEvent(type, {
          key,
          code: key,
          bubbles: true,
          cancelable: true
        });

        window.dispatchEvent(event);
        document.dispatchEvent(event);
      }

      const activeKeys = new Set();

      function startKey(key, button) {
        activeKeys.add(key);
        button.classList.add("active");
        fireKey("keydown", key);
      }

      function stopKey(key, button) {
        activeKeys.delete(key);
        button.classList.remove("active");
        fireKey("keyup", key);
      }

      mobileButtons.forEach((button) => {
        const key = button.dataset.arcadeKey;

        button.addEventListener("pointerdown", function (event) {
          event.preventDefault();
          try { button.setPointerCapture(event.pointerId); } catch {}
          startKey(key, button);
        });

        ["pointerup", "pointercancel", "pointerleave"].forEach((eventName) => {
          button.addEventListener(eventName, function (event) {
            event.preventDefault();
            stopKey(key, button);
          });
        });

        button.addEventListener("contextmenu", function (event) {
          event.preventDefault();
        });
      });

      window.addEventListener("blur", function () {
        activeKeys.forEach((key) => fireKey("keyup", key));
        activeKeys.clear();
        mobileButtons.forEach((button) => button.classList.remove("active"));
      });

      /*
        Prevent touch scrolling while dragging the game screen.
        The existing script.js pointer controls can then move Teddy.
      */
      [canvas, screen].forEach((el) => {
        if (!el) return;

        el.addEventListener("touchstart", function (event) {
          event.preventDefault();
        }, { passive: false });

        el.addEventListener("touchmove", function (event) {
          event.preventDefault();
        }, { passive: false });
      });

      applyInitialViewMode();
      window.addEventListener("resize", applyInitialViewMode);
    })();
  </script>


  <script>
    /*
      Second pass after script.js loads:
      If script.js rewrites the href back to hq.html, this changes it back.
    */
    (function () {
      const enterLink = document.querySelector(".arcade-btn.enter, #enterSite, #enterWebsite");
      if (!enterLink) return;

      enterLink.setAttribute("href", "teddy.html");
      enterLink.onclick = function (event) {
        event.preventDefault();
        event.stopPropagation();
        window.location.href = "teddy.html";
        return false;
      };
    })();
  </script>
</body>
</html>
