<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>$TEDDY | Insert Coin</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    .arcade-recovery-page {
      min-height: 100vh;
      background: #030306;
      color: white;
    }

    .arcade-recovery-wrap {
      width: min(1100px, 94vw);
      margin: 0 auto;
      padding: 34px 0 50px;
      text-align: center;
    }

    .arcade-title {
      color: #00f5ff;
      text-shadow: 0 0 18px rgba(0,245,255,.9);
      font-size: clamp(28px, 6vw, 64px);
      margin: 0 0 10px;
    }

    .arcade-subtitle {
      color: #ffea00;
      text-shadow: 0 0 14px rgba(255,234,0,.75);
      margin: 0 0 22px;
      font-weight: 900;
    }

    .arcade-cabinet {
      border: 4px solid #ff2aa3;
      border-radius: 26px;
      padding: 18px;
      background:
        radial-gradient(circle at 50% 0%, rgba(0,245,255,.18), transparent 35%),
        linear-gradient(180deg, #170020, #050510);
      box-shadow:
        0 0 28px rgba(255,42,163,.85),
        0 0 55px rgba(0,245,255,.35);
    }

    .game-frame {
      width: 100%;
      border: 3px solid #00f5ff;
      border-radius: 18px;
      overflow: hidden;
      background: #04040a;
      box-shadow: inset 0 0 28px rgba(0,245,255,.35);
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: auto;
      background: #050510;
      cursor: crosshair;
    }

    .arcade-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 22px;
    }

    .arcade-btn {
      border: 0;
      border-radius: 999px;
      padding: 15px 24px;
      color: white;
      font-weight: 900;
      letter-spacing: 1px;
      cursor: pointer;
      background: #ff2aa3;
      box-shadow: 0 0 18px rgba(255,42,163,.85);
      font-size: 16px;
    }

    .arcade-btn:hover {
      transform: translateY(-2px);
      background: #00aaff;
      box-shadow: 0 0 22px rgba(0,245,255,.95);
    }

    .arcade-btn.enter {
      background: #00aaff;
      box-shadow: 0 0 18px rgba(0,245,255,.85);
    }

    .arcade-btn.enter:hover {
      background: #ff2aa3;
      box-shadow: 0 0 22px rgba(255,42,163,.95);
    }

    .arcade-rules {
      margin: 20px auto 0;
      max-width: 760px;
      color: #dffcff;
      line-height: 1.7;
      font-size: 14px;
    }

    .arcade-rules strong {
      color: #ffea00;
    }

    .fallback-hq {
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 30px;
    }

    .fallback-hq-box {
      border: 3px solid #00f5ff;
      border-radius: 24px;
      padding: 34px;
      background: linear-gradient(180deg, #13001f, #050510);
      box-shadow:
        0 0 28px rgba(0,245,255,.75),
        0 0 48px rgba(255,42,163,.45);
    }

    .fallback-hq-box h1 {
      color: #00f5ff;
      margin-top: 0;
    }

    .fallback-hq-box a {
      display: inline-block;
      margin-top: 12px;
      color: white;
      background: #ff2aa3;
      padding: 14px 20px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 900;
    }

    @media (max-width: 700px) {
      .arcade-recovery-wrap {
        width: 96vw;
        padding-top: 18px;
      }

      .arcade-cabinet {
        padding: 10px;
        border-radius: 18px;
      }

      .arcade-btn {
        width: min(280px, 90vw);
      }
    }
  </style>
</head>

<body class="arcade-recovery-page">
  <div class="scanlines"></div>

  <main id="startScreen" class="arcade-recovery-wrap">
    <h1 class="arcade-title">$TEDDY ARCADE</h1>
    <p class="arcade-subtitle">COLLECT RK'S EMOJI TIMELINE. AVOID THE SHORTS.</p>

    <section class="arcade-cabinet">
      <div class="game-frame">
        <canvas id="gameCanvas"></canvas>
      </div>

      <div class="arcade-controls">
        <button id="startGame" class="arcade-btn" type="button">
          START GAME
        </button>

        <button
          id="enterSite"
          class="arcade-btn enter"
          type="button"
          onclick="window.location.href='hq.html'"
        >
          ENTER SITE
        </button>
      </div>

      <div class="arcade-rules">
        <p>
          <strong>HOW TO PLAY:</strong>
          Move Teddy with arrow keys, WASD, or drag/touch.
          Collect the emoji timeline. Avoid the flashing <strong>SHORT</strong> skulls.
        </p>
      </div>
    </section>
  </main>

  <section id="siteContent" class="fallback-hq hidden" style="display:none;">
    <div class="fallback-hq-box">
      <h1>RABBIT HOLE UNLOCKED</h1>
      <p>The old main page has been replaced by HQ.</p>
      <a href="hq.html">ENTER THE RABBIT HOLE</a>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
