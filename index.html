<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>$TEDDY | Insert Coin</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    body {
      margin: 0;
      background:
        radial-gradient(circle at 50% 0%, rgba(0,245,255,.16), transparent 34%),
        radial-gradient(circle at 20% 20%, rgba(255,42,163,.18), transparent 28%),
        #030306;
      color: white;
      overflow-x: hidden;
    }

    .arcade-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 14px 22px;
      box-sizing: border-box;
    }

    .arcade-shell {
      position: relative;
      width: min(99vw, 1180px);
      margin: 0 auto;
    }

    .arcade-cabinet-img {
      width: 100%;
      height: auto;
      display: block;
      filter:
        drop-shadow(0 0 24px rgba(255,42,163,.75))
        drop-shadow(0 0 42px rgba(0,245,255,.45));
      user-select: none;
      -webkit-user-drag: none;
    }

    /*
      These place the game screen inside the cabinet.
      Leave these alone unless the game screen is visually off-center.
    */
    .arcade-screen {
      position: absolute;
      left: 22.6%;
      top: 19.2%;
      width: 54.8%;
      height: 33.8%;
      border-radius: 12px;
      overflow: hidden;
      background: #050510;
      box-shadow:
        inset 0 0 22px rgba(0,245,255,.5),
        0 0 18px rgba(0,245,255,.55);
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #050510;
      cursor: crosshair;
    }

    .arcade-buttons {
      position: absolute;
      left: 50%;
      top: 66.5%;
      transform: translateX(-50%);
      width: 62%;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      z-index: 5;
    }

    .arcade-btn {
      border: 0;
      border-radius: 999px;
      padding: 14px 24px;
      color: white;
      font-weight: 900;
      letter-spacing: 1px;
      cursor: pointer;
      background: #ff2aa3;
      box-shadow:
        0 0 14px rgba(255,42,163,.95),
        inset 0 -3px 0 rgba(0,0,0,.25);
      font-size: clamp(12px, 1.45vw, 17px);
      text-transform: uppercase;
    }

    .arcade-btn:hover {
      transform: translateY(-2px);
      background: #00aaff;
      box-shadow: 0 0 18px rgba(0,245,255,.95);
    }

    .arcade-btn.enter {
      background: #00aaff;
      box-shadow:
        0 0 14px rgba(0,245,255,.95),
        inset 0 -3px 0 rgba(0,0,0,.25);
    }

    .arcade-btn.enter:hover {
      background: #ff2aa3;
      box-shadow: 0 0 18px rgba(255,42,163,.95);
    }

    .arcade-rules {
      position: absolute;
      left: 50%;
      top: 75.5%;
      transform: translateX(-50%);
      width: 70%;
      text-align: center;
      color: #dffcff;
      font-size: clamp(10px, 1.15vw, 15px);
      line-height: 1.5;
      text-shadow: 0 0 8px rgba(0,0,0,.95);
      z-index: 5;
    }

    .arcade-rules strong {
      color: #ffea00;
    }

    #siteContent {
      display: none;
    }

    @media (max-width: 700px) {
      .arcade-page {
        align-items: flex-start;
        justify-content: flex-start;
        padding: 10px 8px 30px;
      }

      .arcade-shell {
        width: 1180px;
        max-width: none;
      }

      body {
        overflow-x: auto;
      }

      .arcade-buttons {
        gap: 10px;
      }

      .arcade-btn {
        padding: 12px 18px;
      }
    }
  </style>
</head>

<body>
  <div class="scanlines"></div>

  <main id="startScreen" class="arcade-page">
    <div class="arcade-shell">
      <img
        src="teddy-arcade-cabinet.png"
        alt="$TEDDY Arcade Cabinet"
        class="arcade-cabinet-img"
      />

      <div class="arcade-screen">
        <canvas id="gameCanvas"></canvas>
      </div>

      <div class="arcade-buttons">
        <button id="startGame" class="arcade-btn" type="button">
          START GAME
        </button>

        <button id="enterSite" class="arcade-btn enter" type="button">
          ENTER SITE
        </button>
      </div>

      <div class="arcade-rules">
        <strong>HOW TO PLAY:</strong>
        Move Teddy with arrows, WASD, or drag/touch.
        Collect RK's emoji timeline. Avoid the flashing <strong>SHORT</strong> skulls.
      </div>
    </div>
  </main>

  <section id="siteContent" class="hidden"></section>

  <script src="script.js"></script>
</body>
</html>
