<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$TEDDY | Insert Coin</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- CRT Scanlines -->
  <div class="scanlines"></div>

  <!-- HERO IMAGE -->
  <section class="hero">

    <img
      src="arcade-home.png"
      alt="$TEDDY Arcade"
      class="hero-image"
    />

    <!-- ENTER BUTTON -->
    <button
      class="enter-button"
      onclick="scrollToBoard()"
    >
      ENTER THE INVESTIGATION
    </button>

    <!-- INSERT COIN -->
    <div class="insert-coin">
      INSERT COIN TO PLAY
    </div>

    <!-- TWINKLE STARS -->
    <div class="stars"></div>

  </section>

  <!-- LORE SECTION -->
  <section id="board" class="lore-section">

    <h2>🧵 THE INVESTIGATION CONTINUES</h2>

    <p>
      Welcome to the rabbit hole.
      Follow the strings.
      Explore the theories.
      Build the lore.
    </p>

    <div class="cards">

      <button class="card">
        📚 TEDDY
      </button>

      <button class="card">
        🎮 GAMESTOP
      </button>

      <button class="card">
        📦 GMEBAY
      </button>

      <button class="card">
        🐱 KITTY FILES
      </button>

      <button class="card">
        📈 EMOJI TIMELINE
      </button>

    </div>

  </section>

  <script src="script.js"></script>

</body>
</html>
